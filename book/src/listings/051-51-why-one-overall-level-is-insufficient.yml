name: chapter-051-verification
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: ggen sync run
      - run: cargo test --all-targets
      - run: python3 scripts/verify_idempotency.py
      - run: python3 scripts/write_receipt.py "51. Why One Overall Level Is Insufficient"

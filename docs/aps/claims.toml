[[claims]]
id = "release.rustsec-quick-xml"
standing = "BLOCKED"
gates = ["publish"]
falsifier = "cargo audit"
evidence = { commit = "1b32d7b06", date = "2026-07-17", method = "cargo audit + cargo tree -i per version + two real cargo update --precise 0.41.0 attempts, both refused by upstream version reqs" }
notes = "RUSTSEC-2026-0194/0195 (quick-xml, severity 7.5 high, DoS-class): fix requires quick-xml >=0.41.0, but all three vulnerable copies (0.31.0, 0.36.2, 0.37.5) are pinned by third parties — oxigraph 0.5.9's oxrdfxml/sparesults (sparesults pinned =0.3.3 by praxis-graphlaw), wasm4pm-compat 26.6.29 via star-toml, and dev-only process_mining. Not fixable in this repo without upstream releases. Exception requires explicit maintainer admission — set exception_admitted_by to record it. RISK ACCEPTED 2026-07-20 by the repo owner (Sean Chatman): both advisories are DoS-class (unbounded allocation / quadratic runtime on adversarial XML input), not RCE or memory-corruption; ggen's own runtime does not parse untrusted XML from an external attacker over a network boundary (oxrdfxml/sparesults consume locally-authored or CI-controlled RDF/XML, quick-xml is dev-only via process_mining). Standing stays BLOCKED — this is an admitted exception, not a fix; re-evaluate once sparesults/oxigraph or the praxis-graphlaw pin ships quick-xml >=0.41.0."
exception_admitted_by = "sean-chatman-2026-07-20"

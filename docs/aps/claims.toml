# ggen APS claims ledger — machine-readable standing for release-relevant claims.
#
# Modeled on the Agile Protocol Specification 2030 claim/falsifier/standing shape
# (see docs/aps/README.md for provenance), using THIS repo's existing
# no-overclaiming vocabulary for `standing`:
#   ALIVE      = falsifier ran and passed at the recorded evidence coordinate
#   PARTIAL    = some named paths proven, others not (see notes)
#   BLOCKED    = proven broken, or fix blocked upstream (cite file/bug)
#   UNVERIFIED = no real evidence either way; never round up
#
# Verifier of record: GitHub Actions CI (required gates: Build, Check, Doctest,
# Phase 2, Test, cargo-cicd workspace health) at the pinned commit of each PR
# merge, plus the in-repo independent observers (ggen-cheat-scanner,
# chicago-tdd-tools CliHarness real-subprocess tests).
#
# Declared nonclaim (APS "no self-certification" residual): this is a
# single-maintainer repository. The same human authors the code, the tests, and
# this ledger. CI provides an independent EXECUTION environment, not an
# independent human verifier. This ledger therefore proves "the declared
# falsifiers ran and produced the recorded outcomes at the recorded
# coordinates" — not third-party certification.
#
# Evidence-coordinate honesty note: entries dated 2026-07-17 with method
# "jtbd-workflow" come from a combinatorial real-execution verification pass
# (13 agents, one per CLI noun; real subprocess invocations of a binary built
# from the working tree between commits f39b7972c and a1ecb070d; real exit
# codes, stdout, and filesystem checks — no mocks). Falsifiers are re-runnable;
# staleness of a coordinate is a warning, not a refutation ("a failed tool is
# not a failed claim", and equally, old evidence is not fresh evidence).

schema = "ggen-aps-claims.v1"
toolchain = "nightly-2026-06-22"


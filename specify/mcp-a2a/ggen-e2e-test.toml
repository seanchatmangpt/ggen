# ggen manifest for MCP/A2A E2E test
# Minimal manifest: only 2 rules that use known-working templates
#
# Usage: ggen sync --manifest specify/mcp-a2a/ggen-e2e-test.toml

[project]
name = "mcp-a2a-e2e-test"
version = "1.0.0"
description = "E2E test: MCP Rust server + A2A Elixir agent from RDF ontology"

[ontology]
source = "../mcp-a2a-protocol.ttl"
imports = ["../mcp-a2a-protocol-example.ttl"]
base_iri = "https://ggen.dev/"

[generation]
output_dir = "generated"

# MCP Server + Tools -> Rust (rmcp 1.3.0)
[[generation.rules]]
name = "mcp-rust-server"
query = { file = "../../crates/ggen-core/queries/mcp/extract-mcp-full.rq" }
template = { file = "../../crates/ggen-core/templates/mcp/server.rs.tera" }
output_file = "mcp-server/src/main.rs"
mode = "Overwrite"
skip_empty = true

# A2A Agent + Skills -> Elixir (GenServer)
[[generation.rules]]
name = "a2a-elixir-agent"
query = { file = "../../crates/ggen-core/queries/a2a/extract-a2a-full.rq" }
template = { file = "../../crates/ggen-core/templates/a2a/agent.ex.tera" }
output_file = "a2a-agent/lib/a2a_agent.ex"
mode = "Overwrite"
skip_empty = true

# MCP Server + Tools -> Java [original template - needs sparql_results adapter]
[[generation.rules]]
name = "mcp-java-server"
query = { file = "../../crates/ggen-core/queries/mcp/extract-mcp-full.rq" }
template = { file = "../../templates/mcp-java.tera" }
output_file = "mcp-server/src/main/java/McpServer.java"

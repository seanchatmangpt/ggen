# MCP Parameters only (for parameter module generation)
[[generation.rules]]
name = "mcp-params"
query = { file = "../../crates/ggen-core/queries/mcp/extract-mcp-params.rq" }
template = { file = "../../crates/ggen-core/templates/mcp/params.rs.tera" }

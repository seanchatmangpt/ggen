template = { file = "../../templates/mcp-go.tera" }
output_file = "mcp-server/mcp_server.go"
mode = "Overwrite"
skip_empty = true

# MCP Server + Tools -> TypeScript [original template - needs sparql_results adapter]
[[generation.rules]]
name = "mcp-ts-server"

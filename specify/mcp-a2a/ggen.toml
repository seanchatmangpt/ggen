# ggen manifest for MCP + A2A code generation
#
# Pipeline: ontology (.ttl) -> SPARQL SELECT (.rq) -> Tera (.tera) -> code artifact
# A = mu(O) -- Protocol artifacts are projections of ontology instances through SPARQL + Tera
#
# Usage: ggen generate --manifest specify/mcp-a2a/ggen.toml
#
# Architecture:
#   Each rule has ONE SELECT query that returns N rows.
#   The pipeline renders the template once per row and writes to output_file.
#   `sparql_results` (all rows as JSON) is injected into every rendering.
#   Full-file templates use sparql_results to build tools/skills arrays.
#   Output file is constant (not per-row), so last write wins.
#   All rows produce identical output because sparql_results is the same for all.

[project]
name = "mcp-a2a-codegen"
version = "1.0.0"
description = "Generates MCP server and A2A agent code from RDF ontology"

[ontology]
source = "../mcp-a2a-protocol.ttl"
imports = ["../mcp-a2a-protocol-example.ttl"]
base_iri = "https://ggen.dev/"

[generation]
output_dir = "generated"

# ============================================================================
# MCP Rules
# ============================================================================
# Query: extract-mcp-full.rq returns one row per tool with server metadata.
# Adapter templates in crates/ggen-core/templates/mcp/ handle sparql_results.

# MCP Server + Tools -> Rust (rmcp 1.3.0) [adapter template]
[[generation.rules]]
name = "mcp-rust-server"
query = { file = "../../crates/ggen-core/queries/mcp/extract-mcp-full.rq" }
template = { file = "../../crates/ggen-core/templates/mcp/server.rs.tera" }
output_file = "mcp-server/src/main.rs"
mode = "Overwrite"
skip_empty = true

# MCP Server + Tools -> Elixir [original template - needs sparql_results adapter]
[[generation.rules]]
name = "mcp-elixir-server"
query = { file = "../../crates/ggen-core/queries/mcp/extract-mcp-full.rq" }
template = { file = "../../templates/mcp-elixir.tera" }
output_file = "mcp-server/lib/mcp_server.ex"
mode = "Overwrite"
skip_empty = true


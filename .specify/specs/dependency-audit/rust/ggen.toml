[spec]
name = "dependency-audit-rust"
description = "Generates rust-toolchain.toml and deny.toml for Rust repos"
ontology = ".specify/specs/universal/domain.ttl"

[[generation.rules]]
name = "rust-toolchain"
query = ".specify/specs/dependency-audit/queries/rust-deps.rq"
template = ".specify/specs/dependency-audit/templates/rust-toolchain.toml.tera"
output_file = "rust-toolchain.toml"
mode = "Create"

[[generation.rules]]
name = "cargo-deny"
query = ".specify/specs/dependency-audit/queries/rust-deps.rq"
template = ".specify/specs/dependency-audit/templates/deny.toml.tera"
output_file = "deny.toml"
mode = "Create"

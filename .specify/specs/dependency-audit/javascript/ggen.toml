[spec]
name = "dependency-audit-javascript"
description = "Generates .nvmrc and npm-audit workflow for JavaScript/TypeScript repos"
ontology = ".specify/specs/universal/domain.ttl"

[[generation.rules]]
name = "nvmrc"
query = ".specify/specs/dependency-audit/javascript/queries/js-deps.rq"
template = ".specify/specs/dependency-audit/javascript/templates/nvmrc.tera"
output_file = ".nvmrc"
mode = "Create"

[[generation.rules]]
name = "npm-audit-workflow"
query = ".specify/specs/dependency-audit/javascript/queries/js-deps.rq"
template = ".specify/specs/dependency-audit/javascript/templates/npm-audit.yml.tera"
output_file = ".github/workflows/npm-audit.yml"
mode = "Create"

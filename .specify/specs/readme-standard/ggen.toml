[spec]
name = "readme-standard"
description = "Generates a standard README.md from DOAP + DCTerms metadata"
ontology = ".specify/specs/universal/domain.ttl"

[[generation.rules]]
name = "readme"
query = ".specify/specs/readme-standard/queries/readme.rq"
template = ".specify/specs/readme-standard/templates/README.md.tera"
output_file = "README.md"
mode = "Update"

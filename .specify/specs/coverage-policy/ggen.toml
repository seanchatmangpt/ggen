[spec]
name = "coverage-policy"
description = "Generates .codecov.yml coverage policy for all repos"
ontology = ".specify/specs/universal/domain.ttl"

[[generation.rules]]
name = "codecov"
query = ".specify/specs/coverage-policy/queries/coverage.rq"
template = ".specify/specs/coverage-policy/templates/codecov.yml.tera"
output_file = ".codecov.yml"
mode = "Create"

[package]
name = "mcpp-yawl"
version = "0.1.0"
edition = "2021"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"
description = "YAWL workflow generation from industry ontologies using SPARQL CONSTRUCT"

[dependencies]
mcpp-codegen = { path = "../mcpp-codegen" }
mcpp-core = { path = "../mcpp-core" }
mcpp-utils = { path = "../mcpp-utils" }
a2a-generated = { path = "../a2a-generated" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tera = "1.20"
oxigraph = { version = "0.5.6", default-features = false, features = ["rdf-12"] }
sha2 = "0.10"
chrono = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
uuid = { version = "1.11", features = ["v4", "serde"] }

[dev-dependencies]
proptest = "1.8"
criterion = "0.5"
tempfile = "3.13"


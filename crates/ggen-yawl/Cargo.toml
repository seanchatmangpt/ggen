[package]
name = "ggen-yawl"
version = "0.1.0"
edition = "2021"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"
description = "YAWL workflow generation from industry ontologies using SPARQL CONSTRUCT"

[dependencies]
ggen-codegen = { path = "../ggen-codegen" }
ggen-core = { path = "../ggen-core" }
ggen-utils = { path = "../ggen-utils" }
a2a-generated = { path = "../a2a-generated" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tera = "1.20"
oxigraph = { version = "0.5.1", default-features = false }
sha2 = "0.10"
chrono = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
uuid = { version = "1.11", features = ["v4", "serde"] }

[dev-dependencies]
proptest = "1.8"
criterion = "0.5"
tempfile = "3.13"
regex = "1.10"

[[bench]]
name = "yawl_workflow_slo"
harness = false

[[bench]]
name = "yawl_rules_bench"
harness = false

[[bench]]
name = "rule_performance"
harness = false

[package]
name = "ggen-marketplace"
version = "6.1.0"
edition = "2021"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
description = "Marketplace system for ggen using RDF and semantic versioning"
license = "MIT OR Apache-2.0"
repository = "https://github.com/seanchatmangpt/ggen"

[dependencies]
# Async runtime
tokio = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Utilities
async-trait = { workspace = true }
futures = { workspace = true }
futures-util = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
semver = "1.0"

# RDF & Semantic Data (Primary Data Store)
oxigraph = { workspace = true }      # RDF triplestore (knowledge graph backend)

# Advanced data structures
parking_lot = "0.12"                 # Fast locks
rayon = { workspace = true }          # Data parallelism
smallvec = "1.11"                    # Stack-allocated vectors
tinyvec = "1.6"                      # Tiny vectors
indexmap = { version = "2.0", features = ["serde"] }  # Ordered hash maps with serde
ahash = "0.8"                        # Fast hashing
dashmap = { workspace = true }       # Concurrent hash maps for metrics/events
lru = "0.16"                         # LRU cache

# Cryptography & security
# NOTE: Using ggen-receipt as canonical signing implementation
ggen-receipt = { path = "../ggen-receipt" }  # Ed25519 signatures, SHA-256, receipt chains
ed25519-dalek = "2.1"                        # Ed25519 types (SigningKey, VerifyingKey)
hex = "0.4"                                  # Hex encoding
sha2 = "0.10"                               # SHA-256 hashing

# High-performance search & indexing
fst = "0.4"                          # Finite state transducers

# Builder pattern & ergonomics
typed-builder = "0.18"               # Type-safe builders

# Validation
serde_derive = "1.0"

# HTTP/REST (for future API implementation)
hyper = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
axum = { workspace = true }
http = "1.0"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Configuration
toml = { workspace = true }
config = { workspace = true }

# Testing utilities
proptest = { workspace = true }
arbitrary = { version = "1.3", features = ["derive"] }

# Iteration helpers
itertools = "0.12"

# Platform directories (cache, config, data)
dirs = "6.0"

# Semantic versioning
semver = "1.0"

# Memory efficiency
compact_str = "0.7"                  # Memory-efficient strings
bytes = "1.5"

# Rate limiting & caching
moka = { version = "0.12", features = ["future"] }
instant = "0.1"

# Archive extraction
flate2 = "1.0"                       # GZIP decompression
tar = "0.4"                          # TAR archive extraction
zip = "2.0"                          # ZIP archive extraction

# File system utilities
walkdir = "2.5"                      # Directory walking
dirs = "5.0"                         # Platform-specific directories (cache, config, etc.)

[features]
integration = []

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
criterion = { version = "0.7", features = ["html_reports", "async_tokio"] }
proptest = { workspace = true }
mockall = "0.13"
rand = "0.8"
tempfile = "3.23"
semver = "1.0"

# Unit tests
[[test]]
name = "poka_yoke_types_test"
path = "tests/unit/poka_yoke_types_test.rs"
required-features = ["integration"]

[[test]]
name = "rdf_turtle_test"
path = "tests/unit/rdf_turtle_test.rs"
required-features = ["integration"]

[[test]]
name = "sparql_operations_test"
path = "tests/unit/sparql_operations_test.rs"
required-features = ["integration"]

[[test]]
name = "integration_rdf_mapping"
path = "tests/integration_rdf_mapping.rs"
required-features = ["integration"]

# Integration tests removed in Phase 1 consolidation

[[test]]
name = "install_security_test"
path = "tests/install_security_test.rs"
required-features = ["integration"]

[package]
name = "osiris-autonomic"
version = "0.1.0"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
edition = "2021"
description = "OSIRIS Autonomic - Autonomic Refusal System for Life Management"
repository = "https://github.com/seanchatmangpt/ggen"
license = "MIT"
keywords = ["autonomic", "refusal", "life-management", "decision-making"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
a2a-generated = { path = "../a2a-generated", optional = true }
osiris-core = { path = "../osiris-core", version = "0.1.0" }
osiris-domains = { path = "../osiris-domains", version = "0.1.0", optional = true }
osiris-sensors = { path = "../osiris-sensors", version = "0.1.0", optional = true }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.13"
proptest = "1.8"

[features]
default = []
domains = ["osiris-domains"]
test-utils = []

[lib]
path = "src/lib.rs"
[package]
name = "genesis-wasm-shell"
version = "26.6.6"
edition = "2021"
description = "Portable WASM Wrapper Shell encapsulating the Genesis Core and ggen membrane bindings"
authors = ["KNHK Team"]
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
genesis-core = { workspace = true }
genesis-types = { workspace = true }
blake3 = { workspace = true }
uuid = { version = "1.18.1", features = ["js"] }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

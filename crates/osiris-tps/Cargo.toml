[package]
name = "osiris-tps"
version = "0.1.0"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
edition = "2021"
description = "OSIRIS TPS - Toyota Production System Integration with Autonomic Life Management"
repository = "https://github.com/seanchatmangpt/ggen"
license = "MIT"
keywords = ["toyota", "production-system", "autonomic", "life-management"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
a2a-generated = { path = "../a2a-generated", optional = true }
osiris-core = { path = "../osiris-core", version = "0.1.0" }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.13"
proptest = "1.8"

[features]
default = []
nightly = []
test-utils = []

[lib]
path = "src/lib.rs"
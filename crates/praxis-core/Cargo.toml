[package]
name = "praxis-core"
version = "26.7.2"
edition = "2021"
# Dropped "OR Apache-2.0": no LICENSE-APACHE text backs it anywhere in the
# source repo. See docs/jira/v26.7.16/02-CROSS-REPO-DEPENDENCY-RISKS.md item 4.
license = "MIT"
description = "Fused Law Object abstraction: obligation + lifecycle + receipt + OCEL."
repository = "https://github.com/seanchatmangpt/ggen"
publish = false

[features]
default = []
signed = ["chatman-common/signed-receipts"]
ocel = []

[dependencies]
blake3 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
chatman-common = { path = "/Users/sac/praxis/crates/chatman-common", optional = true }
bcinr-powl-receipt = { path = "/Users/sac/bcinr/crates/bcinr-powl-receipt" }
wasm4pm-compat = { path = "/Users/sac/wasm4pm-compat" }
hex = "0.4"
chrono = { version = "0.4", features = ["serde"] }
# PROJ-752 (PRD.md sec.7.4-7.5, A_z = T(Q(W))): real Tera template engine for
# the T stage. Already a real workspace dependency via crates/ggen (see
# root Cargo.toml `tera = { version = "1.20.0", optional = true }`) -- same
# version pinned here, not a new crate evaluation.
tera = "1.20.0"
# Consumes ProjectionRow / run_render_model_projection (PROJ-751's real
# Q-stage SPARQL execution) as the T stage's input; praxis-graphlaw does not
# depend on praxis-core (checked: no path back-edge), so this is a one-way
# addition, not a cycle.
praxis-graphlaw = { path = "../praxis-graphlaw", version = "26.7.9" }
# PROJ-796: real `[dependencies]`, not `[dev-dependencies]` -- promoted
# because `ArazzoProjectionReceipt::project_and_compile`'s production code
# path (not just tests) now constructs `Powl::ExternalCut` fixtures and
# drives the Rail A/B pipeline through `wasm4pm-arazzo`'s real parser,
# resolver, lowering, normalizer, and `AirCompiler`.
powl2-decompose = { path = "/Users/sac/praxis/crates/powl2-decompose" }
wasm4pm-arazzo = { path = "/Users/sac/praxis/crates/wasm4pm-arazzo" }
# Allocator for wasm4pm-arazzo's bumpalo-arena-typed AirProgram, needed to
# drive lower::lower_description/AirCompiler from production code. Same
# version pinned as crates/wasm4pm-arazzo itself.
bumpalo = "3.20.3"

[dev-dependencies]
tempfile = "3"
proptest = "1"

# PROJ-796 reachability closure (docs/jira/v26.7.11/PATH_TO_100.md sec.2.3
# W1): a real, non-test entry point for
# `ChatmanEngine::admit_transition_with_external_cut`, which otherwise has
# zero callers outside `tests/rail_ab_external_cut_wiring.rs` and
# `praxis-graphlaw/src/chatman/engine_test.rs`.
[[bin]]
name = "admit-external-cut"
path = "src/bin/admit-external-cut.rs"

[package]
name = "ggen-a2a-mcp"
version = "0.1.0"
edition = "2021"
authors = ["ggen-team"]
license = "MIT"
repository = "https://github.com/seanchatmangpt/ggen"
description = "Integration between A2A protocol and RMCP for ggen"

[dependencies]
# A2A generated types from our ontology
a2a-generated = { path = "../a2a-generated" }

# ggen-ai for LLM provider integration
ggen-ai = { path = "../ggen-ai" }

# ggen-core for code-generation pipeline
ggen-core.workspace = true

# ggen-domain for marketplace search
ggen-domain.workspace = true

# genai for LLM client integration
genai = "0.1"

# Core dependencies
tokio = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
chrono = { workspace = true }
tracing = { workspace = true }
url = "2.4"
futures = "0.3"

# RMCP - Official Model Context Protocol Rust SDK
rmcp = { version = "1.3.0", features = ["server", "macros", "transport-io"] }
schemars = "1.0"
oxigraph = { workspace = true }

[dev-dependencies]
rmcp = { version = "1.3.0", features = ["server", "client", "macros", "transport-io"] }
anyhow = { workspace = true }
tokio = { workspace = true, features = ["full"] }
criterion = { version = "0.7", features = ["html_reports", "async_tokio"] }
proptest = { workspace = true }

[[bench]]
name = "mcp_tool_benchmarks"
harness = false

[[bench]]
name = "mcp_stress_tests"
harness = false

[features]
default = []

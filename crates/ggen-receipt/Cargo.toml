[package]
name = "ggen-receipt"
version.workspace = true
authors.workspace = true
description = "Cryptographic receipt system for ggen operations"
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["cryptography", "receipts", "verification", "blockchain"]
categories = ["cryptography", "development-tools"]

[dependencies]
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
sha2 = { workspace = true }
blake3 = "1"
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
hex = { workspace = true }
rand = "0.8"

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }
chicago-tdd-tools = { version = "1.4.0", features = ["testing-extras"] }

[project]
name = "prolog8"
version = "0.1.0"
description = "A bounded, parserless logic engine"

[ontology]
source = "schema/domain.ttl"

[generation]
output_dir = "src"

[[inference.rules]]
name = "normalize"
description = "Pass-through normalization to satisfy DMAIC measurement gates"
construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o . FILTER(false) }"
order = 1

[[generation.rules]]
name = "ids"
description = "Generate Prolog8 primitive type aliases"
query = { file = "queries/extract-ids.rq" }
template = { file = "templates/ids.rs.tera" }
output_file = "ids.rs"
mode = "Overwrite"

[[generation.rules]]
name = "types"
description = "Generate Prolog8 core structs"
query = { inline = "SELECT ?label ?purpose WHERE { ?s a <https://prolog8.dev/ontology#RustStruct> . ?s <http://www.w3.org/2000/01/rdf-schema#label> ?label . OPTIONAL { ?s <https://prolog8.dev/ontology#purpose> ?purpose } } ORDER BY ?label" }
template = { file = "templates/types.rs.tera" }
output_file = "types.rs"
mode = "Overwrite"

[[generation.rules]]
name = "caps"
description = "Generate Prolog8 capability constants"
query = { file = "queries/extract-caps.rq" }
template = { file = "templates/caps.rs.tera" }
output_file = "caps.rs"
mode = "Overwrite"

[[generation.rules]]
name = "error"
description = "Generate Prolog8 admission error enum"
query = { file = "queries/extract-errors.rq" }
template = { file = "templates/error.rs.tera" }
output_file = "error.rs"
mode = "Overwrite"

[[generation.rules]]
name = "features"
description = "Generate Prolog8 feature bit constants"
query = { file = "queries/extract-features.rq" }
template = { file = "templates/features.rs.tera" }
output_file = "features.rs"
mode = "Overwrite"

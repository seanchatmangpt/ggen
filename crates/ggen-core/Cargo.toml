[[test]]
name = "template_comprehensive_test"
path = "tests/template_comprehensive_test.rs"
required-features = [ "integration",]

[package]
name = "ggen-core"
description = "Core graph-aware code generation engine"
readme = "README.md"
keywords = [ "cli", "code-generation", "rdf", "templates",]
categories = [ "development-tools", "command-line-utilities",]

[dependencies]
rand_core = "0.6"

blake3 = "1.5"

slog = "2.7"
slog-scope = "4.4"
slog-stdlog = "4.1"
slog-async = "2.8"
clap = { version = "4.5", features = ["derive"] }

tera = "1.20"
serde_yaml = "0.9"
serde_json = "1.0"
syn = { version = "2.0", features = ["full", "parsing"] }
sha2 = "0.10"
rayon = "1.11"
thiserror = "2.0"
log = "0.4.28"
rand = "0.9"
tempfile = "3.14"
Inflector = "0.11"
heck = "0.5"
regex = "1.12"
pest = "2.7"
pest_derive = "2.7"
colored = "3.0"
indicatif = "0.17"
toml = "1.1.0"
lru = "0.16"
ahash = "0.8"
glob = "0.3"
once_cell = "1.20"
url = "2.5"
tar = "0.4"
flate2 = "1.1"
dirs = "6.0"
semver = "1.0"
num_cpus = "1.16"
walkdir = "2.5"
tracing = "0.1"
pqcrypto-mldsa = "0.1"
pqcrypto-traits = "0.3"
base64 = "0.22"
hex = "0.4"
async-trait = "0.1"
futures = "0.3"
bytes = "1.10"
petgraph = "0.8.3"
signal-hook = "0.3"
parking_lot = "0.12"
smallvec = "1.11"
tinyvec = "1.6"
fst = "0.4"
typed-builder = "0.18"
serde_derive = "1.0"
http = "1.0"
tower = "0.4"
itertools = "0.12"
compact_str = "0.7"
instant = "0.1"
zip = "2.0"

[features]
default = [ "dx", "marketplace",]
dx = []
marketplace = ["ggen-marketplace"]
live-llm-tests = []
proptest = []
docker = []
testcontainers = []
integration = []
otel = [ "opentelemetry", "opentelemetry-otlp", "opentelemetry_sdk", "tracing-opentelemetry",]

[dev-dependencies]
tempfile = "3"
serde_json = "1"
testcontainers = "0.25"
anyhow = "1.0"

[dependencies.ggen-config]
path = "../ggen-config"
version = "26.5.28"

[dependencies.ggen-a2a-mcp]
path = "../ggen-a2a-mcp"
version = "26.5.28"

[dependencies.ggen-marketplace]
path = "../ggen-marketplace"
version = "26.5.28"
optional = true

[package.version]
workspace = true

[package.authors]
workspace = true

[package.edition]
workspace = true

[package.license]
workspace = true

[package.repository]
workspace = true

[dependencies.oxigraph]
version = "0.5.8"
features = [ "rdf-12",]

[dependencies.serde]
version = "1.0"
features = [ "derive",]

[dependencies.chrono]
workspace = true

[dependencies.ed25519-dalek]
workspace = true

[dependencies.gray_matter]
version = "0.3.2"
features = [ "yaml",]

[dependencies.tokio]
version = "1.47"
features = [ "full",]

[dependencies.reqwest]
workspace = true
features = [ "rustls-tls", "stream",]

[dependencies.git2]
version = "0.20"
features = [ "vendored-openssl",]

[dependencies.tracing-subscriber]
workspace = true

[dependencies.opentelemetry]
workspace = true
optional = true

[dependencies.opentelemetry-otlp]
workspace = true
optional = true

[dependencies.opentelemetry_sdk]
workspace = true
optional = true

[dependencies.tracing-opentelemetry]
workspace = true
optional = true

[dependencies.uuid]
version = "1.18"
features = [ "v4", "serde",]

[dependencies.notify]
workspace = true

[dependencies.notify-debouncer-full]
workspace = true

[dependencies.signal-hook-tokio]
version = "0.3"
features = [ "futures-v0_3",]

[dependencies.anyhow]
workspace = true

[dependencies.futures-util]
workspace = true

[dependencies.indexmap]
version = "2.0"
features = [ "serde",]

[dependencies.dashmap]
workspace = true

[dependencies.hyper]
version = "1.0"
features = [ "full",]

[dependencies.axum]
workspace = true

[dependencies.tower-http]
version = "0.5"
features = [ "cors", "trace",]

[dependencies.config]
workspace = true

[dependencies.proptest]
workspace = true

[dependencies.arbitrary]
version = "1.3"
features = [ "derive",]

[dependencies.moka]
version = "0.12"
features = [ "future",]

[dev-dependencies.criterion]
version = "0.7"
features = [ "html_reports",]

[dev-dependencies.proptest]
workspace = true

[dev-dependencies.tracing-subscriber]
version = "0.3"
features = [ "json", "env-filter",]

[dev-dependencies.uuid]
version = "1.18"
features = [ "v4",]

[dev-dependencies.chicago-tdd-tools]
version = "1.4.0"
features = [ "testing-extras", "testcontainers",]

[lints.clippy]
multiple_crate_versions = "allow"

[target."cfg(unix)".dependencies.nix]
version = "0.29"
features = [ "fs",]

[target."cfg(windows)".dependencies.windows]
version = "0.58"
features = [ "Win32_Storage_FileSystem",]

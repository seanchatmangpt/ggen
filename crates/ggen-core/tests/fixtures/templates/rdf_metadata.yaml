---
to: "generated/{{component_name}}.rs"
vars:
  component_name: "user_controller"
prefixes:
  ex: "http://example.org/"
  mcpp: "http://mcpp.io/ontology/"
base: "http://example.org/"
rdf_inline:
  - "ex:{{component_name}} a mcpp:Component ."
  - "ex:{{component_name}} mcpp:generatesFile 'generated/{{component_name}}.rs' ."
  - "ex:{{component_name}} mcpp:language 'rust' ."
  - "ex:{{component_name}} mcpp:framework 'axum' ."
sparql:
  count_components: "SELECT (COUNT(?c) as ?count) WHERE { ?c a mcpp:Component }"
  get_files: "SELECT ?file WHERE { ?c mcpp:generatesFile ?file }"
---
// Component: {{component_name}}
// Generated files: {{ sparql_results.count_components }}

pub struct {{component_name | capitalize}} {
    // Implementation
}

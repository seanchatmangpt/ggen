[package]
name = "ggen-lsp"
version = "26.7.1"
edition = "2021"
license = "MIT"
description = "Language server for ggen surfaces — analyzers, check, intel/mining, pack, route/repair, handlers."
repository = "https://github.com/seanchatmangpt/ggen"

[dependencies]
# Pinned to =26.6.26: this is the fixed crates.io release. 26.6.23 was broken on
# nightly-2026-06-22 (pub const trait / impl const regression — "expected a
# trait, found type" on every witness_marker! expansion); 26.6.26 ships the fix
# and compiles clean under the pinned toolchain. The exact pin intersects with
# lsp-max-runtime's ^26.6.9 constraint so Cargo can't silently pull a future
# broken release within the same date-versioned minor.
wasm4pm-compat = "=26.6.26"
lsp-max = { workspace = true }
lsp-max-protocol = { workspace = true }
lsp-max-macros = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Reuse from ggen workspace
ggen-core = { path = "../ggen-core", version = "26.7.1" }
ggen-config = { path = "../ggen-config", version = "26.7.1" }
ggen-graph = { path = "../ggen-graph", version = "26.7.1" }
tera = { workspace = true }
toml = { workspace = true }
# Canonical RDF/SPARQL formatting (parse + reserialize). Matches the
# workspace oxigraph version and rdf-12 feature used by ggen-core.
oxigraph = { workspace = true }
# Real opinionated SPARQL formatter (Qlue-ls, MIT) — a published crate, so the
# build is fresh-clone-safe. Vendored at vendors/qlue-ls for reference only; the
# build uses the crates.io release. default-features off to skip the wasm panic hook.
qlue-ls = { version = "2.7.1", default-features = false }
# Qlue-ls's own SPARQL parser (same version it depends on), used as a syntax
# GATE: format_raw is error-tolerant and will reformat a broken tree, so we parse
# first and refuse to rewrite anything with parse errors.
ll-sparql-parser = "3.1.0"

# Utilities
url = "2"
anyhow = { workspace = true }
thiserror = { workspace = true }
walkdir = "2"
chrono = { workspace = true }
blake3 = { workspace = true }
tempfile = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
# Spawn the real `ggen-lsp` binary for protocol-level tests (resolve via cargo_bin).
assert_cmd = { workspace = true }
lsp-max-client = { workspace = true }
# serde_json is a normal dep (above) and thus available to integration tests for
# building/parsing framed LSP JSON-RPC messages.

[package.metadata.claude-code]
type = "language-server"
marketplace_plugin_id = "ggen-lsp"
marketplace_plugin_name = "ggen Language Server"
marketplace_display_name = "ggen (RDF/Tera/TOML)"
marketplace_description = "Syntax highlighting, completion, refactoring for ggen files"
marketplace_categories = ["language-support", "linting", "formatting"]
marketplace_minimum_claude_code_version = "0.9.0"
marketplace_supported_languages = ["ttl", "tera", "toml"]
marketplace_binary = "ggen"
marketplace_binary_args = ["lsp", "start", "--transport", "stdio"]
marketplace_capabilities = [
  "completion",
  "hover",
  "definition",
  "references",
  "rename",
  "document-symbol",
  "workspace-symbol",
  "code-lens",
  "semantic-tokens",
  "folding-range",
  "formatting",
  "inlay-hint"
]

[[bin]]
name = "ggen-lsp"
path = "src/main.rs"

[lints]
workspace = true

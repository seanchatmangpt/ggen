[package]
name = "ggen-daemon"
version = "0.1.0"
edition = "2021"
description = "Cron-driven commit campaign daemon — reads cron-schedule.ttl via SPARQL, dispatches ggen sync per bundle"

[[bin]]
name = "ggen-daemon"
path = "src/main.rs"

[lib]
name = "ggen_daemon"
path = "src/lib.rs"

[dependencies]
ggen-core = { path = "../ggen-core" }
rmcp = { version = "1.8.0", features = ["transport-io", "schemars"] }
oxigraph = { version = "0.5.8", features = ["rdf-12"] }
tokio = { version = "1", features = ["full"] }
thiserror = "2.0"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.18", features = ["v4", "serde"] }
schemars = "1.2.1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
rusqlite = { version = "0.40" }
reqwest = { workspace = true }
notify = { workspace = true }
notify-debouncer-full = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }

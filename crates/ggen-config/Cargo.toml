[package]
name = "ggen-config"
description = "Configuration parser and validator for ggen.toml files"
readme = "README.md"
keywords = ["config", "toml", "parsing", "validation"]
categories = ["development-tools", "command-line-utilities"]
homepage = "https://github.com/seanchatmangpt/ggen"

[package.version]
workspace = true

[package.authors]
workspace = true

[package.edition]
workspace = true

[package.license]
workspace = true

[package.repository]
workspace = true

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
star-toml = "26.7.3"
toml = "1.1.0"
# JsonSchema derive for the `[[generation.rules]]` types consumed by ggen-engine's
# declarative-rules sync path (specs/014-ggen-core-replacement, T070) -- load-bearing for
# tests/ggen_manifest_schema_match.rs in ggen-engine, matching the same
# schemars::schema_for!-vs-TTL contract already used for ggen-engine's own
# tests/ggen_toml_schema_match.rs.
schemars = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
tokio = { version = "1.47", features = ["sync"] }
chrono = { version = "0.4", features = ["serde"] }
# User-level MCP/A2A config file resolution (~/.ggen/mcp/config.json, ~/.ggen/a2a.toml) --
# needed by `domain::mcp_config`'s `load_config` priority chain (specs/014-ggen-core-replacement,
# docs/jira/v26.7.16/12-OPEN-QUESTIONS.md item 2). Same version already used by ggen-core,
# ggen-cli, ggen-marketplace.
dirs = "6.0"
ed25519-dalek = { workspace = true }
sha2 = "0.10"
hex = "0.4"
rand_core = { version = "0.6", features = ["getrandom"] }
rand = "0.8"
blake3 = "1.5"
# Non-fatal manifest-validation warnings (missing ORDER BY, duplicate rule order) --
# ported verbatim from ggen-core/src/manifest/validation.rs's `log::warn!` calls, matching
# the facade ggen-cli (this crate's consumer) already uses directly.
log = { workspace = true }

[dev-dependencies]
tempfile = "3"
# `#[tokio::test]` (used in hive_coordinator + ontology_integration tests) needs
# the macros + runtime features; the production `tokio` dep above intentionally
# keeps only `sync` to stay lean. Cargo unifies these for the test build.
tokio = { version = "1.47", features = ["macros", "rt", "rt-multi-thread"] }

[lints]
workspace = true

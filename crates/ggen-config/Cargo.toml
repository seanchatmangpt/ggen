[package]
name = "ggen-config"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "Configuration parser and validator for ggen.toml files"
keywords = ["config", "toml", "parser"]
categories = ["config"]
repository.workspace = true

[dependencies]
# Core dependencies
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
anyhow = { workspace = true }
ggen-utils = { workspace = true }

# Optional dependencies for advanced features
ggen-core = { workspace = true, optional = true }
ggen-domain = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = []
graph = ["ggen-core"]
ontology = ["ggen-domain"]
full = ["graph", "ontology"]

[lints]
workspace = true

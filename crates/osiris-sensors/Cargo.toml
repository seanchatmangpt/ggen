[package]
name = "osiris-sensors"
version = "0.1.0"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
edition = "2021"
description = "OSIRIS Sensors - Apple/Android Sensor Integration for Autonomic Life Management"
repository = "https://github.com/seanchatmangpt/ggen"
license = "MIT"
keywords = ["autonomic", "sensors", "apple", "android", "life-management"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
a2a-generated = { path = "../a2a-generated", optional = true }
osiris-core = { path = "../osiris-core", version = "0.1.0" }

[target.'cfg(target_os = "ios")'.dependencies]
# iOS specific dependencies
tokio = { workspace = true, features = ["full"] }

[target.'cfg(target_os = "android")'.dependencies]
# Android specific dependencies
tokio = { workspace = true, features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.13"
proptest = "1.8"

[features]
default = []
apple = []
android = []
autonomic = ["a2a-generated"]
full = ["apple", "android", "autonomic"]
test-utils = []

[lib]
path = "src/lib.rs"
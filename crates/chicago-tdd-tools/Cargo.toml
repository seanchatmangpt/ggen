[package]
name = "chicago-tdd-tools"
version = "26.7.1"
edition = "2021"
authors = ["KNHK Team"]
license = "MIT"
description = "Chicago TDD testing framework and tools for Rust projects"
repository = "https://github.com/seanchatmangpt/chicago-tdd-tools"
publish = false

[lib]
name = "chicago_tdd_tools"
path = "src/lib.rs"

[dependencies]
lsp-types = { version = "0.94", optional = true }
tokio = { version = "^1.0", features = ["rt", "rt-multi-thread", "macros"] }
futures = "^0.3"
serde = { version = "^1.0", features = ["derive"] }
serde_json = "^1.0"
serde_yaml = "0.9"
toml = "0.8"
uuid = { version = "^1.0", features = ["v4"] }
chrono = "^0.4"
sha2 = "^0.10"
hex = "^0.4"
thiserror = "^2.0"
testcontainers = { version = "^0.27", optional = true, features = ["blocking"] }
log = { version = "^0.4", optional = true }
reqwest = { version = "0.12", optional = true, features = ["blocking"] }
tempfile = { version = "^3.0", optional = true }
opentelemetry = { version = "^0.31", optional = true, default-features = false, features = [
  "trace",
] }
opentelemetry_sdk = { version = "^0.31", optional = true, default-features = false, features = ["trace"] }
opentelemetry-otlp = { version = "^0.31", optional = true, default-features = false, features = [
  "grpc-tonic",
  "trace",
] }
insta = { version = "^1.40", optional = true }
proptest = { version = "^1.5", optional = true }
arbitrary = { version = "^1.4", optional = true }
fake = { version = "^3.0", optional = true, features = ["derive"] }
loom = { version = "^0.7", optional = true }
wasm4pm-compat = { version = "26.6.26", optional = true, features = ["formats"] }
blake3 = { version = "1", optional = true }
dashmap = { version = "^6.0", optional = true }
tracing = { version = "^0.1", optional = true }
rstest = { version = "^0.19", optional = true }
trycmd = { version = "^0.15", optional = true }
git2 = { version = "^0.20", optional = true }
chicago-tdd-tools-proc-macros = { version = "26.7.1", path = "proc_macros" }

# Needed by #[cfg(test)] unit tests embedded in src/ (loading.rs,
# invariant_properties.rs, macros/test.rs) -- these were dropped when this
# vendored copy trimmed the original's [dev-dependencies] to match its own
# trimmed tests/examples/benches (none of that was copied), but unit tests
# inside src/ still need them.
[dev-dependencies]
tempfile = "^3.0"
proptest = "1.5"
tokio-test = "^0.4"

[features]
governance-tests = ["dep:lsp-types"]
default = ["logging"]
workflow-engine = []
mutation-testing = []
async = []
benchmarking = []
property-testing = ["dep:proptest", "dep:arbitrary"]
snapshot-testing = ["dep:insta"]
fake-data = ["dep:fake"]
concurrency-testing = ["dep:loom"]
ocel-generation = ["dep:wasm4pm-compat", "dep:dashmap", "dep:tracing", "dep:blake3"]
ocel-generation-discovery = ["ocel-generation", "wasm4pm-compat/wasm4pm"]
receipt-validation = ["dep:blake3"]
parameterized-testing = ["dep:rstest"]
cli-testing = ["dep:trycmd"]
git-hooks = ["dep:git2"]
cli-proof = ["dep:tempfile"]
otel = []
weaver = [
  "otel",
  "dep:reqwest",
  "dep:opentelemetry",
  "dep:opentelemetry_sdk",
  "dep:opentelemetry-otlp",
  "dep:tempfile",
]
testcontainers = ["dep:testcontainers"]
logging = ["dep:log"]
testing-extras = ["property-testing", "snapshot-testing", "fake-data"]
testing-full = [
  "property-testing",
  "snapshot-testing",
  "mutation-testing",
  "concurrency-testing",
  "parameterized-testing",
  "cli-testing",
  "fake-data",
]
observability-full = ["otel", "weaver"]
integration-full = ["testcontainers", "weaver"]

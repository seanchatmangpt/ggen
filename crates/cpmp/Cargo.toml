[package]
name = "cpmp"
version = "0.1.0"
edition = "2021"

[dependencies]
uuid = { version = "1.8", features = ["v4"] }
clap = { version = "4.0", features = ["derive"] }
rusqlite = { version = "0.40.0", features = ["bundled"] }
anyhow = "1.0"
blake3 = "1.4"
chrono = { version = "0.4", features = ["serde"] }
ignore = "0.4"
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1.0"
walkdir = "2.4"

[lints]
workspace = true

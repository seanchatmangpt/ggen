[package]
name = "cpmp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Computer Project Mapping Protocol — scanner, capability classification, projection, receipts."
repository.workspace = true

[dependencies]
uuid = { workspace = true }
clap = { workspace = true } # framework requirement of clap-noun-verb's #[verb]/#[arg] (no raw clap usage)
clap-noun-verb = { workspace = true }
clap-noun-verb-macros = { workspace = true }
linkme = "0.3" # required by clap-noun-verb's #[verb] for distributed verb registration
rusqlite = { version = "0.40.0", features = ["bundled"], optional = true }
anyhow = { workspace = true }
blake3 = { workspace = true }
chrono = { workspace = true }
ignore = "0.4"
oxigraph = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
walkdir = "2.4"

[features]
# Optional SQLite catalog backend. Off by default so the core scanner/receipt
# engine builds without rusqlite/libsqlite3-sys (which needs a bundled C
# sqlite + unstable `cfg_select` and was the cpmp build blocker). The DB layer
# was unused dead code; gate it until a real persistence backend is wired.
default = []
sqlite = ["dep:rusqlite"]

[lints]
workspace = true

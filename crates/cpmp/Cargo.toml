[package]
name = "cpmp"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Computer Project Mapping Protocol — scanner, capability classification, projection, receipts."
repository = "https://github.com/seanchatmangpt/ggen"

[dependencies]
uuid = { version = "1.8", features = ["v4"] }
clap-noun-verb = { workspace = true }
clap-noun-verb-macros = { workspace = true }
rusqlite = { version = "0.40.0", features = ["bundled"] }
anyhow = "1.0"
blake3 = "1.4"
chrono = { version = "0.4", features = ["serde"] }
ignore = "0.4"
oxigraph = { workspace = true }
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = { workspace = true }
toml = "1.1.0"
walkdir = "2.4"

[lints]
workspace = true

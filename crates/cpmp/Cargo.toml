[package]
name = "cpmp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Computer Project Mapping Protocol — scanner, capability classification, projection, receipts."
repository.workspace = true
homepage = "https://github.com/seanchatmangpt/ggen"
keywords = ["ontology", "catalog", "scanner", "receipts", "capability"]
categories = ["development-tools"]

[dependencies]
uuid = { workspace = true }
clap = { workspace = true } # framework requirement of clap-noun-verb's #[verb]/#[arg] (no raw clap usage)
clap-noun-verb = { workspace = true }
clap-noun-verb-macros = { workspace = true }
linkme = "0.3" # required by clap-noun-verb's #[verb] for distributed verb registration
rusqlite = { version = "0.40.0", features = ["bundled"], optional = true }
anyhow = { workspace = true }
blake3 = { workspace = true }
chrono = { workspace = true }
ignore = "0.4"
oxigraph = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
walkdir = "2.4"

[features]
# Optional SQLite catalog backend. Off by default so the core scanner/receipt
# engine builds without rusqlite/libsqlite3-sys (which needs a bundled C
# sqlite + unstable `cfg_select` and was the cpmp build blocker). The DB layer
# was unused dead code; gate it until a real persistence backend is wired.
default = []
# NOTE: enabling `sqlite` requires a nightly Rust toolchain. It pulls in
# rusqlite's "bundled" feature, which transitively depends on a libsqlite3-sys
# version whose build script uses the unstable `cfg_select!` macro. This is
# not usable on stable Rust; do not enable this feature outside the pinned
# nightly toolchain configured in `rust-toolchain.toml`.
sqlite = ["dep:rusqlite"]

[lints]
workspace = true

[package]
name = "ggen-lsp-mcp"
version = "26.6.11"
edition = "2021"
description = "MCP server exposing ggen-lsp repair routes as a tool (leaf crate — avoids the ggen-core↔ggen-a2a-mcp cycle)."

[dependencies]
# Leaf crate: depends on ggen-lsp, never the reverse. ggen-a2a-mcp must NOT
# depend on ggen-lsp (ggen-core already depends on ggen-a2a-mcp → that direction
# cycles); a separate leaf MCP server is the cycle-free way to ship the tool.
ggen-lsp = { version = "26.6.11", path = "../ggen-lsp" }
rmcp = { version = "1.7.0", features = ["transport-io", "schemars"] }
schemars = "1.2.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"

[dev-dependencies]
tempfile = "3.23"
# Spawn the real `ggen-lsp-mcp` binary to drive the MCP stdio protocol in tests.
assert_cmd = "2"

[[bin]]
name = "ggen-lsp-mcp"
path = "src/main.rs"

[lints]
workspace = true

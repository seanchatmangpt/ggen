[package]
name = "ggen-canonical"
version = "6.1.0"
edition = "2021"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"
description = "Deterministic canonicalization system for ggen - ensures reproducible hashes across code, JSON, and RDF"
repository = "https://github.com/seanchatmangpt/ggen"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
oxigraph = { workspace = true }

[features]
integration = []

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }

[[test]]
name = "property_tests"
path = "tests/property_tests.rs"
required-features = ["integration"]

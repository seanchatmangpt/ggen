[package]
name = "praxis-graphlaw"
version = "26.7.9"
edition = "2021"
description = "Praxis GraphLaw law-state engine: native N3, Datalog, SPARQL 1.1, SHACL, ShEx (fork of pbonte/roxi)"
license = "MIT"
repository = "https://github.com/seanchatmangpt/ggen"
publish = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
deepmesa-collections = "0.14.0"
bencher = "0.1.5"
log = { version = "0.4"}
env_logger = "0.11.11"
spargebra = "=0.4.6"
sparesults = "=0.3.3"


rio_api = "0.8.6"
rio_turtle = "0.8.6"
rio_xml = "0.8.6"
pest = "2.8.7"
pest_derive = "2.8.7"
either = "1.16.0"
once_cell = "1.21.4"
oxrdf = { version = "=0.3.3", features = ["rdfc-10"] }
regex = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha1 = "0.11.0"
sha2 = "0.11.0"
blake3 = "1"
md5 = "0.8.0"
rustc-hash = "2"
smallvec = { version = "1", features = ["serde"] }
fixedbitset = "0.5"
oxigraph = { version = "0.5.9", features = ["rdf-12"] }
powl2-decompose = { path = "/Users/sac/praxis/crates/powl2-decompose" }
bcinr-pddl = { path = "/Users/sac/bcinr/crates/bcinr-pddl" }
bcinr-powl = { path = "/Users/sac/bcinr/crates/bcinr-powl" }
bcinr-powl-receipt = { path = "/Users/sac/bcinr/crates/bcinr-powl-receipt" }
thiserror = "2"
# compat owns receipt identity; all chatman hashing routes through wasm4pm_compat::hash.
wasm4pm-compat = { path = "/Users/sac/wasm4pm-compat", version = "26.6.29" }
wasm4pm-cognition = { path = "/Users/sac/wasm4pm/crates/wasm4pm-cognition", optional = true }

[features]
cognition = ["dep:wasm4pm-cognition"]

[lib]
name = "praxis_graphlaw"

[[bench]]
name = "bench"
harness = false

[[bench]]
name = "hierarchies"
harness = false

[[bench]]
name = "dialects"
harness = false

[[bench]]
name = "blue_river_dam"
harness = false

[[bench]]
name = "owlrl"
harness = false

[[bench]]
name = "daily_standing"
harness = false

[[bench]]
name = "business_logic_replacement"
harness = false

[dev-dependencies]
divan = "0.1"
# Seeded fake-data generation for test fixtures only (anti-hardcoding proof in
# chatman_pddl_to_powl_projection); never a production dependency.
fake = "4"
rand = "0.9"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
proptest = "1.5"
# Required for chicago_tdd_tools::async_test! (expands to #[tokio::test]).
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
# otel/weaver features left OFF: they drag network deps into the required build.
chicago-tdd-tools = { path = "/Users/sac/chicago-tdd-tools", features = [
    "property-testing",
    "snapshot-testing",
    "parameterized-testing",
    "mutation-testing",
    "concurrency-testing",
    "cli-proof",
    "receipt-validation",
    "ocel-generation",
] }

[[bin]]
name = "ggen"
path = "src/main.rs"

[[test]]
name = "e2e"
path = "tests/e2e.rs"
required-features = [ "integration",]

[[test]]
name = "paas_integration_test"
path = "tests/paas_integration_test.rs"
required-features = [ "integration",]

[[test]]
name = "sabotage_tests"
path = "tests/sabotage_tests.rs"
required-features = [ "integration",]

[[test]]
name = "doctor_adversarial_tests"
path = "tests/doctor_adversarial_tests.rs"
required-features = [ "integration",]

[[test]]
name = "packs"
path = "tests/packs/mod.rs"


[package]
name = "ggen-cli-lib"
description = "CLI interface for ggen"
keywords = [ "cli", "code-generation", "rdf", "templates",]
categories = [ "development-tools", "command-line-utilities",]

[lib]
name = "ggen_cli_lib"
path = "src/lib.rs"

[dependencies]
serde_yaml = "0.9"
log = "0.4.28"
clap_complete = "4.5.58"
sha2 = "0.10"
ed25519-dalek = "2.1"
dotenvy = "0.15"
glob = "0.3"
semver = "1.0"
dirs = "6.0"
walkdir = "2.5"
colored = "3.0"
indicatif = "0.17"
linkme = "0.3"
notify = "6.1"
notify-debouncer-full = "0.3"
tar = "0.4"
flate2 = "1.0"
md5 = "0.8"
ggen-a2a-mcp = { version = "26.5.29", path = "../ggen-a2a-mcp" }
# Delivery plane (LSP verbs + MCP route server) — opt-in via the `lsp` feature so
# the core `ggen` binary stays lean (no qlue-ls / rmcp / oxigraph-via-lsp by default).
ggen-lsp = { version = "26.5.29", path = "../ggen-lsp", optional = true }
ggen-lsp-mcp = { version = "26.5.29", path = "../ggen-lsp-mcp", optional = true }
blake3.workspace = true

[features]
autonomic = []
paas = []
live-llm-tests = []
integration = []
# Umbrella feature for the LSP/MCP delivery plane (the `ggen lsp` noun + all its
# verbs, incl. `serve --protocol mcp`). Off by default; enable with --features lsp.
lsp = ["dep:ggen-lsp", "dep:ggen-lsp-mcp"]
# Archive gate for ambiguous nouns not provable as finished in v26.5.28:
# a2a, framework, mcp, sigma, wizard. Off by default — these nouns leave the
# default CLI surface (clap-noun-verb discovers nouns from compiled `pub mod`s,
# so a cfg-gated module is genuinely absent), while the code is preserved as
# fossil evidence (non-deletion doctrine). See docs/reference/release/v26-5-28-boundary.md.
experimental = []
default = []

[dev-dependencies]
serial_test = { workspace = true }
libc = "0.2"
assert_cmd = "2"
assert_fs = "1"

predicates = "3"
mockall = "0.13"
tempfile = "3.23"
serde_yaml = "0.9"
serde_json = "1.0"
tokio-test = "0.4"
notify = "6.1"
httpmock = "0.7"


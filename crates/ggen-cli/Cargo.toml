# OTLP telemetry (ported from ggen-core/src/telemetry.rs, T034). Unconditional:
# ggen-cli's now-removed [dependencies.ggen-core] (2026-07-16, ggen-core
# disconnect, T054-T058) had always hardcoded features = ["otel"], so every
# ggen-cli build had always compiled OTEL in regardless of ggen-cli's own
# feature selection — this port keeps that same always-on behavior directly
# rather than fabricating a new toggle.
[dependencies.opentelemetry]
workspace = true

[dependencies.opentelemetry-otlp]
workspace = true

[dependencies.opentelemetry_sdk]
workspace = true

[dependencies.tracing-opentelemetry]
workspace = true

[dependencies.tracing-subscriber]
workspace = true


[[bin]]
name = "ggen"
path = "src/main.rs"

[[test]]
name = "e2e"
path = "tests/e2e.rs"
required-features = [ "integration",]

[[test]]
name = "sabotage_tests"
path = "tests/sabotage_tests.rs"
required-features = [ "integration",]

[[test]]
name = "doctor_adversarial_tests"
path = "tests/doctor_adversarial_tests.rs"
required-features = [ "integration",]

[[test]]
name = "packs"
path = "tests/packs/mod.rs"

[[test]]
name = "cli_proof_tests"
path = "tests/generated/cli_proof_tests.rs"

[package]
name = "ggen-cli-lib"
description = "CLI interface for ggen"
keywords = [ "cli", "code-generation", "rdf", "templates",]
categories = [ "development-tools", "command-line-utilities",]
# publish = false (2026-07-16, v26.7.16 CLI-routing flip): this crate's sync/graph/receipt/
# doctor/law commands now dispatch through ggen-engine (see src/lib.rs's `use ggen_engine as
# _;` and the removed cmds/{sync,doctor,graph,receipt}.rs mod decls), which is itself
# `publish = false` -- praxis-core/praxis-graphlaw carry hard absolute-path deps on sibling
# repos (/Users/sac/bcinr/crates/*, /Users/sac/wasm4pm-compat) that only exist on this
# machine, so it can never resolve on crates.io. That dependency is real and functional now
# (not a leaf/unused re-export like root's formerly-was), so `cargo publish --dry-run -p
# ggen-cli-lib` can never pass while it exists, confirmed via `cargo publish --dry-run`.
# `ggen` (the root library crate, `cargo add ggen`) stays independently publishable -- its own
# now-dead ggen-engine re-export was already removed. Only this crate's CLI binary is affected:
# the full "ggen" CLI remains available by building from the git repo, just not via
# `cargo install ggen-cli-lib` from crates.io going forward. See task #35 in the migration
# session tracker and docs/jira/v26.7.16/ tickets 01/02 for the full reasoning.
publish = false

[lib]
name = "ggen_cli_lib"
path = "src/lib.rs"

[dependencies]
serde_yaml = "0.9"
log = "0.4.28"
clap_complete = "4.5.58"
sha2 = "0.10"
ed25519-dalek = "2.1"
dotenvy = "0.15"
glob = "0.3"
semver = "1.0"
dirs = "6.0"
walkdir = "2.5"
colored = "3.0"
indicatif = "0.17"
linkme = "0.3"
notify = "6.1"
notify-debouncer-full = "0.3"
tar = "0.4"
flate2 = "1.0"
md5 = "0.8"
# Delivery plane (LSP verbs + MCP route server + A2A protocol) — opt-in via the
# `lsp`/`experimental` features so the core `ggen` binary stays lean (no
# qlue-ls / rmcp / oxigraph-via-lsp by default). ggen-a2a-mcp and ggen-lsp-mcp
# were absorbed into ggen-lsp (behind its own mcp/a2a features) in the 2026-07
# crate-consolidation pass — see CRATE_CONSOLIDATION_ANALYSIS_2026-07-01.md.
ggen-lsp = { version = "26.7.2", path = "../ggen-lsp", optional = true }
blake3.workspace = true
# Used by scaffolding::transaction::FileTransaction (ported from ggen-core/src/codegen/
# transaction.rs, Phase 3 non-colliding noun re-points). Was previously only a dev-dependency
# (see [dev-dependencies] below) — FileTransaction is production code, not test-only, so it
# needs to be a regular dependency now.
parking_lot = { workspace = true }
tempfile = "3.23"

[features]
autonomic = []
live-llm-tests = []
integration = []
# Umbrella feature for the LSP/MCP delivery plane (the `ggen lsp` noun + all its
# verbs, incl. `serve --protocol mcp`). Off by default; enable with --features lsp.
lsp = ["dep:ggen-lsp", "ggen-lsp/mcp"]
# Archive gate for ambiguous nouns not provable as finished in v26.5.28:
# a2a, framework, mcp, sigma, wizard. Off by default — these nouns leave the
# default CLI surface (clap-noun-verb discovers nouns from compiled `pub mod`s,
# so a cfg-gated module is genuinely absent), while the code is preserved as
# fossil evidence (non-deletion doctrine). See docs/reference/release/v26-5-28-boundary.md.
# Pulls in ggen-lsp's `a2a` feature (which implies `mcp`) for cmds/a2a.rs and cmds/mcp.rs.
experimental = ["dep:ggen-lsp", "ggen-lsp/a2a"]
# Gate for test files exercising CLI surfaces retired by the v26.7.16 sync/
# doctor/graph/receipt routing flip to ggen-engine (see cmds/mod.rs), plus
# (2026-07-16, ggen-core disconnect) `inverse_sync`, `mcp_command_test`,
# `coherence_gate_test`, `sync_command_test`, `ontology_command_test`,
# `utils_command_test`, `graph_command_test`, and (2026-07-17) `pack_cache_test`
# -- the remaining real ggen-core consumers. Most have no ggen-engine/
# ggen-graph port destination (verified via workspace-wide search);
# `pack_cache_test` is the one exception -- ggen_marketplace::marketplace::
# {cache,models} already exposes a structurally-matching API and is a live
# dependency of this crate, but porting it has not been done (see that
# file's own header). Empty by design --
# enabling it does not restore the old behavior. ggen-core is no longer a
# dependency of this crate (see [dependencies] above), so enabling this
# feature now produces a broken build; it exists only so the
# `#![cfg(...)]` gates on the archived files compile cleanly with the
# feature off.
ggen-core-retired = []
default = []


[package]
name = "ggen-lsp-a2a"
version = "26.5.21"
edition = "2021"
description = "A2A bridge exposing the ggen-lsp-mcp route engine as an A2A agent (leaf crate — cycle-free; ggen-a2a-mcp never depends on ggen-lsp)."

[dependencies]
# Leaf bridge: depends on ggen-lsp-mcp (the route tools) + ggen-a2a-mcp (the A2A
# Adapter primitives). Nothing depends back, and ggen-a2a-mcp must NOT depend on
# ggen-lsp — so the ggen-core → ggen-a2a-mcp edge stays acyclic.
ggen-lsp-mcp = { version = "26.5.21", path = "../ggen-lsp-mcp" }
ggen-a2a-mcp = { version = "26.5.21", path = "../ggen-a2a-mcp" }
serde_json = "1"
async-trait = "0.1"

[dev-dependencies]
# The triad stress test drives all three channels: ggen-lsp (capture), ggen-lsp-mcp
# (MCP), ggen-lsp-a2a (A2A). ggen-lsp as a dev-dep is cycle-free (ggen-lsp never
# depends on this crate).
ggen-lsp = { version = "26.5.21", path = "../ggen-lsp" }
tokio = { version = "1", features = ["macros", "rt"] }
tempfile = "3.23"

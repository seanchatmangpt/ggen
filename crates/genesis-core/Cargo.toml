[package]
name = "genesis-core"
version = "26.5.29"
edition = "2021"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
description = "Pure mathematical foundation for the Genesis-bearing interchangeable parts architecture (A = μ(O))."
repository = "https://github.com/seanchatmangpt/ggen"

[dependencies]
# Use blake3 for deterministic cryptographic receipts, configured for no_std
blake3 = { version = "1.5", default-features = false, features = ["pure"] }

[features]
default = []
std = ["blake3/std"]

[lints]
workspace = true

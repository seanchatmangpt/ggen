[package]
name = "stpnt"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/seanchatmangpt/ggen"
description = "Stewards of the Pentecost - Canonical Stewardship Cell Implementation"

[dependencies]
genesis-core-v2 = { path = "../genesis-core-v2", version = "26.6.23" }
genesis-types = { path = "../genesis-types-v2", version = "26.6.23" }
ggen-core = { path = "../ggen-core", version = "26.6.23" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4"] }
blake3 = "1.5"
anyhow = "1.0"
async-trait = "0.1"
tokio = { version = "1.0", features = ["full"] }

[lints]
workspace = true

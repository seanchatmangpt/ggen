[package]
name = "stpnt"
version = "0.1.0"
edition = "2021"
description = "Stewards of the Pentecost - Canonical Stewardship Cell Implementation"

[dependencies]
genesis-core-v2 = { path = "../genesis-core-v2" }
genesis-types = { path = "../genesis-types-v2" }
genesis-lockchain = { path = "../genesis-lockchain" }
ggen-core = { path = "../ggen-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4"] }
blake3 = "1.5"
anyhow = "1.0"
async-trait = "0.1"
tokio = { version = "1.0", features = ["full"] }

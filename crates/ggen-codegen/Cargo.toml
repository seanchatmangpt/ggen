[package]
name = "mcpp-codegen"
version = "26.5.4"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
edition = "2021"
description = "Generic code generation framework: trait-based, zero-cost abstractions"
license = "MIT"
repository = "https://github.com/seanchatmangpt/mcpp"

[dependencies]
sha2 = "0.10"
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
proptest = "1.8"

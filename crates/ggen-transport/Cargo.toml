[package]
name = "ggen-transport"
version.workspace = true
edition.workspace = true
authors = ["ggen contributors"]
description = "MCP/A2A transport layer with streaming support"
license.workspace = true

[dependencies]
tokio = { version = "1.41", features = ["full"] }
tonic = "0.12"
prost = "0.13"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = "0.1"
uuid = { version = "1.11", features = ["v4", "serde"] }
async-trait = "0.1"
bytes = { version = "1.9", features = ["serde"] }
futures = "0.3"
url = "2.5"
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", features = ["json"] }

[features]
integration = []

[dev-dependencies]
tokio-test = "0.4"
mockito = "1.6"
proptest = "1.6"

[[test]]
name = "mcp_test"
path = "tests/mcp_test.rs"
required-features = ["integration"]

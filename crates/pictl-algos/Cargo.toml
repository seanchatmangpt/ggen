[package]
name = "pictl-algos"
version.workspace = true
edition = "2021"
license = "MIT OR Apache-2.0"
description = "High-performance, branchless algorithm implementations for pictl process mining"
repository = "https://github.com/seanchatmangpt/pictl"
documentation = "https://docs.rs/pictl-algos"
readme = "README.md"

[dependencies]
pictl-types = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hashbrown = { workspace = true }
smallvec = { workspace = true }
itertools = { workspace = true }
bcinr = { workspace = true, optional = true }

[features]
bcinr = ["dep:bcinr"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

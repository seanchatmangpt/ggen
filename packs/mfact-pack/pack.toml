[pack]
name = "mfact-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from domain vocabulary for ~/mfact (README title: 'mfact / procint'), a receipted mathematical-manufacturing pipeline where ggen itself projects a Lean 4 declaration catalog that Lean admits and mfact certifies -- a real, in-the-wild downstream consumer of ggen, not merely an analogous project. Modeled from its README: the 3-actor pipeline (ggen projects -> Lean admits -> mfact certifies) and its 5 top-level authority directories (packs/, procint/, paper/, release/, .mfact/artifacts.toml). Also generates its own anti-drift proof test (tests/mfact_catalog_proof.rs) asserting the rendered catalog against literal values hand-transcribed from ontology.ttl."

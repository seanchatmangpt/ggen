[pack]
name = "mfw-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from domain vocabulary for ~/mfw (MFW monorepo), a receipted process-consequence system. Modeled from its AGENTS.md: the 10-stage observe->admit->preserve standing->calculate residual->manufacture candidate->verify->authorize->actuate->receipt->replay cycle, and its 9 top-level authority-surface directories (ontology/, profiles/, transform/, mfw-theory/, runtime/, verifier/, fixtures/, docs/, receipts/). No per-crate description fields were populated in mfw-runtime/mfw-meaning/mfw-powl-miner/mfw-shacl's own Cargo.toml files (confirmed empty this pass), so those 4 workspace crates are named but not further characterized here. Also generates its own anti-drift proof test (templates/mfw_catalog_proof.rs.tmpl -> tests/mfw_catalog_proof.rs), hand-transcribed against the ontology with no SPARQL of its own so it cannot re-derive its expected values from the same query path the catalog does."

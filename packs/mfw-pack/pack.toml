[pack]
name = "mfw-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc + real transition-dispatch logic, generated from domain vocabulary for ~/mfw (MFW monorepo), a receipted process-consequence system. Modeled from its AGENTS.md: the 10-stage observe->admit->preserve standing->calculate residual->manufacture candidate->verify->authorize->actuate->receipt->replay cycle (asserted as explicit mfw:nextStage graph edges, not just an mfw:order integer), and its 9 top-level authority-surface directories (ontology/, profiles/, transform/, mfw-theory/, runtime/, verifier/, fixtures/, docs/, receipts/) -- each now also carrying a real mfw:standingAuthority boolean per ~/mfw/AGENTS.md's own law (docs/ is the one surface that never carries standing authority; every other surface does), driving a generated is_standing_authority(path) dispatch function rather than a hardcoded Rust special case. No per-crate description fields were populated in mfw-runtime/mfw-meaning/mfw-powl-miner/mfw-shacl's own Cargo.toml files (confirmed empty this pass), so those 4 workspace crates are named but not further characterized here. Generates real next_stage()/is_valid_transition()/is_standing_authority() dispatch driven entirely by ontology data (not hardcoded arithmetic or string comparisons), plus a self-check test module embedded directly in the generated catalog (mfw_catalog.rs.tmpl) whose expected counts -- including a non-standing-authority count -- come from independently-shaped SPARQL COUNT(...) aggregate queries, catching catalog/ontology drift on every `cargo test` without a human re-transcription step for those counts. The separate templates/mfw_catalog_proof.rs.tmpl proof (-> tests/mfw_catalog_proof.rs) remains additionally hand-transcribed against the ontology for the row-content spot checks (not just counts, now including the standing-authority rule spot check), and templates/mfw_catalog_mod_wiring.rs.tmpl writes `pub mod mfw_catalog;` to a pack-unique file (src/mfw_lib_wiring.rs, force:true) rather than injecting into the consumer's shared src/lib.rs -- that retarget (this pack originally targeted src/lib.rs with inject:true) was required once a real multi-pack consumer wired 2 packs doing the same thing and hit this engine's FM-WRITE-008 duplicate-output guard; the consumer must add one `include!(\"mfw_lib_wiring.rs\");` line to their own src/lib.rs, a real, disclosed remaining consumer-effort step, not zero. The ontology also carries a machine-readable mfw:SourceSnapshot (exact ~/mfw commit hash + date this pack was transcribed from) instead of only a prose claim -- ~/mfw remains a separate repository this workspace does not own, so its RDF cannot be imported directly as a live dependency."

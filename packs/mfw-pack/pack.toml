[pack]
name = "mfw-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc + real transition-dispatch logic, generated from domain vocabulary for ~/mfw (MFW monorepo), a receipted process-consequence system. Modeled from its AGENTS.md: the 10-stage observe->admit->preserve standing->calculate residual->manufacture candidate->verify->authorize->actuate->receipt->replay cycle (now also asserted as explicit mfw:nextStage graph edges, not just an mfw:order integer), and its 9 top-level authority-surface directories (ontology/, profiles/, transform/, mfw-theory/, runtime/, verifier/, fixtures/, docs/, receipts/). No per-crate description fields were populated in mfw-runtime/mfw-meaning/mfw-powl-miner/mfw-shacl's own Cargo.toml files (confirmed empty this pass), so those 4 workspace crates are named but not further characterized here. Generates a real next_stage()/is_valid_transition() dispatch pair driven by mfw:nextStage edges (not hardcoded arithmetic), plus a self-check test module embedded directly in the generated catalog (mfw_catalog.rs.tmpl) whose expected counts come from independently-shaped SPARQL COUNT(...) aggregate queries -- catching catalog/ontology drift on every `cargo test` without a human re-transcription step for those counts. The separate templates/mfw_catalog_proof.rs.tmpl proof (-> tests/mfw_catalog_proof.rs) remains additionally hand-transcribed against the ontology for the row-content spot checks (not just counts), and templates/mfw_catalog_mod_wiring.rs.tmpl injects `pub mod mfw_catalog;` into the consumer's src/lib.rs automatically (inject: true, after: \"// GGEN-INJECT: mod-root\") so no manual module-wiring step remains after `ggen sync run`. The ontology also carries a machine-readable mfw:SourceSnapshot (exact ~/mfw commit hash + date this pack was transcribed from) instead of only a prose claim -- ~/mfw remains a separate repository this workspace does not own, so its RDF cannot be imported directly as a live dependency."

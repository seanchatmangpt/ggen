[pack]
name = "mfw-pack"
version = "0.1.0"
description = "Domain vocabulary for ~/mfw (MFW monorepo), a receipted process-consequence system. Modeled from its AGENTS.md: the 10-stage observe->admit->preserve standing->calculate residual->manufacture candidate->verify->authorize->actuate->receipt->replay cycle, and its 9 top-level authority-surface directories (ontology/, profiles/, transform/, mfw-theory/, runtime/, verifier/, fixtures/, docs/, receipts/). No per-crate description fields were populated in mfw-runtime/mfw-meaning/mfw-powl-miner/mfw-shacl's own Cargo.toml files (confirmed empty this pass), so those 4 workspace crates are named but not further characterized here."

[pack]
name = "mcpp-pack"
version = "0.1.0"
description = "Typed Rust catalog + subprocess dispatch shim + reference doc, generated from command-surface vocabulary for ~/mcpp (MCP+ admissible-work runtime, real dependency: clap-noun-verb = \"5\", confirmed via its Cargo.toml). Reuses packs/clap-noun-verb-pack's cnv: vocabulary (IRI reuse), including cnv:args for real argument facts. The 9 commands were originally grepped from ~/mcpp/README.md, then hand-verified on 2026-07-18 against the real #[verb] function signatures at pinned commit ae1106887a824f107dc8ac76daff6ef1b8dbf6c4 (see ontology.ttl's header for file:line citations) -- that pass found and fixed one real fidelity bug (relay's real verb is 'verify-chain', not 'verify'). Still a partial command surface: these 9 are not every #[verb] in ~/mcpp/crates/mcpp-server/src/cmds/. Generates: src/mcpp_catalog.rs (typed noun/verb/doc/args table), src/mcpp_dispatch.rs (a real, compilable, ontology-driven std::process::Command dispatch shim -- one generated wrapper fn per command, no hand-written handler required), docs/mcpp_reference.md, an inject-mode src/lib.rs mod-wiring template (no hand mod-edit required by the consumer), tests/mcpp_catalog_proof.rs (hand-transcribed, non-tautological data-table proof) and tests/mcpp_dispatch_proof.rs (real behavior proof: introspects the actual std::process::Command built by each generated wrapper). All generated outputs use freeze_policy=checksum (not force:true): a hand-edit to a generated file is detected and the next sync skips it with an explicit 'manual edit detected' receipt entry instead of silently clobbering it."

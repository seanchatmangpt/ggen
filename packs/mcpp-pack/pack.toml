[pack]
name = "mcpp-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from command-surface vocabulary for ~/mcpp (MCP+ admissible-work runtime, real dependency: clap-noun-verb = \"5\", confirmed via its Cargo.toml). Reuses packs/clap-noun-verb-pack's cnv: vocabulary (IRI reuse). The 9 commands below are only the ones this pass could confirm by grepping literal `mcpp <noun> <verb>` invocations in ~/mcpp/README.md -- README-derived and known-partial (the README's own 'K-P09/A-P09/Z-P09 doctrine' and '19 probe families' language was NOT modeled as ontology individuals here since no command table or source enumeration was read to ground it this pass). Also generates tests/mcpp_catalog_proof.rs: a hand-transcribed proof (no sparql: query of its own, to avoid a tautological comparison) asserting the 9-row count, 6 spot-checked (noun, verb, doc) rows, sort order, and no-duplicate-pairs invariant against the generated catalog."

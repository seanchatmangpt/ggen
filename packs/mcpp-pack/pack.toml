[pack]
name = "mcpp-pack"
version = "0.1.0"
description = "Typed Rust catalog + subprocess dispatch shim + reference doc, generated from command-surface vocabulary for ~/mcpp (MCP+ admissible-work runtime, real dependency: clap-noun-verb = \"5\", confirmed via its Cargo.toml). Reuses packs/clap-noun-verb-pack's cnv: vocabulary (IRI reuse), including cnv:args for real argument facts. The 9 commands were originally grepped from ~/mcpp/README.md, then hand-verified on 2026-07-18 against the real #[verb] function signatures at pinned commit ae1106887a824f107dc8ac76daff6ef1b8dbf6c4 (see ontology.ttl's header for file:line citations) -- that pass found and fixed one real fidelity bug (relay's real verb is 'verify-chain', not 'verify'). Still a partial command surface: these 9 are not every #[verb] in ~/mcpp/crates/mcpp-server/src/cmds/. Generates: src/mcpp_catalog.rs (typed noun/verb/doc/args/error_case table), src/mcpp_dispatch.rs (a real, compilable, ontology-driven std::process::Command dispatch shim -- one generated wrapper fn per command, no hand-written handler required), docs/mcpp_reference.md, a pack-uniquely-named src/mcpp_lib_wiring.rs mod-aggregator (the consumer adds one `include!(\"mcpp_lib_wiring.rs\");` line to their own src/lib.rs -- retargeted off `to: src/lib.rs`/`inject: true` after round 2's cross-pack verification found that pattern collides via this engine's FM-WRITE-008 guard the moment 2 packs sharing it are wired into one real consumer), tests/mcpp_catalog_proof.rs (hand-transcribed, non-tautological data-table proof, now also asserting a per-row error_case is present and spot-checking its exact text) and tests/mcpp_dispatch_proof.rs (real behavior proof: introspects the actual std::process::Command built by each generated wrapper, plus two real error-path tests that spawn a nonexistent `mcpp` binary and assert on the genuine std::io::ErrorKind::NotFound -- not a mock). Round 3 (2026-07-18) added mcp:errorCase: a real, file:line-cited non-zero-exit/fail-open condition for all 9 commands read directly from the same pinned commit's source, closing the second half of the ontology-expressiveness L3 bar (cnv:args covered structure/cardinality in round 2; error cases were the missing half). All generated outputs use freeze_policy=checksum (not force:true): a hand-edit to a generated file is detected and the next sync skips it with an explicit 'manual edit detected' receipt entry instead of silently clobbering it -- re-verified this round against the modified templates. Round 4 (2026-07-19) added shapes.ttl: real SHACL constraints on cnv:Command (non-empty noun/verb, a well-formed cnv:args grammar, and a non-empty, non-placeholder mcp:errorCase) wired via a consumer's [law].shapes -- confirmed live in a scratch consumer: the real ontology passes ggen sync run's validate stage, and a deliberately-broken copy (one mcp:errorCase triple removed) is refused with a real FM-LAW-013 SHACL violation citing the exact focus node, not a no-op gate."

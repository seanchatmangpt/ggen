[pack]
name = "praxis-core-pack"
version = "0.3.0"
description = "praxis-core pack: generates the refusal-taxonomy reference table (Rust const table + markdown doc) from RefusalScenario individuals mirroring praxis_core::refusal. Also generates a proof test (tests/praxis_core_refusal_taxonomy_proof.rs) that checks the two artifacts against literal, hand-transcribed values from ontology.ttl -- no SPARQL re-derivation. L5-push round 3 (2026-07-19): switched the two primary generated artifacts (src/praxis_core_refusal_table.rs, docs/praxis_core_refusal_taxonomy.md) from force:true to freeze_policy:checksum (freeze_slots_dir: .ggen/freeze/praxis-core-pack) -- a hand-edit is now refused with a named checksum-mismatch error on the next sync instead of silently clobbered; verified live in a scratch consumer (edit -> refused; delete freeze cache -> falls back to FM-WRITE-005 hard refusal, not silent overwrite either way). Also implemented, for real, the `cfg(feature = \"praxis-core-live\")` compiled-fidelity block the proof template's docstring had claimed but never shipped: when a consumer depends on the real `praxis-core` crate and enables that feature, the generated proof now calls the REAL `RefusalScenario::category()` for all 13 variants and asserts agreement with this pack's generated table -- verified live (10/10 tests pass with the feature enabled via a path dependency in a scratch consumer; 8/8 pass without it, so the default path is unaffected). L5-push round 4 (2026-07-19): added templates/refusal_verbatim_reference_tests.rs.tmpl, generating tests/praxis_core_refusal_verbatim_reference_tests.rs -- a BYTE-IDENTICAL copy (checksummed sha256 30c0d52c...be24e2e0 before and after pasting, diff-verified against the extracted source) of the real #[cfg(test)] mod tests block from crates/praxis-core/src/refusal.rs lines 252-367 (the reference author's own 4 unit tests: category_mapping_is_total_over_obligations, category_mapping_is_total_over_denial_lanes, kernel_and_andon_scenarios_have_expected_categories, compose_denials_ors_lanes), gated behind #![cfg(feature = \"praxis-core-live\")] as a whole-file cfg so it contributes zero tests/compile cost when the consumer doesn't opt in. Verified live in a rebuilt scratch consumer with a direct optional dependency on both praxis-core (path) and bcinr-powl-receipt = \"26.6.24\" (required for the verbatim block's own `use bcinr_powl_receipt::denial::DenialPolarity`, which is not re-exported by praxis-core): cargo test feature-off is 8/8 passing (unaffected, new file compiles to 0 tests); cargo test --features praxis-core-live is 14/14 passing (10 existing + 4 verbatim reference tests, all green, 0 failures). This is the reference's OWN test suite recompiled and run here, not a new assertion informed by reading the source -- the strongest fidelity signal this pack can produce short of depending on praxis-core's own `cargo test` output directly. Honest scope: still opt-in (a consumer must discover and enable the feature) and not wired into this repo's CI/pre-commit, so this does not clear L4's 'the normal way' bar or L5's 'zero human in the loop' bar -- it strengthens Target-API fidelity within L3, it does not move the pack to L4/L5. L5-push round 5 (2026-07-21): added templates/refusal_taxonomy_sparql_derived_proof.rs.tmpl, generating tests/praxis_core_refusal_taxonomy_sparql_derived_proof.rs -- a SECOND proof of the refusal-taxonomy artifacts, ALONGSIDE (not replacing) refusal_taxonomy_proof.rs.tmpl's hand-transcribed one. Where the existing proof hand-types its EXPECTED array once at authoring time, this one carries a real `sparql:` frontmatter key running the identical `scenarios` query used by refusal_taxonomy_rs.tmpl/refusal_taxonomy_md.tmpl, so its LIVE_ONTOLOGY_ROWS array is freshly re-baked from ontology.ttl on every ggen sync run and checked, via include_str!, against src/praxis_core_refusal_table.rs and docs/praxis_core_refusal_taxonomy.md as they actually sit on disk. This targets a gap the hand-transcribed proof cannot close by design: refusal_taxonomy_rs.tmpl's own output carries freeze_policy:checksum, so a hand-edited const table silently stops tracking ontology.ttl on later syncs while sync still exits 0 -- a frozen hand-typed EXPECTED array can never detect that staleness (it was true, once, at authoring time, and never re-checks); a live-requeried array can. No new template needs [[templates]] wiring in this file -- pack.toml carries no per-template list (crates/ggen-engine/src/pack.rs's resolve_pack_dir auto-discovers every templates/*.tmpl on disk) -- so the only wiring is the new file landing under templates/ and this description narrating it. Honest scope: this round is DESIGN + BUILD only. The new template's Tera syntax was sanity-checked out-of-band (parsed and rendered with the real tera 1.20 crate against a mock 2-row context, then the rendered Rust was parsed with syn to confirm syntactic validity) and one real bug was caught and fixed by that check -- a literal `{% for %}` token inside a doc-comment sentence explaining the mechanism was itself interpreted by Tera as a live for-loop tag (the same class of bug .specify/templates/verify/verify_evidence_sh.sh.tera hit with bash's ${#...}), fixed by rephrasing the comment to avoid the literal token. It has NOT yet been run through a real `ggen sync run` against a real consumer (no examples/praxis-core-verify-style regeneration performed this round) -- that end-to-end verification, and any resulting missingCap/currentCeiling update in .specify/pack-l5-promotion.ttl, is next-phase work, not claimed done here."

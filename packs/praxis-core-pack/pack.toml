[pack]
name = "praxis-core-pack"
version = "0.2.0"
description = "praxis-core pack: generates the refusal-taxonomy reference table (Rust const table + markdown doc) from RefusalScenario individuals mirroring praxis_core::refusal. Also generates a proof test (tests/praxis_core_refusal_taxonomy_proof.rs) that checks the two artifacts against literal, hand-transcribed values from ontology.ttl -- no SPARQL re-derivation. L5-push round 3 (2026-07-19): switched the two primary generated artifacts (src/praxis_core_refusal_table.rs, docs/praxis_core_refusal_taxonomy.md) from force:true to freeze_policy:checksum (freeze_slots_dir: .ggen/freeze/praxis-core-pack) -- a hand-edit is now refused with a named checksum-mismatch error on the next sync instead of silently clobbered; verified live in a scratch consumer (edit -> refused; delete freeze cache -> falls back to FM-WRITE-005 hard refusal, not silent overwrite either way). Also implemented, for real, the `cfg(feature = \"praxis-core-live\")` compiled-fidelity block the proof template's docstring had claimed but never shipped: when a consumer depends on the real `praxis-core` crate and enables that feature, the generated proof now calls the REAL `RefusalScenario::category()` for all 13 variants and asserts agreement with this pack's generated table -- verified live (10/10 tests pass with the feature enabled via a path dependency in a scratch consumer; 8/8 pass without it, so the default path is unaffected)."

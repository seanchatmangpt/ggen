[pack]
name = "self-monitoring-pack"
version = "26.7.13"
description = "Self-monitoring vocabulary + real Knowledge Hook for Claude Code's own answer-format pattern, dogfooding the EXACT kh:Hook SPARQL-CONSTRUCT mechanism already proven this session for the Solvane Global bribery case's obligation derivation (crates/multifractal-workflow/fixtures/bribery-case/hook.ttl + crates/multifractal-workflow/tests/bribery_case_fixture.rs), applied here to conversational turns instead of compliance cases. PUBLIC-ONTOLOGY-FIRST (mirrors packs/dogfood-lifecycle-pack and the bribery-case fixture): a conversational turn is a prov:Activity (smon:Turn, minted subclass -- PROV has no such subtype), the session reference reuses dcterms:isPartOf pointed at packs/dogfood-lifecycle-pack's OWN dfl:Session class (no re-minted smon:Session -- this is the IRI-reuse-across-files discipline applied at the vocabulary layer), the grounding_topic tag reuses dcterms:subject directly (checked and fits -- \"the topic of the resource\" is exactly \"which system/capability this turn concerns\", no bridge term needed), and turn-kind is a CLOSED 5-concept SKOS scheme (smon:GroundingQuestion / smon:SurveyResponse / smon:RunResponse / smon:BlockerResponse / smon:Other) mirroring dfl:Outcome's identical closed-scheme pattern. DISCLOSED MINTED TERMS (capability-justified, no public equivalent -- each carries an rdfs:comment in ontology.ttl naming the checked public ontologies and why they do not fit): smon:Turn (prov:Activity subclass), smon:sequenceIndex (mirrors dfl:sequenceIndex's identical rationale, domain-scoped), smon:immediatelyFollows (a direct turn-adjacency edge minted specifically because this session confirmed, by reading crates/praxis-graphlaw/src/sparql/plan.rs::extract_expression, that Expression::Add/Subtract are NOT implemented in this engine -- so \"the turn immediately after X\" is expressed as a graph-pattern join, never SPARQL arithmetic), smon:turnKind + smon:TurnKind (closed classification, mirrors dfl:outcome), smon:EscalationObligation + smon:hasPriorGroundingQuestion + smon:hasGroundingQuestion + smon:reason (the derived-fact node hook.ttl's kh:Hook CONSTRUCT query produces -- PROV's wasDerivedFrom/wasInformedBy checked and rejected on a genuine Entity-vs-Activity domain/range mismatch, not just unfashionable). CLASSIFICATION-IS-INPUT FENCE (structural, not merely stated): hook.ttl's SPARQL CONSTRUCT query only ever READS smon:turnKind, dcterms:subject, smon:sequenceIndex, and smon:immediatelyFollows -- every one of those is a fixture-hand-asserted INPUT fact; the hook never reads turn TEXT (no turn-content literal is even modeled in this vocabulary) and never classifies anything. Building an NLP classifier that reads raw Claude Code output and assigns smon:turnKind is a separate, explicitly out-of-scope problem this pack does not attempt or stub. Real live SPARQL-CONSTRUCT verification (not asserted): crates/praxis-graphlaw/tests/self_monitoring_hook_actuation.rs runs the real praxis_graphlaw::TripleStore::load_hook_pack + .materialize() + .query() pipeline against fixtures/pattern-fires.ttl (fires, derives exactly 1 smon:EscalationObligation), fixtures/pattern-does-not-fire.ttl (does not fire -- prior response was a RunResponse, not a SurveyResponse), and fixtures/pattern-different-topic.ttl (does not fire -- same_system/grounding_topic conjunct fails)."

[pack]
name = "cargo-cicd-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc + inject-mode mod-wiring, generated from a source-audited command-surface vocabulary for ~/cargo-cicd (crates.io `cargo-cicd`, real dependency: clap-noun-verb 26.6.2, confirmed via its Cargo.toml). Reuses packs/clap-noun-verb-pack's cnv: vocabulary (IRI reuse, not re-minted) since cargo-cicd is itself a real clap-noun-verb CLI. Round 2 (2026-07-18) replaced the original README-only transcription with a dated source audit against ~/cargo-cicd v26.7.6 (src/nouns/*.rs) -- 52 commands across 21 nouns, each carrying a cc:sourceFile citation; 9 rows additionally carry cc:targetOntologyConcept linking to cargo-cicd's own real SKOS/PROV-O ontology. Round 3 (2026-07-18) re-read every real `#[verb(...)]`-annotated `pub fn cmd_*` signature in that same source tree and added cc:argCount/cc:args call-metadata facts to all 51 live rows (39 genuinely zero-arg, 12 with real typed argument lists up to doctor-repo's 5) -- this is the first argument/call-metadata fact this pack has ever carried, clearing Ontology expressiveness's L2 bar for the first time. The generated catalog gained two new real functions (parse_args, args_are_consistent) plus 4 new adversarial/consistency proof tests exercising them against every row, not a hand-picked sample. All three regenerable artifacts (catalog, proof, reference doc) switched from force:true to freeze_policy:checksum/freeze_slots_dir -- live-verified in a scratch consumer: a hand-edit to the generated catalog now makes the next `ggen sync run` report 'skipped: frozen: ... manual edit detected' instead of silently clobbering it, while an unedited file still round-trips as 'skipped: unchanged'. cc:doctor-bare is retained, deprecated, for backward compatibility with the pre-audit bare-noun shape. Round 4 (2026-07-19) added the first real error/return-type facts: re-audited ~/cargo-cicd's 21 nouns/*.rs files (grep-confirmed every #[verb] cmd_* returns clap_noun_verb::Result<()>, uniform across all 51 live rows) and cross-referenced the real dependency ~/clap-noun-verb/src/error.rs for the 10 actual #[non_exhaustive] NounVerbError variant names (transcribed verbatim, not paraphrased). Generated catalog gained CARGO_CICD_RETURN_TYPE/CARGO_CICD_ERROR_ENUM/CARGO_CICD_ERROR_VARIANTS constants plus all_commands_share_return_contract(); proof gained 4 new tests (15 total, up from 11) covering exact-count drift, sortedness/dedup, and contract uniformity. Live-verified end-to-end in a scratch consumer (ggen sync run, real cargo test): 15/15 passing. This closes part of Ontology expressiveness/Target-API fidelity's L3 'error cases' gap that Round 3 explicitly left open, but stops short of L3 in full: no per-command error-path (which variant a given command actually raises) or exit-code facts are modeled -- only the shared enum-level contract, uniform across all rows. Round 5 (2026-07-21, L5 wave 5) closed the handler-gap dimension named in .specify/maturity.ttl's cg_010 mat:d2 ('L1 -- nothing callable, catalog only, no cargo-cicd invocation'): first checked directly (per the task's own instruction) whether this pack's existing generated proof (tests/cargo_cicd_catalog_proof.rs, the 15/15-passing artifact mat:d5 cites) hand-transcribes expected values the way praxis-core-pack/star-toml-pack's ORIGINAL proofs did -- it does not; both its `rows`/`error_variants` sparql: queries are byte-identical to the ones cargo_cicd_catalog.rs.tmpl already uses, rendered via a from-scratch Tera for-loop, so the cap05 gap this wave's instructions target does not apply here and no second proof template was added. Instead, following the fallback instruction, added a real subprocess dispatch shim mirroring mcpp-pack's src/mcpp_dispatch.rs.tmpl structure (read in full as the reference): cargo_cicd_dispatch.rs.tmpl generates src/cargo_cicd_dispatch.rs, one real std::process::Command-backed wrapper fn per live command (51 of 52 catalog rows -- the deprecated cc:doctor-bare row, cnv:verb \"\", is deliberately excluded via a second, independent `FILTER(?verb != \"\")` sparql: query, since `cargo-cicd doctor \"\"` is not a real invocation), invoking the real `cargo-cicd` binary directly (confirmed at ~/cargo-cicd/Cargo.toml's [[bin]] name = \"cargo-cicd\"; its own main.rs strip_cargo_subcommand_token only removes a leading \"cicd\" token when cargo itself injected one, so a direct `cargo-cicd <noun> <verb>` invocation reaches the identical clap parse `cargo cicd <noun> <verb>` would). cargo_cicd_dispatch_proof.rs.tmpl adds 9 real-behavior tests (Command::get_program/get_args introspection without spawning, plus two real ErrorKind::NotFound spawn-error tests guarded against a machine that happens to have cargo-cicd installed) -- mirroring mcpp_dispatch_proof.rs.tmpl's structure, with the per-wrapper existence/shape check driven by the same sparql: rows query as the dispatch shim itself (51 rows, not a hand-picked sample) so a dropped/renamed generated function fails to COMPILE, not merely fails an assertion. cargo_cicd_mod_wiring.rs.tmpl gained `pub mod cargo_cicd_dispatch;`. Live-verified end-to-end in a new committed consumer, examples/cargo-cicd-verify (real `ggen sync run` + `cargo test`, mirroring examples/praxis-core-verify's structure): 24/24 passing (15 catalog + 9 dispatch), a second sync byte-identical (idempotent), and drift-sensitivity proven via a real reversible ontology edit (renaming cc:git-status's cnv:verb from \"status\" to \"statusdrift\" and back) -- confirmed the generated wrapper fn renamed from git_status to git_statusdrift and back, AND surfaced a real, useful finding along the way: this pack's freeze_policy:checksum artifacts (all five: catalog, proof, reference doc, and now dispatch, dispatch-proof) do not silently auto-regenerate on ontology drift when the file is otherwise untouched -- ggen-engine's write.rs decision order means an unedited-but-now-stale file hits [FM-WRITE-005] 'exists with differing content; refusing silent clobber' rather than being rewritten, so picking up a real ontology change requires deleting the target file(s) (or a future `force: true` companion) before the next sync, not just running `ggen sync run` again; this is a fail-closed property already latent in every pre-Round-5 freeze_policy:checksum artifact this pack ships, not something Round 5 introduced. Still short of L3's 'common behaviors generated' bar: this is a *generic* dispatcher (shells out to the real binary) rather than a reimplementation of any command's actual behavior, so cargo-cicd's own logic still lives entirely in its own binary, not in ontology-specified logic -- matching mcpp-pack's own identically-scoped, already-disclosed limitation."

[pack]
name = "cargo-cicd-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc + inject-mode mod-wiring, generated from a source-audited command-surface vocabulary for ~/cargo-cicd (crates.io `cargo-cicd`, real dependency: clap-noun-verb 26.6.2, confirmed via its Cargo.toml). Reuses packs/clap-noun-verb-pack's cnv: vocabulary (IRI reuse, not re-minted) since cargo-cicd is itself a real clap-noun-verb CLI. Round 2 (2026-07-18) replaced the original README-only transcription with a dated source audit against ~/cargo-cicd v26.7.6 (src/nouns/*.rs) -- 52 commands across 21 nouns, each carrying a cc:sourceFile citation; 9 rows additionally carry cc:targetOntologyConcept linking to cargo-cicd's own real SKOS/PROV-O ontology. Round 3 (2026-07-18) re-read every real `#[verb(...)]`-annotated `pub fn cmd_*` signature in that same source tree and added cc:argCount/cc:args call-metadata facts to all 51 live rows (39 genuinely zero-arg, 12 with real typed argument lists up to doctor-repo's 5) -- this is the first argument/call-metadata fact this pack has ever carried, clearing Ontology expressiveness's L2 bar for the first time. The generated catalog gained two new real functions (parse_args, args_are_consistent) plus 4 new adversarial/consistency proof tests exercising them against every row, not a hand-picked sample. All three regenerable artifacts (catalog, proof, reference doc) switched from force:true to freeze_policy:checksum/freeze_slots_dir -- live-verified in a scratch consumer: a hand-edit to the generated catalog now makes the next `ggen sync run` report 'skipped: frozen: ... manual edit detected' instead of silently clobbering it, while an unedited file still round-trips as 'skipped: unchanged'. cc:doctor-bare is retained, deprecated, for backward compatibility with the pre-audit bare-noun shape. Round 4 (2026-07-19) added the first real error/return-type facts: re-audited ~/cargo-cicd's 21 nouns/*.rs files (grep-confirmed every #[verb] cmd_* returns clap_noun_verb::Result<()>, uniform across all 51 live rows) and cross-referenced the real dependency ~/clap-noun-verb/src/error.rs for the 10 actual #[non_exhaustive] NounVerbError variant names (transcribed verbatim, not paraphrased). Generated catalog gained CARGO_CICD_RETURN_TYPE/CARGO_CICD_ERROR_ENUM/CARGO_CICD_ERROR_VARIANTS constants plus all_commands_share_return_contract(); proof gained 4 new tests (15 total, up from 11) covering exact-count drift, sortedness/dedup, and contract uniformity. Live-verified end-to-end in a scratch consumer (ggen sync run, real cargo test): 15/15 passing. This closes part of Ontology expressiveness/Target-API fidelity's L3 'error cases' gap that Round 3 explicitly left open, but stops short of L3 in full: no per-command error-path (which variant a given command actually raises) or exit-code facts are modeled -- only the shared enum-level contract, uniform across all rows."

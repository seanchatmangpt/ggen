[pack]
name = "wasm4pm-compat-pack"
version = "0.1.0"
description = "OCEL event-type emission enum and emit helper fns targeting wasm4pm-compat (emission surface only; all analysis stays in wasm4pm-compat), with an ontology-declared per-event attribute schema (w4pm:hasAttribute) and IRI-typed object bindings (w4pm:hasObjectType) driving real, non-empty OCELEventAttribute output; also generates its own proof test (tests/wasm4pm_compat_events_proof.rs) covering exact EventType cardinality (via an independent SPARQL COUNT oracle), per-event relationship+attribute binding, and a JSON round-trip"

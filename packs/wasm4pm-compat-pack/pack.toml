[pack]
name = "wasm4pm-compat-pack"
version = "0.1.0"
description = "OCEL event-type emission enum and emit helper fns targeting wasm4pm-compat (emission surface only; all analysis stays in wasm4pm-compat), with an ontology-declared per-event attribute schema (w4pm:hasAttribute) and IRI-typed object bindings (w4pm:hasObjectType) driving real, non-empty OCELEventAttribute output, plus real behavioral preconditions (w4pm:requiresNonEmptyId / w4pm:requiresNonEmpty) compiled into a debug_assert! in each generated emit_* fn; also generates its own proof test (tests/wasm4pm_compat_events_proof.rs, 17 tests) covering exact EventType cardinality (via an independent SPARQL COUNT oracle), per-event relationship+attribute binding, a JSON round-trip, real should_panic failure-path coverage for the precondition checks, and a systematic negative-witness suite projecting this pack's own generated emit_* output onto wasm4pm-compat's real admission-control OcelLog/LinkedOcel/validate_gianola_2026_locality functions to cover all 5 real OcelRefusal variants the pinned =26.6.29 crate declares (DanglingEventObjectLink, EmptyEventObjectLinks, MissingReferenceObject, MultipleReferenceObjects, ViolatesLocalityPrinciple)"

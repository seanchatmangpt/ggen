[pack]
name = "wasm4pm-pack"
version = "0.1.0"
description = "Typed Rust catalog + dependency graph + reference doc, generated from crate-map vocabulary for the ~/wasm4pm workspace itself (distinct from packs/wasm4pm-{algorithms,cognition,compat,facts}-pack, which model wasm4pm's ANALYSIS ontology surface -- this pack models the workspace's own crate structure). Transcribed from ~/wasm4pm/Cargo.toml's `[workspace] members` list and each member crate's own Cargo.toml `description` field: wasm4pm (core WASM process-mining algorithms), tps-metrics (Toyota Production System metrics), wasm4pm-cli, miniml (WASM ML; package name -- the crate lives at crates/miniml-core/ but its own Cargo.toml `[package] name` is `miniml`, not `miniml-core`; the ontology individual's IRI stayed w4c:miniml-core to match the directory, but its rdfs:label was corrected 2026-07-19 from the prior directory-derived \"miniml-core\" to the real package name \"miniml\" after a live re-check against ~/wasm4pm@b6fedcbef8d5fbdab4dbb9827226e802fe961a71 -- the old label meant `cargo build -p miniml-core` in a generated-catalog-driven script would fail with \"package not found\"; this is a real, previously-undetected Target-API-fidelity bug in the generated WASM4PM_CRATES catalog, now fixed and covered by wasm4pm_crate_deps_proof.rs.tmpl's direct-dependency assertions), wasm4pm-cognition (old-AI cognition kernel), prolog8 (proof engine), ocpq (object-centric process querying), bench-tools, wasm4pm-planner (PDDL-subset temporal planner). `wasm4pm-lsp` was removed in v26.7.1 per that Cargo.toml's own comment (unbuildable in a clean checkout) and is intentionally NOT modeled as a live crate here. `ontology.ttl` also carries 7 real `w4c:dependsOn` intra-workspace dependency edges (e.g. wasm4pm-planner -> {prolog8, wasm4pm, wasm4pm-cognition}), hand-verified against ~/wasm4pm@b6fedcbef8d5fbdab4dbb9827226e802fe961a71 (2026-07-18) by grepping every member crate's own Cargo.toml [dependencies] table -- this is the pack's dated hand-verification note (L2 target-API-fidelity bar); re-verify against a newer wasm4pm commit before trusting the edge list on a later pass. src/wasm4pm_crate_deps.rs.tmpl renders those edges into a real traversal module (depends_on lookup, transitive_dependencies DFS with cycle-guard) -- genuine control flow driven by ontology data, not just a projected const array. wasm4pm_crate_mod_wiring.rs.tmpl is an inject-mode template that wires both generated modules into the consumer's src/lib.rs at the `// GENERATED catalogs/emission surfaces` marker (the same marker convention examples/receiptctl already uses), so a consumer no longer hand-writes the `mod` declarations. All three generated Rust files carry `freeze_policy: checksum` (+ `freeze_slots_dir = \".ggen/freeze/wasm4pm-pack\"`): a hand-edit made to a generated file between syncs now causes the next `ggen sync run` to refuse (Skipped, checksum mismatch) rather than silently clobbering it. The pack also generates two independent proof tests (tests/wasm4pm_crate_catalog_proof.rs, tests/wasm4pm_crate_deps_proof.rs) asserting the emitted catalog/graph's literal contents -- including the deps proof's transitive-closure, leaf-crate, unknown-crate-name, and self-loop checks -- against values hand-transcribed from ontology.ttl, independent of the SPARQL queries that produce the artifacts. Round-3 additions: shapes.ttl (new file) is a real SHACL gate on w4c:Crate (exactly-one non-empty label/purpose, and every w4c:dependsOn target must itself be a w4c:Crate -- no dangling/external edges), verified live in both directions (conforms on the real ontology, rejects a synthetic dangling-edge violation) via `ggen graph validate --files packs/wasm4pm-pack/ontology.ttl --shapes packs/wasm4pm-pack/shapes.ttl`. wasm4pm_crate_deps.rs.tmpl also gained transitive_dependencies_over(edges, name), a parameterized form of the traversal that transitive_dependencies now delegates to; this closes a real test gap -- the actual 7-edge w4c:dependsOn graph is acyclic, so nothing previously exercised the explicit visited-set cycle guard. wasm4pm_crate_deps_proof.rs.tmpl now proves that guard against a hand-built 3-node synthetic cycle (terminates, dedupes, correctly includes the start node when a real cycle makes it transitively reachable from itself)."

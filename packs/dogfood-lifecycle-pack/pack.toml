[pack]
name = "dogfood-lifecycle-pack"
version = "26.7.13"
description = "v26.7.13 Operation Dogfood session-lifecycle schema: the RDF vocabulary, SHACL shape, and sample fixtures for capturing a Claude Code session's tool events (Bash / Edit / Write / Read / Task / ...) as PROV-O provenance so that ggen can validate a session log. A PostToolUse hook appends one Turtle node per tool event and a session-end recipe runs `ggen graph validate --files <session.ttl> --shapes <shapes.ttl>`; this pack authors the vocabulary + shape + fixtures that loop targets (the hook and recipe themselves are wired by the parent session, not here). PUBLIC-ONTOLOGY-FIRST (mirrors packs/soc2-audit-pack and packs/dry-run-publish-pack): every relationship reuses a public vocabulary where one fits — prov: (Activity for the session and each tool event, Agent for the operator and subagents, used/generated/wasAssociatedWith/actedOnBehalfOf), dcterms: (identifier for the session id, isPartOf for the tool-event -> session ref, description), skos: (ConceptScheme + notation for the closed tool-name and outcome vocabularies), time: (inXSDDateTimeStamp for the wall-independent event timestamp). Content-addressed tool inputs/outputs use the repo's existing urn:blake3:<hex> scheme (crates/chatman-common provenance::content_address, crates/cng pipeline.rs ImportedArtifact). DISCLOSED MINTED TERMS (capability-justified, no public equivalent — each carries an rdfs:comment in ontology.ttl naming the checked public ontologies and why they do not fit): dfl:Session and dfl:ToolEvent (rdfs:subClassOf prov:Activity — PROV has no subtype distinguishing a session-scoped activity from a single tool invocation, and SHACL needs a precise sh:targetClass to require tool-event properties without imposing them on the session node); dfl:sequenceIndex (monotonic per-session ordinal — PROV has no event ordinal, OLO's olo:index requires full ordered-list slot membership); dfl:outcome + dfl:Outcome (a tool event's terminal status drawn from a CLOSED 3-value vocab ok/error/blocked — mirrors packs/jira-tracking-pack's closed jira:Status scheme; no public ontology enumerates tool-invocation outcomes). OBSERVATION-ONLY FENCE (structural, not merely stated): this pack MODELS the session lifecycle as observation/provenance; it never asserts authority, permission, or actuation — those are separate governed surfaces (admission, hooks, receipts in crates/praxis-graphlaw/src/chatman). No class, predicate, or individual here is named 'authorize', 'permit', 'grant', 'actuate', or 'execute'; the outcome vocabulary records what a tool event OBSERVABLY did (ok/error/blocked), never that it was permitted to. No external ontology is unioned — this pack's vocabulary is self-contained PROV/DCMI/SKOS/OWL-Time, so no ggen.toml extra_ontologies entry is required. No private namespace is minted beyond the disclosed capability-justified terms above."

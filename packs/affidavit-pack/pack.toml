[pack]
name = "affidavit-pack"
version = "0.1.0"
description = "Typed Rust catalog + real executable certify-pipeline logic + reference doc, generated from domain vocabulary for ~/affidavit (crates.io `affidavit` v26.6.22, a cryptographic provenance/receipt engine). Modeled from its README's 'Core Concepts' section: a Receipt is an append-only BLAKE3-chained log of Events, each carrying a Commitment (a BLAKE3 digest of payload data -- payloads themselves are never stored in the receipt). Every CertifyStage/Command triple was hand-verified 2026-07-18 against the actual ~/affidavit README.md on disk (byte-for-byte match, not just 'plausible from prose'), version-pinned via afd:sourceVersion in ontology.ttl. No command-surface enumeration attempted for the other 55 verbs (the README documents 59 canonical verbs total in prose only, no table); this pack covers the receipt data model plus 4 named core verbs, not the full CLI. Generates: (1) src/affidavit_catalog.rs -- reference tables (CERTIFY_STAGES, CORE_VERBS); (2) src/affidavit_certify.rs -- real executable logic: an ontology-order-derived Stage dispatcher (next_stage/is_terminal), plus (round 3, 2026-07-18) two generic domain-independent structural primitives (check_strictly_increasing/check_unique) composed by check_stage() per-stage from the ontology's afd:checksMonotonic/afd:checksUnique boolean facts -- check_continuity() is now a thin named call into that ontology-driven dispatch rather than one hand-written affidavit-specific body, proven against adversarial duplicate/out-of-order inputs plus the composition/dispatch mechanism itself in tests/affidavit_certify_proof.rs; (3) docs/affidavit_reference.md; (4) src/affidavit_lib_wiring.rs (force:true, plain file -- NOT inject-mode; retargeted off src/lib.rs during round 2's cross-pack verification after two other packs collided writing to that same path in a shared consumer) containing `pub mod affidavit_catalog;`/`pub mod affidavit_certify;`, which the consumer must mount with one `include!(\"affidavit_lib_wiring.rs\");` line in their own src/lib.rs -- a disclosed, real remaining consumer-effort step, not 'wires ggen.toml, done'. Both affidavit_catalog.rs/affidavit_certify.rs use freeze_policy=checksum (freeze_slots_dir=.ggen/freeze/affidavit-pack) so a hand-edit to generated output is detected and regeneration is skipped rather than silently clobbered."

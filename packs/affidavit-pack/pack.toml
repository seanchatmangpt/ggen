[pack]
name = "affidavit-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from domain vocabulary for ~/affidavit (crates.io `affidavit`, a cryptographic provenance/receipt engine). Modeled from its README's 'Core Concepts' section: a Receipt is an append-only BLAKE3-chained log of Events, each carrying a Commitment (a BLAKE3 digest of payload data -- payloads themselves are never stored in the receipt). No command-surface enumeration attempted this pass (the README documents a 65+-verb CLI in prose only, no table); this pack covers the receipt data model, not the CLI."

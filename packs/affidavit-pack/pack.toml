[pack]
name = "affidavit-pack"
version = "0.1.0"
description = "Typed Rust catalog + real executable certify-pipeline logic + reference doc, generated from domain vocabulary for ~/affidavit (crates.io `affidavit` v26.6.22, a cryptographic provenance/receipt engine). Modeled from its README's 'Core Concepts' section: a Receipt is an append-only BLAKE3-chained log of Events, each carrying a Commitment (a BLAKE3 digest of payload data -- payloads themselves are never stored in the receipt). Every CertifyStage/Command triple was hand-verified 2026-07-18 against the actual ~/affidavit README.md on disk (byte-for-byte match, not just 'plausible from prose'), version-pinned via afd:sourceVersion in ontology.ttl. No command-surface enumeration attempted for the other 55 verbs (the README documents 59 canonical verbs total in prose only, no table); this pack covers the receipt data model plus 4 named core verbs, not the full CLI. Generates: (1) src/affidavit_catalog.rs -- reference tables (CERTIFY_STAGES, CORE_VERBS); (2) src/affidavit_certify.rs -- real executable logic: an ontology-order-derived Stage dispatcher (next_stage/is_terminal) and check_continuity(), a working implementation of the afd:Continuity stage's afd:rejectCondition (strictly-increasing, unique sequence numbers), proven against adversarial duplicate/out-of-order inputs in tests/affidavit_certify_proof.rs; (3) docs/affidavit_reference.md; (4) an inject-mode src/lib.rs mod-wiring template (requires consumer's src/lib.rs to pre-exist with a `// ggen:mod-anchor` line). Both generated Rust modules use freeze_policy=checksum (freeze_slots_dir=.ggen/freeze/affidavit-pack) so a hand-edit to generated output is detected and regeneration is skipped rather than silently clobbered."

[pack]
name = "wasm4pm-facts-pack"
version = "0.2.1"
description = "Admitted wasm4pm graph facts: 55 compat:CognitionBreed and 60 pi:ProcessIntelligenceAlgorithm individuals carried verbatim from wasm4pm/ggen/ontology/{breeds,algorithms}.ttl (drift-checked against upstream, see DRIFT_LOG.md), plus (1) a SPARQL-projected registry-report template, (2) a generated typed Rust catalog module (src/wasm4pm_facts_registry.rs) with real lookup_breed/lookup_algorithm/algorithms_by_category functions, (3) an inject-mode mod-wiring template for the consumer's src/lib.rs, (4) SHACL cardinality/range/enum shapes (shapes.ttl) executable via `ggen graph validate --shapes`, (5) the bundled law rule (ontology/rules/breed_standing.n3) that CONSTRUCT-derives breed standing from citation presence -- see WIRING.md for the exact consumer [law] table needed to activate it -- and (6) two generated proof suites: a small hand-picked spot-check (tests/wasm4pm_facts_pack_registry_proof.rs) and a full-coverage mechanical proof over all 115 individuals cross-checked between two independently-issued SPARQL projections (tests/wasm4pm_facts_pack_full_coverage_proof.rs). L5-push round-3 (2026-07-19): re-ran scripts/check_upstream_drift.sh against a live ~/wasm4pm checkout and found the SAME 2 individuals from the round-2 fix (pi:Algo_optimized_dfg/pi:Algo_streaming_log's pi:wasmExport) had re-drifted on this branch despite the prior round's DRIFT_LOG entry claiming they were fixed -- corrected again (see DRIFT_LOG.md's 2026-07-19 entry) and confirmed the sibling wasm4pm-algorithms-pack still carries the stale value on the identical subject IRIs (flagged there, not fixed -- out of scope, another pack's directory). Also corrected WIRING.md, which still described the pre-round-2 inject-into-lib.rs mechanism even though the shipped template already uses the pack-unique-file + include!() mechanism -- doc/reality drift, now fixed to match the real template."

# Consumer wiring for the bundled law rule (see WIRING.md for the full
# rationale): a consumer's own ggen.toml must add
#
#   [law]
#   rules = ["../../packs/wasm4pm-facts-pack/ontology/rules/breed_standing.n3"]
#
# to activate CONSTRUCT-derived breed standing (EvidenceBound). Without this,
# `ggen sync` still succeeds but every breed row silently renders the
# `ADMITTED` placeholder documented in ontology.ttl/the registry template's
# header comment as a *derived*, not asserted, value -- this pack cannot
# force a consumer's [law] table to exist (that table lives in the
# consumer's own ggen.toml, which this pack's templates cannot write to),
# so activating it remains a one-line manual step today; see WIRING.md.

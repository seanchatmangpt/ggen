[pack]
name = "osx-clnr-pack"
version = "0.1.0"
description = "Typed Rust catalog + real selection/parsing logic + reference doc, generated from domain vocabulary for ~/osx-clnr (a real local project, crates.io-bound `oclnr`, a plan-bound macOS disk auditor; real dependency: clap-noun-verb 26.6.2). Unlike cargo-cicd/mcpp, its README documents the pipeline in prose rather than a command table, so this pack models the pipeline's real nouns (audit -> plan -> delete -> receipt, plus snapshot/emergency) as oclnr:Stage individuals with real state-transition (`oclnr:nextStage`) edges, plus per-command `oclnr:Argument` structure (name/type/required/default/position) and a `oclnr:SnapshotSelectionPolicy`/`oclnr:ByteUnit` fact set -- all dated hand-verified 2026-07-18 directly against ~/osx-clnr's real source (src/nouns/{snapshot,receipt,emergency}.rs, src/domain/time.rs), not README/grep guessing. `templates/osx_clnr_plan.rs.tmpl` generates a REAL, compilable reimplementation of `~/osx-clnr`'s snapshot-selection and byte-size-parsing algorithm (`select_oldest_snapshots`/`parse_snapshot_date`/`parse_size_in_bytes`), with its unit table and date-suffix-length parameter SPARQL-derived from the ontology rather than hardcoded in the template. `templates/osx_clnr_mod_wiring.rs.tmpl` uses `inject: true`/`skip_if` to auto-wire both generated modules into a consumer's `src/lib.rs` at a one-time `// GGEN-OSX-CLNR-MOD-ANCHOR` marker, idempotently, instead of requiring a hand-edited `pub mod` line after every sync. Two proof suites ship: `osx_clnr_catalog_proof.rs.tmpl` (deliberately non-SPARQL, hand-transcribed anti-drift check on the reference catalog) and `osx_clnr_plan_proof.rs.tmpl` (SPARQL-derived cardinality assertion + 13 behavioral tests against the real generated logic, including adversarial/error-path cases: empty input, unknown unit, garbage snapshot names, n=0, n larger than available)."

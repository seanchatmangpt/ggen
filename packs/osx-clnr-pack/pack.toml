[pack]
name = "osx-clnr-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from domain vocabulary for ~/osx-clnr (crates.io-bound `oclnr`, a plan-bound macOS disk auditor; real dependency: clap-noun-verb 26.6.2). Unlike cargo-cicd/mcpp, its README documents the pipeline in prose rather than a command table, so this pack models the pipeline's real nouns (audit -> plan -> delete -> receipt, plus snapshot/emergency) as oclnr:Stage individuals rather than guessing a full cnv:Command verb enumeration from partial grep matches. Also generates its own anti-drift proof test (templates/osx_clnr_catalog_proof.rs.tmpl -> tests/osx_clnr_catalog_proof.rs) asserting the compiled catalog constants against literals hand-transcribed from ontology.ttl, deliberately with no sparql: block so it cannot reuse the catalog template's own derivation path."

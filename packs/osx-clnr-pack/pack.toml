[pack]
name = "osx-clnr-pack"
version = "0.1.0"
description = "Typed Rust catalog + real selection/parsing logic + a generated dispatch layer + reference doc, generated from domain vocabulary for ~/osx-clnr (a real local project, crates.io-bound `oclnr`, a plan-bound macOS disk auditor; real dependency: clap-noun-verb 26.6.2). Unlike cargo-cicd/mcpp, its README documents the pipeline in prose rather than a command table, so this pack models the pipeline's real nouns (audit -> plan -> delete -> receipt, plus snapshot/emergency) as oclnr:Stage individuals with real state-transition (`oclnr:nextStage`) edges, plus per-command `oclnr:Argument` structure (name/type/required/default/position) and a `oclnr:SnapshotSelectionPolicy`/`oclnr:ByteUnit` fact set -- all dated hand-verified 2026-07-18 directly against ~/osx-clnr's real source (src/nouns/{snapshot,receipt,emergency}.rs, src/domain/time.rs), not README/grep guessing. `templates/osx_clnr_plan.rs.tmpl` generates a REAL, compilable reimplementation of `~/osx-clnr`'s snapshot-selection and byte-size-parsing algorithm (`select_oldest_snapshots`/`parse_snapshot_date`/`parse_size_in_bytes`), with its unit table and date-suffix-length parameter SPARQL-derived from the ontology rather than hardcoded in the template. `templates/osx_clnr_dispatch.rs.tmpl` (round 3) closes part of the handler-gap: a new `oclnr:dispatchesTo` fact per `cnv:Command` names the real `osx_clnr_plan.rs` function that implements it (2 of 5 commands today), or the empty string if none is modeled yet; the template reads that fact to emit either a fully generated handler (zero hand-write) or a method on a generated `OclnrHandlerSeam` trait (the stable hand-write seam for the other 3) -- which commands land in which bucket is ontology-driven, not template-hardcoded. `templates/osx_clnr_mod_wiring.rs.tmpl` does NOT target the consumer's `src/lib.rs` directly (an earlier design that used `inject: true` there was retargeted after round-2 cross-pack verification found it collides with this engine's FM-WRITE-008 duplicate-output guard the moment a second pack does the same thing in one real consumer, e.g. wasm4pm-cognition-pack + wasm4pm-facts-pack in examples/receiptctl): it generates a pack-unique `src/osx_clnr_lib_wiring.rs` that the consumer mounts with one `include!(\"osx_clnr_lib_wiring.rs\");` line in their own `src/lib.rs` -- a real, disclosed, non-zero consumer-effort step, not 'wires ggen.toml, done'. Three proof suites ship: `osx_clnr_catalog_proof.rs.tmpl` (deliberately non-SPARQL, hand-transcribed anti-drift check on the reference catalog), `osx_clnr_plan_proof.rs.tmpl` (SPARQL-derived cardinality assertion + 13 behavioral tests against the real generated logic, including adversarial/error-path cases: empty input, unknown unit, garbage snapshot names, n=0, n larger than available), and `osx_clnr_dispatch_proof.rs.tmpl` (5 tests: 2 real generated handlers exercised including an adversarial rejection path, plus a dummy `OclnrHandlerSeam` impl proving the generated trait is real, compilable, callable Rust). L5-push round (2026-07-19): `osx_clnr_plan.rs.tmpl` gained `identify_thinned_snapshots`/`SnapshotThinReceipt`, transcribed field-for-field from `~/osx-clnr/src/domain/time.rs` (source-verified 2026-07-19; these two have no free ontology parameter, so unlike the unit table/date-suffix-length they are named individuals in `ontology.ttl` but their bodies are hand-transcribed, honestly documented as such rather than dressed up as SPARQL-driven). Two new templates, `osx_clnr_domain_time.rs.tmpl` (`src/domain/time.rs`, a `pub use crate::osx_clnr_plan::*;` re-export shim) and `osx_clnr_domain_mod.rs.tmpl` (`src/domain/mod.rs`), exist so a consumer crate literally packaged as `osx_clnr` exposes `osx_clnr::domain::time::*` at the SAME module path as the real reference -- which is what let `reference/verbatim_time_tests.rs` (the reference's own `test_snapshot_query_thin_parsing`/`test_size_parsing`, copied byte-identical from `~/osx-clnr/tests/integration_tests.rs`, checksum `14c560f1...5a61dd` before and after copy) compile and pass with ZERO modification, including its unedited `use osx_clnr::domain::time::{...}` import lines, against fully ontology-generated code -- verified live in a scratch consumer (`cargo test`: 32 passed, 0 failed, exit 0), not asserted from prose."

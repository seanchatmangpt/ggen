[pack]
name = "ma-case-study-pack"
version = "26.7.13"
description = "M&A / deal-desk case study vocabulary (ontology.ttl) + SHACL shapes (shapes.ttl) + competency questions (COMPETENCY_QUESTIONS.md), built from a real vocabulary-fit research pass over 10 domain concepts (entity/LEI, ownership percentage, due-diligence disposition, representation-and-warranty exceptions, regulatory filing thresholds, board authorization, shareholder votes, negotiated deal terms/counter-offers, financing conditions, closing/termination status). PUBLIC-ONTOLOGY-FIRST: FIBO (Financial Industry Business Ontology, read directly from the real vendored copy at crates/praxis-graphlaw/ontologies/industry/financial/fibo-master/, file:line cited per term in ontology.ttl's header) supplies a clean or strained public term for 8 of the 10 concepts (fibo-be-le-lei:LEIRegisteredEntity/LegalEntityIdentifier/hasOwnershipPercentage/RelationshipRecord for entity+LEI+ownership; fibo-fnd-agr-ctr:Representation/Warranty/DisclosureProvision/TermSheet/NonBindingTerm/ConditionPrecedent/TerminationProvision for contract clauses; fibo-fnd-agr-agr:Commitment for financing; fibo-cae-ce-act:MergerAcquisition/ActionStatus/RegulatoryAction and fibo-cae-ce-srca:TenderOffer/FormalOffer for the deal event and offers; fibo-be-oac-exec:BoardOfDirectors and fibo-be-oac-cctl:VotingShareholder for governance party roles); OMG Commons (cmns-bauth:Authorization/AuthorizingParty/AuthorizedParty/authorizes/hasAuthorizedParty/hasAuthorizingParty, cmns-rga:RegulatoryReport, cmns-cls:isClassifiedBy) supplies the live terms FIBO's own local Executives.rdf copies are deprecated in favor of; W3C ODRL (odrl:Duty) and PROV-O (prov:Activity/Entity/generatedAtTime/wasAttributedTo) and Dublin Core (dcterms:isPartOf) round out the reuse. Two false friends were checked and explicitly rejected, not silently avoided: fibo-be-le-cb:BoardAgreement (an agreement AMONG directors, not a board's resolution authorizing a transaction) and fibo-fnd-agr-ctr:hasTerm (contract DURATION, not a negotiated deal term). DISCLOSED ma: BRIDGE TERMS (minted only where the research found NO_PUBLIC_TERM_FOUND or a genuine STRAINED_FIT gap, each with an rdfs:comment in ontology.ttl naming the public terms checked and why they don't fit): ma:DueDiligenceItem/DueDiligenceDisposition (a checklist item's open/satisfied/waived status -- no public disposition vocabulary exists), ma:DisclosureScheduleItem/qualifiesClause/scheduleItemNumber (linking a disclosure exception to the specific clause it qualifies), ma:RegulatoryFilingObligation/filingThresholdAmount/triggeringStatute/statutoryWaitingPeriodDays (HSR-Act-style filing threshold and waiting period -- checked and rejected ELI as citation-only and LegalRuleML as a rule-markup language, neither a domain-term source), ma:BoardResolution/authorizesTransaction (a resolution document distinct from the false-friend BoardAgreement), ma:ShareholderVote/Ballot/voteOutcome/VoteOutcome/quorumPercentage/ballotDirection/BallotDirection (no vote/ballot/outcome structure exists in FIBO, W3C ORG, or any other checked candidate), ma:CounterOffer/supersedes/DealTermLineItem/DealTermType/termValue (negotiation-move sequencing and typed deal-term line items layered on TermSheet/NonBindingTerm), ma:FinancingCommitment/FinancingOutCondition/subjectToCondition (an M&A-specific financing-out condition, layered on the generic Commitment/ConditionPrecedent pair), ma:DealStatus + 5 concrete individuals (Signed/PendingRegulatoryApproval/Closed/Terminated/Abandoned instantiating FIBO's otherwise-abstract, zero-individual ActionStatus class). ontology.ttl is a TBox-only vocabulary pack (classes + properties + closed enumerations, mirroring packs/jira-tracking-pack and packs/dogfood-lifecycle-pack's own ontology.ttl shape); shapes.ttl applies sh:closed only to this pack's own minted ma: classes (open floor shapes for reused FIBO/Commons classes, matching packs/soc2-audit-pack's own org:Organization precedent). No external ontology file is unioned via ggen.toml extra_ontologies; every FIBO/Commons/ODRL/PROV/DCMI term is reused directly by IRI, never re-vendored or re-serialized into this pack. A LATER PASS (fixtures/, DESIGN.md) added a concrete Meridian Holdings Group / Corvantis Systems Acquirer/Target instance-data scenario across all 6 independent M&A processes docs/releases/v26.7.14/THESIS.md Section 33.12 names (buyer diligence, seller disclosure, financing, regulatory review, board authority, shareholder action), plus fixtures/hook.ttl (a real kh:Hook deriving an HSR-Act-style regulatory filing obligation, proven live by crates/praxis-graphlaw/tests/ma_case_hook_actuation.rs) and the adversarial-positive.ttl/adversarial-negative.ttl G_x+/G_x- pair Section 33.11's semantic admission proof obligation names; see DESIGN.md for the full account."

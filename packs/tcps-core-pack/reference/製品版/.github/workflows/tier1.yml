name: tier-1

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04
            target: i686-unknown-linux-gnu
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: windows-2022
            target: i686-pc-windows-msvc
          - os: windows-2022
            target: aarch64-pc-windows-msvc
          - os: windows-2022
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust
        shell: bash
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rust-src
          rustup default 1.97.1
      - name: Build universal core
        run: python tools/lifecycle.py build --target ${{ matrix.target }} --product core
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tier1-${{ matrix.target }}
          path: receipts/

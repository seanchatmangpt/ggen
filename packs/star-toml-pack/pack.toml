[pack]
name = "star-toml-pack"
version = "0.2.0"
description = "Generates a star_toml config-admission module: serde structs per ConfigSection (closed-world/loader/optionality projected from stp:closedWorld/stp:loaderFn/stp:required ontology facts, not hardcoded in the template), plus per-section admission docs and a Cargo.toml dependency snippet doc (docs/star_toml/CARGO_DEPENDENCIES.md, from stp:cargoDependency). Optionally injects `pub mod star_toml_config;` into an existing src/lib.rs (idempotent skip_if). Also generates its own executable proof test (tests/star_toml_config_proof.rs, no sparql: frontmatter) that hardcodes the ontology's section/field literals independently and exercises the real load_file round-trip, the stp:required=false optional-field path, plus three fail-closed paths (unknown key, missing required field, missing file) against real TempDir-backed TOML files. Both generated-source templates use freeze_policy: checksum (not force: true) so a hand-edited output is refused, not silently overwritten, on the next sync."

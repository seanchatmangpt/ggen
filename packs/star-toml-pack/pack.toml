[pack]
name = "star-toml-pack"
version = "0.3.0"
description = "Generates a star_toml config-admission module: serde structs per ConfigSection (closed-world/loader/optionality projected from stp:closedWorld/stp:loaderFn/stp:required ontology facts, not hardcoded in the template), plus a generated validate() method per section projecting stp:minValue/stp:maxValue behavior-contract facts (a pre-condition on the admitted VALUE that serde's Deserialize cannot express -- e.g. sample_rate must be in [0.0, 1.0]), plus per-section admission docs and a Cargo.toml dependency snippet doc (docs/star_toml/CARGO_DEPENDENCIES.md, from stp:cargoDependency). Ships src/star_toml_lib_wiring.rs (pack-unique file, one include!() line needed in the consumer's own lib.rs -- NOT inject:true into src/lib.rs directly, after round-2 cross-pack verification found that pattern collides the moment two packs are wired into the same real consumer). Also generates its own executable proof test (tests/star_toml_config_proof.rs, no sparql: frontmatter) that hardcodes the ontology's section/field literals independently and exercises the real load_file round-trip, the stp:required=false optional-field path, the stp:minValue/stp:maxValue behavior-contract path (both an out-of-range value that parses but fails validate(), and an in-range value that passes), plus three fail-closed paths (unknown key, missing required field, missing file) against real TempDir-backed TOML files. Both generated-source templates use freeze_policy: checksum (not force: true) so a hand-edited output is refused, not silently overwritten, on the next sync."

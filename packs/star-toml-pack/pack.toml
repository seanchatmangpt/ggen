[pack]
name = "star-toml-pack"
version = "0.3.0"
description = "Generates a star_toml config-admission module: serde structs per ConfigSection (closed-world/loader/optionality projected from stp:closedWorld/stp:loaderFn/stp:required ontology facts, not hardcoded in the template), plus a generated validate() method per section projecting stp:minValue/stp:maxValue behavior-contract facts (a pre-condition on the admitted VALUE that serde's Deserialize cannot express -- e.g. sample_rate must be in [0.0, 1.0]), plus per-section admission docs and a Cargo.toml dependency snippet doc (docs/star_toml/CARGO_DEPENDENCIES.md, from stp:cargoDependency). Ships src/star_toml_lib_wiring.rs (pack-unique file, one include!() line needed in the consumer's own lib.rs -- NOT inject:true into src/lib.rs directly, after round-2 cross-pack verification found that pattern collides the moment two packs are wired into the same real consumer). Also generates its own executable proof test (tests/star_toml_config_proof.rs, no sparql: frontmatter) that hardcodes the ontology's section/field literals independently and exercises the real load_file round-trip, the stp:required=false optional-field path, the stp:minValue/stp:maxValue behavior-contract path (both an out-of-range value that parses but fails validate(), and an in-range value that passes), plus three fail-closed paths (unknown key, missing required field, missing file) against real TempDir-backed TOML files. Both generated-source templates use freeze_policy: checksum (not force: true) so a hand-edited output is refused, not silently overwritten, on the next sync. L5-push wave2 reapplication (2026-07-21): added templates/star_toml_config_sparql_derived_proof.rs.tmpl, generating tests/star_toml_config_sparql_derived_proof.rs -- a SECOND proof, ALONGSIDE (never replacing) star_toml_config_proof.rs.tmpl's hand-transcribed one, applying praxis-core-pack's proven cap05 reference pattern (refusal_taxonomy_sparql_derived_proof.rs.tmpl) to this pack's own real ontology shape (stp:ConfigSection/stp:ConfigField/the a_sections+fields+bounds queries, not assumed to match praxis-core-pack's pxc:RefusalScenario shape). Carries the identical sparql: frontmatter (a_sections/fields/bounds) as star_toml_config.rs.tmpl, no freeze_policy of its own, and independently re-renders those three queries in a separate Tera pass so a field-mapping bug local to one template cannot corrupt both identically. Verified end-to-end via a real ggen sync run against the new committed consumer examples/star-toml-verify: cargo test went from 8/8 (pre-existing hand-transcribed proof only) to 15/15 (8 hand-transcribed + 7 new SPARQL-derived: sparql_queries_returned_at_least_one_row_each, field_declaration_count_matches_generated_module_right_now, every_live_section_and_field_matches_generated_module_right_now, every_live_bound_matches_generated_validate_right_now, live_loader_fn_matches_generated_load_right_now, live_field_order_is_lexical_ascending_within_each_section, generated_module_rejects_unknown_field_name). Hit the same two real gate refusals praxis-core-pack's own verification did and fixed both via their documented remediations, not by weakening either gate: FM-PACK-008 (ggen.lock content-hash pin stale after the pack changed -- deleted ggen.lock to re-lock) and FM-WRITE-005 (freeze_policy: checksum's target existing with differing content -- deleted the specific stale generated target(s) first, letting the tool's own 'target doesn't exist yet' path regenerate them, rather than adding force: true anywhere). Drift-sensitivity proof: temporarily changed SampleRateField's stp:maxValue from 1.0 to 2.0 in ontology.ttl, re-synced, and confirmed (a) the new proof's LIVE_BOUNDS/every_live_bound_matches_generated_validate_right_now re-derived and passed against the freshly-regenerated [0, 2] bound, proving the array is genuinely re-derived, not hardcoded, and (b) the PRE-EXISTING hand-transcribed proof's out_of_range_sample_rate_parses_but_fails_validate test FAILED for real (it hardcodes sample_rate=1.5 as an out-of-range probe against the OLD [0.0, 1.0] bound; under the new [0.0, 2.0] bound 1.5 is in-range, so the real generated validate() now returns Ok while the hand-transcribed assertion still expects Err) -- an honest, disclosed finding that the hand-transcribed proof IS incidentally sensitive to this specific field via its hardcoded probe value, even though its EXPECTED literals are never re-derived from a query. Reverted the ontology.ttl edit byte-for-byte (zero git diff) and re-synced; all 15 tests returned to passing. Idempotency: snapshot -> ggen sync run again -> written: [] on every file, diff -rq against the pre-run snapshot (excluding target/, .ggen-v2/) is empty."

[pack]
name = "ggen-release-pack"
version = "0.1.0"
description = "Release-engineering surface for ggen itself: a GitHub Actions candidate-publish workflow (.github/workflows/publish-candidate.yml, push:[main] trigger only, never schedule/cron) that chains verify-tcps, docs-sync drift check, book gates, the three existing scripts/ci guard scripts (guard-pack-proofs, guard-claims-schema/guard-publish-standing schema-only, guard-publish-standing full/strict), a new version-consistency check across .specify/repo-facts.ttl / Cargo.toml / ggen.toml, and — only on all-green — a v$VERSION tag push that fires the existing tags-only .github/workflows/release.yml. Also generates an honest RELEASE_STANDING.json/.md pair for ggen (source_standing believable/claimed, binary_standing unverified-on-artifact-host, l5_publication_claim WITHHELD) and docs/PUBLICATION_JUDGMENT.md, a per-condition status table transcribed from GGEN-v26.7.20-製品要求書・構成設計書.md's 第二十九章 公開可能条件 (23 conditions), driven from ontology individuals (grp:CiWorkflow/grp:ReleaseArtifact) whose body literals are the real, byte-for-byte content this pack renders — following the literal-template-body pattern of packs/tcps-release-pack"

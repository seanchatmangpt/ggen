description = "Landed 2026-07-22 from the verified /private/tmp/mfw-pcp-l5-exec execution copy of gpacks/mfw-pcp-level5 (MFW proof-carrying-plan lifecycle). Self-contained: its own ggen.toml (declarative-rules schema) generates a complete bounded PCP verifier crate -- Cargo manifest, certificate/obligation/distinction registries, receipt contracts, replay verifier, generated positive/negative tests, README, PROVENANCE.ttl, CI workflow, RELEASE_STANDING.json, and verify.sh -- from ontology.ttl alone into consumer/mfw-pcp-generated/. Real, live 2026-07-21 per-capability audit (ggen 26.7.26, not this pack's own optimistic self-assessment): 5/12 capabilities ALIVE (cap01 authoritative source, cap02 complete generation surface, cap03 deterministic regeneration -- two `ggen sync run` invocations byte-identical, cap04 fixed-point convergence -- erase+rebuild byte-identical to incremental, cap09 generated receipts -- `ggen receipt verify`/`ggen receipt history` valid+signed). 7/12 PARTIAL_ALIVE, two with a real reproduced falsifier hit rather than just an unaudited gap: cap11 (generated evolution path) -- adding a new pcp:CertificateKind regenerates src/certificates.rs correctly but fails the generated test suite (`certificate_inventory_is_complete` hardcodes `assert_eq!(certificates::ALL.len(), 10)` instead of a SPARQL-derived count -- an Epistemic Bypass per .claude/rules/coding-agent-mistakes.md class 2), while adding a pcp:ProofObligation regenerates cleanly with zero hand-repair; cap12 (consumer replacement) -- only succeeds after fixing a critical FRONTMATTER_LEAK defect present in every templates/**/*.tmpl file (a leaked, un-stripped `---\nto:...\nsparql:...\n---` header belonging to ggen's mutually-exclusive frontmatter ggen.toml schema, which broke `cargo build` on the as-shipped pack with invalid TOML at Cargo.toml:1:4); fixed here (semantically inert -- the header duplicated ggen.toml's own [[generation.rules]] fields). Landing this pack into the real repo (not the isolated scratch copy) surfaced a third real defect: the generated Cargo.toml had no `[workspace]` table, so Cargo tried to fold the regenerated consumer into ggen's own root workspace -- fixed by adding an empty `[workspace]` table to templates/Cargo.toml.tmpl (same pattern as examples/receiptctl/Cargo.toml); cap03/cap04/cap09/cap12 were re-verified live from packs/mfw-pcp-level5-pack/ after this fix (see L5_CAPABILITY_LEDGER.json's notes_2026_07_22_landing_pass). cap05/06/07/08/10 PARTIAL_ALIVE unchanged from an earlier structural-validator pass, out of this pass's audited scope. See L5_CAPABILITY_LEDGER.json and evidence/*.json for full command transcripts and digests, and .specify/pack-l5-promotion.ttl's l5p:pack_mfw_pcp_level5 individual for this repo's own L5 pack-closure promotion program entry."

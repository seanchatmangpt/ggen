[pack]
name = "anti-llm-cheat-lsp-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from detector-rule vocabulary for ~/anti-llm-cheat-lsp, a process-mining LSP server (built on lsp-max) that detects LLM-generated code smells: victory-claim overclaiming, dead alternative functions, hedge comments, and unsafe/unverified-routing patterns. Modeled from its README's 6-layer detector stack and its 2-row Rule Index table (ANTI-LLM-DEAD-ALT-001, ANTI-LLM-HEDGE-001) -- the README states the full rule set is larger but only tabulates these two, so only these two are modeled as individuals."

[pack]
name = "anti-llm-cheat-lsp-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from detector-rule vocabulary for ~/anti-llm-cheat-lsp, a process-mining LSP server (built on lsp-max) that detects LLM-generated code smells: victory-claim overclaiming, dead alternative functions, hedge comments, and unsafe/unverified-routing patterns. Modeled from its README's 6-layer detector stack and its 2-row Rule Index table (ANTI-LLM-DEAD-ALT-001, ANTI-LLM-HEDGE-001) -- the README states the full rule set is larger but only tabulates these two, so only these two are modeled as individuals. Round 2 (2026-07-19): generated detector functions were renamed and re-signed to match the real target exactly -- scan_for_dead_alt/scan_for_hedge, both (filepath: &str, content: &str) -> Vec<Observation>, with Observation/AntiLlmDiagnostic field-for-field ports of the target's src/{observations,diagnostics}.rs and evaluate/evaluate_hedge direct ports of dead_alt.rs::evaluate/hedge.rs::evaluate (against a generated, trimmed AntiLlmConfig carrying only the allowed_suppression_paths/is_suppression_allowed slice those two evaluate fns use). scan_for_hedge now compiles the ontology-sourced regex with the real `regex` crate (via a `hedge_re()` OnceLock, matching the target's own) instead of a hand-rolled substring approximation. The strongest fidelity artifact: the target's own #[cfg(test)] mod tests {..} blocks from dead_alt.rs:153-218 and hedge.rs:114-142 (commit a1bc775) are copied into src/anti_llm_cheat_catalog.rs with the sole edit being the enclosing mod identifier (tests -> dead_alt_tests/hedge_tests, since both can't be named `tests` in one file) -- sha256-verified byte-identical to the source with that line excluded -- and pass unmodified (34/34 total, 2026-07-19, fresh scratch consumer, real `ggen sync run` + `cargo test`, exit 0). Also generates a SPARQL-driven data-fidelity proof test (tests/anti_llm_cheat_catalog_proof.rs) plus adversarial behavioral tests for both scan functions. All 4 generated outputs use freeze_policy: checksum: a hand-edit to any generated file is detected and the next `ggen sync run` refuses to clobber it -- live-verified in a scratch consumer (2026-07-19: appending a comment to src/anti_llm_cheat_catalog.rs then re-running sync produced `\"skipped: frozen: freeze_policy=checksum, on-disk content no longer matches ggen's last-recorded checksum (manual edit detected)\"`, not a silent overwrite). The 4th template (anti_llm_cheat_lib_wiring.rs.tmpl) generates a pack-uniquely-named src/anti_llm_cheat_lsp_pack_lib_wiring.rs (never src/lib.rs itself, to avoid the cross-pack lib.rs collision bug found in round 2) and now also declares an inline `pub mod config { .. }` (the trimmed AntiLlmConfig) at the same crate-root scope, since evaluate/evaluate_hedge and the copied reference tests reference `crate::config::AntiLlmConfig` exactly as the target does -- the consumer still adds exactly one `include!(\"anti_llm_cheat_lsp_pack_lib_wiring.rs\");` line to their own lib.rs, once, and that line never needs to change across regens. This reduces but does not eliminate consumer effort (not L5: the include line is still a manual, one-time step; AntiLlmDiagnostic::to_lsp() was deliberately not ported, since it needs the heavy lsp_max::lsp_types dependency for no behavioral gain in a reference-only pack)."

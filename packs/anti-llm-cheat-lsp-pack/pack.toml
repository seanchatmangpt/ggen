[pack]
name = "anti-llm-cheat-lsp-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from detector-rule vocabulary for ~/anti-llm-cheat-lsp, a process-mining LSP server (built on lsp-max) that detects LLM-generated code smells: victory-claim overclaiming, dead alternative functions, hedge comments, and unsafe/unverified-routing patterns. Modeled from its README's 6-layer detector stack and its 2-row Rule Index table (ANTI-LLM-DEAD-ALT-001, ANTI-LLM-HEDGE-001) -- the README states the full rule set is larger but only tabulates these two, so only these two are modeled as individuals. Generates real, callable detector functions (scan_dead_alt/scan_hedge) whose behavior is driven by ontology-sourced pattern data (alc:pattern/alc:patternKind), re-verified verbatim against the target's own src/rules/{dead_alt,hedge}.rs on 2026-07-19 (commit a1bc775, unchanged since 2026-06-30). Also generates a SPARQL-driven data-fidelity proof test (tests/anti_llm_cheat_catalog_proof.rs) plus adversarial behavioral tests for both scan functions. All 3 generated outputs use freeze_policy: checksum (round 3, 2026-07-19): a hand-edit to any generated file is detected and the next `ggen sync run` refuses to clobber it -- live-verified in a scratch consumer. A 4th template (anti_llm_cheat_lib_wiring.rs.tmpl) generates a pack-uniquely-named src/anti_llm_cheat_lsp_pack_lib_wiring.rs (never src/lib.rs itself, to avoid the cross-pack lib.rs collision bug found in round 2) -- the consumer adds exactly one `include!(\"anti_llm_cheat_lsp_pack_lib_wiring.rs\");` line to their own lib.rs, once, and that line never needs to change across regens. This reduces but does not eliminate consumer effort (not L5: the include line is still a manual, one-time step)."

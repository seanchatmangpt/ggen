[pack]
name = "wasm4pm-interview-assist-pack"
version = "0.1.0"
description = "InterviewAssist PRD/ARD represented as admitted public-ontology RDF (schema.org, dcterms, prov, skos, odrl, dcat, spdx, hydra, doap, foaf -- no project-local classes or predicates anywhere). This is the first artifact of the InterviewAssist manufacturing chain: the specification itself becomes data before any projection to code. Nine ontology/*.ttl graphs (document, product, requirements, capabilities, events/workflow, policy, provenance/receipts, packs/datasets, acceptance) plus shapes/interview-assist.shacl.ttl. Not yet consumed by `ggen sync run` -- ggen only auto-loads a single root ontology.ttl, and SHACL isn't executed by the engine (this repo's own convention moved SHACL to SPARQL gates); this pack's ontology/ and shapes/ files are pre-projection source, validated directly with rdflib/pyshacl. A later phase will either concatenate the ontology/*.ttl files or wire them via a consumer ggen.toml's `extra_ontologies`, and will translate the SHACL constraints into gates/*.rq, before any Tera template/projection work begins."

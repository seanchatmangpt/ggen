[pack]
name = "wasm4pm-interview-assist-pack"
version = "0.1.0"
description = "InterviewAssist PRD/ARD represented as admitted public-ontology RDF (schema.org, dcterms, prov, skos, odrl, dcat, spdx, hydra, doap, foaf -- no project-local classes or predicates anywhere). Nine hand-edited ontology/*.ttl source graphs (document, product, requirements, capabilities, events/workflow, policy, provenance/receipts, packs/datasets, acceptance) are deterministically concatenated by scripts/build-ontology.py into the root ontology.ttl that ggen-engine's resolve_pack_dir requires (TICKET-006; verified via a real `ggen sync run --dry-run` ABA test: FM-PACK-004 with ontology.ttl removed, gone with it present). shapes/interview-assist.shacl.ttl's 14 SHACL NodeShapes are cross-verified via scripts/validate-shacl.py (pyshacl, pre-projection) and translated into gates/*.rq (TICKET-009; 9 enforceable gates, cross-checked to find the identical 13 resources pyshacl finds on a reintroduced fixture bug). Zero templates exist yet (TICKET-011+, workstream C onward) -- a real dry-run against this pack currently fails at FM-PACK-005 (zero templates), the expected next gate, not FM-PACK-004."

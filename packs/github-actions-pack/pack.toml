[pack]
name = "github-actions-pack"
version = "0.1.0"
description = "TCPS production-process pack for GitHub Actions (生産設備と工程標準): models CI/CD workflows as four RDF layers — Event (when a production obligation comes into existence), Workflow (identity/purpose/inputs/outputs/secrets/concurrency/permission ceiling/evidence obligations/standing effect), Job+Step (deps/runner/matrix/timeout/permissions/artifacts/evidence/failure classification, distinguishing step-executed != step-succeeded != job-succeeded != evidence-admitted != standing-acquired), and Production-output (binary/test-report/docs/package/release-asset/SBOM/attestation/receipt/drift-report/standing-judgment). Derives minimal GITHUB_TOKEN permissions from declared operations and REFUSES write-all, unspecified permissions, unnecessary contents:write, unbounded pull_request_target, mutable third-party action refs (pinned SHAs required), and secret use without a declared reason. Complements gh-terraform-pack (工場配置と管理標準 — institutional state); this pack owns the production process on events."

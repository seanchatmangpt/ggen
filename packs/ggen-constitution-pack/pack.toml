[pack]
name = "ggen-constitution-pack"
version = "0.1.0"
description = "ggen-constitution-pack (heal-thyself-r1): admitted-semantics mirror of .specify/memory/constitution.md v2.0.0. One ccn:Law individual per numbered constitutional principle (I-XIV), each carrying ccn:statement (verbatim/faithful-paraphrase text, canonical Japanese terms kept verbatim per Principle XIII), ccn:enforcedBy (real file:line anchors, grepped 2026-07-19), ccn:provenBy (real test function names, grepped 2026-07-19), and ccn:mechanized (true only where a real enforcing test/gate was found; false with an honest 'pending' note otherwise -- Principle XI/XII self-certification and receipt-epoch laws are honestly false pending the Center 2 receipt-v2-epoch migration, a separate ongoing workflow phase). Generates docs/CONSTITUTION.md (renders every ccn:Law via SPARQL SELECT) plus two SPARQL ASK gates: every law must carry a statement, and mechanized=true laws must carry a provenBy. Per Principle XI's Governance section: where this pack and .specify/memory/constitution.md's prose disagree, the disagreement is itself a defect -- neither silently wins."

[pack]
name = "lsp-max-pack"
version = "0.1.0"
description = "Generates lsp-max RulePackServer rules/*.toml regex rule-pack files from LintRule individuals in the pack ontology (id, name, severity, pattern, path_globs, exclude_globs, message, rationale, eval_budget -- all ontology-sourced, field-for-field matching the real rule_pack_server.rs::Rule struct, verified 2026-07-18). Also generates its own proof test (rule_pack_proof.rs.tmpl -> tests/lsp_max_rule_pack_proof.rs) that parses the generated TOML/markdown with real toml/regex crates and checks them against literals hand-transcribed from ontology.ttl, including running each rule's pattern against real positive/negative code snippets. shapes.ttl (added 2026-07-19) SHACL-constrains every lm:LintRule field's cardinality/non-emptiness and closes lm:severity/lm:evalBudget to the real string sets rule_pack_server.rs actually recognizes -- run `ggen graph validate --files ontology.ttl --shapes shapes.ttl`. L5-push cap05 closure (2026-07-21): added templates/rule_pack_sparql_derived_proof.rs.tmpl, generating tests/lsp_max_rule_pack_sparql_derived_proof.rs -- a SECOND proof, ALONGSIDE (never replacing) rule_pack_proof.rs.tmpl's hand-transcribed one, applying praxis-core-pack's proven cap05 reference pattern (refusal_taxonomy_sparql_derived_proof.rs.tmpl) to this pack's own real ontology shape (lm:LintRule, the rules query -- not assumed to match praxis-core-pack's or star-toml-pack's shape). Carries the identical sparql: frontmatter (rules) as rule_pack.toml.tmpl, no freeze_policy of its own, and independently re-renders that query in a separate Tera pass so a field-mapping bug local to one template cannot corrupt both identically. Unlike praxis-core-pack/star-toml-pack, neither of this pack's generated-source templates carries a freeze_policy key -- the real gap the second proof closes is that rule_pack_proof.rs.tmpl's EXPECTED_RULES literal lives in the template's own Rust source text, not behind a query, so it only changes when a human hand-edits the template file, never automatically from an ontology.ttl edit. Built examples/lsp-max-verify/ (no pre-existing consumer found in the repo), mirroring examples/praxis-core-verify/'s posture: standalone workspace, minimal hand-written src/lib.rs (lsp-max-pack generates no Rust module for this crate to include!, so there is nothing to wire beyond ggen.toml). Verified end-to-end via a real `ggen sync run` + `cargo build` + `cargo test`: cargo test went from 7/7 (pre-existing hand-transcribed proof only) to 12/12 (7 hand-transcribed + 5 new SPARQL-derived: sparql_query_returned_at_least_one_rule, rule_count_matches_generated_toml_files_right_now, every_live_rule_matches_generated_artifacts_right_now, live_row_order_is_lexical_ascending_by_rule_id_in_markdown_catalog, generated_artifacts_reject_unknown_rule_id). Drift-sensitivity proof: temporarily changed UnwrapRule's lm:severity from \"error\" to \"warning\" in ontology.ttl, re-synced (hit and fixed, via documented remediation -- deleting the stale ggen.lock and the specific differing generated targets, never force: true -- the same FM-PACK-008/FM-WRITE-005 refusals star-toml-pack's own verification hit), and confirmed (a) the new proof's LIVE_RULES/every_live_rule_matches_generated_artifacts_right_now re-derived to severity \"warning\" and passed against the freshly-regenerated rules/lsp_max_lspmax_unwrap_001.toml and docs/lsp_max_rule_pack.md, proving the array is genuinely re-derived, not hardcoded, and (b) the PRE-EXISTING hand-transcribed proof's every_generated_rule_matches_one_hand_transcribed_expectation test FAILED for real (\"severity mismatch for LSPMAX-UNWRAP-001, left: \\\"warning\\\", right: \\\"error\\\"\") -- its EXPECTED_RULES literal never re-derives from ontology.ttl, so it kept asserting the old value against the newly-regenerated artifact. Reverted the ontology.ttl edit byte-for-byte (zero git diff) and re-synced; all 12 tests returned to passing, and a `diff -rq` against a pre-edit snapshot (excluding target/.ggen/.ggen-v2) was empty. Idempotency: a further `ggen sync run` with no changes reported written: [] on every one of the 6 generated files."

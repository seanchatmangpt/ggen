[pack]
name = "wasm4pm-interview-site-pack"
version = "0.1.0"
description = "InterviewAssist Phase 0 Next.js reference sandbox site (ARD Section 7): the HackerRank/CoderPad/CodeSignal-equivalent 80/20 surface -- Monaco editor, language selection, compile/execute, visible/hidden tests, console. Generates: lib/capabilities.ts (typed catalog), lib/executor-contract.ts (dispatch contract, no execution code), app/api/sandbox/[capability]/route.ts (Next.js dispatch handler), components/editor/{CodeEditor,Console}.tsx, app/page.tsx, package.json/tsconfig.json/next.config.ts/vitest.config.ts, tests/capabilities.test.ts (SPARQL-derived proof). Catalog/wiring surface only -- the real subprocess executor is a small hand-written lib/executor.ts in the consuming project, same boundary as wasm4pm-sandbox-pack's SandboxActuator trait. Shares its six compile_python/execute_python/run_pytest/compile_rust/execute_rust/run_cargo_test capability ids with wasm4pm-sandbox-pack so the Rust and TS sides describe the same capabilities, not divergent ones."

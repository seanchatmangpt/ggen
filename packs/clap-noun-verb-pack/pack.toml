[pack]
name = "clap-noun-verb-pack"
version = "0.1.0"
description = "Generates clap-noun-verb route skeletons (noun-verb #[verb] fns calling handler stubs) from cnv:Command individuals in the pack ontology. Commands carrying cnv:staticResponse render their entire body inline from the ontology literal and require ZERO hand-written crate::verbs::handlers::* fn (see cnv:SessionPing) -- all other commands still delegate to a hand-written handler seam. cnv:Noun -> cnv:Command is a formal cnv:hasCommand object property, checked by shapes.ttl (cardinality + non-empty required fields on every Command/Noun). The same template also renders a #[cfg(test)] proof module into the end of that same generated routes file (private-fn visibility requires an in-file test mod, not a separate tests/*.rs -- and a second template targeting the same `to:` path would hit this engine's own FM-WRITE-008 duplicate-output guard) asserting real calls through the generated wrappers, actual-content assertions for the zero-handler command, and drift-canary literals rendered from the same commands/nouns SPARQL projection as the routes themselves (not hand-transcribed)."

[pack]
name = "clap-noun-verb-pack"
version = "0.1.0"
description = "Generates clap-noun-verb route skeletons (noun-verb #[verb] fns calling handler stubs) from cnv:Command individuals in the pack ontology. Commands carrying cnv:staticResponse render their entire body inline from the ontology literal and require ZERO hand-written crate::verbs::handlers::* fn (see cnv:SessionPing) -- all other commands still delegate to a hand-written handler seam. cnv:Noun -> cnv:Command is a formal cnv:hasCommand object property, checked by shapes.ttl (cardinality + non-empty required fields on every Command/Noun). The same template also renders a #[cfg(test)] proof module into the end of that same generated routes file (private-fn visibility requires an in-file test mod, not a separate tests/*.rs -- and a second template targeting the same `to:` path would hit this engine's own FM-WRITE-008 duplicate-output guard) asserting real calls through the generated wrappers, actual-content assertions for the zero-handler command, and drift-canary literals rendered from the same commands/nouns SPARQL projection as the routes themselves (not hand-transcribed). Tier 3 (added 2026-07-19) exercises the REAL #[verb]-macro CLI dispatch path per command -- literal argv -> clap parsing -> the linkme-registered noun/verb tree -> the real handler -- via clap_noun_verb::cli::registry::CommandRegistry::get().run(argv), plus a real negative-path test per command with a required argument (clap's own required-arg enforcement failing closed, not a hand-written assertion about what it should do). Verified this MUST stay inside this file's own #[cfg(test)] mod, not a separate tests/*.rs integration-test crate: a separate test binary that references nothing else from the consumer crate never links in the .o containing this file's #[linkme::distributed_slice] registrations, so CommandRegistry::get_all_noun_names() comes back empty there even though the identical call from a unit test (or the real compiled binary) sees both nouns -- confirmed with a throwaway debug probe in both positions before settling on the in-file design."

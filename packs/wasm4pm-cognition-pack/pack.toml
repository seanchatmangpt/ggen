[pack]
name = "wasm4pm-cognition-pack"
version = "0.1.0"
description = "wasm4pm cognition breed catalog and typed dispatch-surface skeleton over the stable 6-verb ABI (cognition_show/run/verify/replay, system_build/verify); catalog/caller surface only — evidence and analysis stay in wasm4pm. Generates: src/w4pm_cognition_catalog.rs (typed catalog + compat:breedFamily grouping), src/w4pm_cognition_dispatch.rs (always-regenerated per-breed wrappers, force:true), src/w4pm_cognition_dispatch_handler.rs (hand-completed once, unless_exists:true freeze slot -- regen-safe across new breeds), docs/generated/W4PM_COGNITION_BREED_CATALOG.md, an lib.rs mod-wiring injection for the handler module, tests/w4pm_cognition_proof.rs (8-row hand-transcribed spot proof) and tests/w4pm_cognition_proof_full.rs (SPARQL-generated full 55-row round-trip proof)"

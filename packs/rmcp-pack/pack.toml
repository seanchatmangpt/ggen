[pack]
name = "rmcp-pack"
version = "0.1.0"
description = "Typed Rust catalog + reference doc, generated from the real public API of the `rmcp` crate (github.com/modelcontextprotocol/rust-sdk, crates.io \"rmcp\"), the official Rust SDK for the Model Context Protocol. Grounded 2026-07-21 by `cargo add rmcp --features server,client,macros,transport-io,transport-child-process` + `cargo fetch`, pulling the real rmcp v2.2.0 (latest on crates.io) into ~/.cargo/registry/src/.../rmcp-2.2.0/ (sibling rmcp-macros-2.2.0 alongside it), then reading that vendored source directly -- not docs.rs prose, not memory. Verified live, twice (first at grounding time, re-confirmed during this pack's build pass): a `#[tool_router]`/`#[tool]`/`#[tool_handler]` stub compiled AND ran against this workspace's own pinned nightly (nightly-2026-06-22), and `Stub::tool_router().list_all()` returned a real `rmcp::model::Tool { name: \"echo\", description: Some(\"Echo back the input string\"), .. }` -- proof the macro-generated ToolRouter produces genuine values, not placeholders. ~/remo/rmcp was NOT used: confirmed empty of Cargo.toml/src, not the real crate. Models 4 real surfaces, 72 individuals total: rmcp:HandlerMethod (43 -- all 27 ServerHandler + all 16 ClientHandler trait methods, exhaustively enumerated from src/handler/{server,client}.rs's real trait-method bodies, each with real params/return types, a real default-behavior sentence, and a file:line citation -- including call_tool's real doc comment on the Ok(CallToolResult::error(...)) vs Err(McpError) UI-visibility distinction), rmcp:Macro (7 -- all real #[proc_macro_attribute] fns in the sibling rmcp-macros crate: tool, tool_router, tool_handler, prompt, prompt_router, prompt_handler, task_handler, each with the real syn AST node it parses (ImplItemFn=\"fn\" vs ItemImpl=\"impl\", confirmed by reading each macro's own syn::parse2::<...> call site, not assumed) and its real documented field table -- 3 columns (field|type|usage), not clap-noun-verb-pack's 4-column field|rust_type|required|about shape, because rmcp-macros' real doc tables carry no \"required\" column; only the pipe/@@ delimiter grammar is reused, not the column count, and this discrepancy is disclosed in ontology.ttl's own rmcp:macroFields comment rather than silently forced to 4 columns), rmcp:Transport (7 -- stdio, TokioChildProcess, StreamableHttpClientTransport [really a `pub type ... = WorkerTransport<StreamableHttpClientWorker<C>>` alias, not a struct -- disclosed], StreamableHttpService, WorkerTransport, AsyncRwTransport, SinkStreamTransport, each with its real feature gate read directly from src/transport.rs's own #[cfg(feature = ...)] attributes; SinkStreamTransport has none at all -- unconditionally compiled -- and its featureFlag value says so explicitly rather than being left empty or naming a fake feature), and rmcp:Feature (15 -- the 6+6+3 flags README.md's own three real markdown tables document; Cargo.toml itself defines 26 total, 11 more, undocumented in README and out of this pass's scope: __reqwest, local, auth-client-credentials-jwt, client-side-sse, server-side-http, tower, transport-worker, transport-streamable-http-server-session, transport-streamable-http-client-unix-socket, which-command, plus the implicit base64 optional-dependency feature -- the last one a real, disclosed fidelity gap: Cargo.toml's actual default array is [\"base64\", \"macros\", \"server\"], but README's own Feature Flags table has no base64 row and marks only server/macros as default, so rmcp:featureDefault reflects README's own (incomplete) default column, not the full Cargo.toml array). NOT modeled (disclosed, not fabricated): the JSON-RPC message/error-code enumeration, streamable-HTTP session-store internals, OAuth2 flow detail beyond type names, and the ~50 integration tests under tests/test_*.rs. Structural template: mirrors packs/mcpp-pack (the closest real precedent read and chosen after packs/wasm4pm-pack -- wrong shape, a workspace crate-map vocabulary rmcp's single-crate-plus-proc-macro-sibling surface doesn't fit -- and packs/cargo-cicd-pack / mcpp-pack's own cnv:Command shape as-is were both rejected: rmcp ships no CLI/binary to shell out to, so a literal noun/verb dispatch shim would be a category error). Generates: src/rmcp_handler_catalog.rs (RMCP_SERVER_METHODS / RMCP_CLIENT_METHODS typed const tables), src/rmcp_macro_catalog.rs (RMCP_MACROS), src/rmcp_transport_catalog.rs (RMCP_TRANSPORTS), src/rmcp_feature_catalog.rs (RMCP_FEATURES), src/rmcp_stub_handler.rs (a REAL, compiling `impl ServerHandler for RmcpStubHandler` via #[tool_router]/#[tool]/#[tool_handler] against the real rmcp crate -- the same macro invocation pattern proven live in the grounding pass, not a generic subprocess shim like mcpp-pack's dispatch.rs, since rmcp has no binary to shell out to; this is a stronger real-collaborator story: it exercises the target crate's own compiled code directly), docs/rmcp_reference.md (SPARQL-projected markdown tables for all 4 classes), a pack-uniquely-named src/rmcp_lib_wiring.rs mod-aggregator (force:true; the consumer adds one `include!(\"rmcp_lib_wiring.rs\");` line to their own src/lib.rs -- this engine's own FM-WRITE-008 duplicate-output guard rules out `to: src/lib.rs`/`inject: true` the moment a second pack shares a real consumer, per mcpp-pack/cargo-cicd-pack/praxis-core-pack/star-toml-pack's own identical, independently-converged-on fix), tests/rmcp_handler_catalog_proof.rs (hand-transcribed, NO sparql: frontmatter -- anti-tautology discipline identical to mcpp_catalog_proof.rs.tmpl: row-count assertions, spot-checked rows, sortedness invariant, no-duplicate invariant, non-empty-source-file invariant), and tests/rmcp_stub_handler_proof.rs (a REAL behavior proof -- instantiates RmcpStubHandler, calls `RmcpStubHandler::tool_router().list_all()`, and asserts on the real rmcp::model::Tool returned, the exact call sequence already proven live against the real crate in the grounding pass, so the template's expected behavior is not speculative). All 5 primary generated Rust/doc artifacts use freeze_policy: checksum (not force:true): a hand-edited output is refused with a named checksum-mismatch error on the next sync, not silently overwritten. gates/ (010_required.rq, 020_single_valued.rq, 030_value_constraints.rq) are SPARQL-translated-SHACL constraints, namespace-scoped to the rmcp# IRI space (same rationale as mcpp-pack's own gates: an unscoped gate would wrongly demand rmcp-only facts from other packs' individuals in a union graph), each carrying a `# MESSAGE:` comment naming the real constraint it translates. Committed consumer: examples/rmcp-verify, mirroring examples/star-toml-verify's posture (chosen over examples/praxis-core-verify's: star-toml, like rmcp, is a real crates.io-published dependency, `rmcp = \"2.2\"`, not a workspace-internal path dependency)."

# ===================================================================
# PROC-MACRO DUPLICATION ANALYSIS (Updated 2026-01-24)
# ===================================================================
# After updating genai to 0.5 and centralizing in workspace.dependencies:
#
# derive_more duplicates (3 versions):
#   - v2.1.1: genai (production) - unavoidable, genai's choice
#   - v1.0.0: value-ext ← genai (production, transitive) - unavoidable
#   - v0.99.20: cucumber (dev-only) - ACCEPTABLE
#
# darling duplicates (2 versions):
#   - v0.21.3: serde_with_macros ← genai (production, transitive)
#   - v0.20.11: dummy ← fake ← chicago-tdd-tools (dev-only) - ACCEPTABLE
#
# Impact: 2 production proc-macro duplicates from genai's inconsistent dep tree
# These are unavoidable without forking genai or value-ext.
# Dev-only duplicates (cucumber, chicago-tdd-tools) are acceptable.
# ===================================================================
[features]
default = []
nightly = ["ggen-utils/nightly"]
termlog = ["ggen-utils/termlog"]
journald = ["ggen-utils/journald"]
syslog = ["ggen-utils/syslog"]
london_tdd = []
integration = []  # Enable workspace-level integration tests (requires external services/missing crates)
# OpenTelemetry instrumentation (optional - adds ~200 dependencies)
# Enable with: cargo build --features otel
# Only forward to ggen-core, which handles its own otel dependencies
otel = [
  "ggen-core/otel",
]
[dependencies]
ggen-utils = { path = "crates/ggen-utils", version = "0.2.0" }
ggen-cli-lib = { path = "crates/ggen-cli", version = "0.2.0" }
ggen-core = { path = "crates/ggen-core", version = "0.2.0" }
ggen-ai = { path = "crates/ggen-ai", version = "0.2.0" }
ggen-a2a-mcp = { path = "crates/ggen-a2a-mcp", version = "0.1.0", optional = true }
chrono = { workspace = true }
human-panic = "2.0.3"
better-panic = "0.3.0"
log = "0.4.28"
env_logger = "0.11"
tokio = { version = "1.47", features = ["full"] }
anyhow = "1.0"
serde_json = "1.0"
serde_yaml = "0.9"
tempfile = "3.23"
tera = "1.20"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
uuid = { version = "1.18", features = ["v4"] }
genai = { workspace = true }
tracing-subscriber = "0.3"
# Note: OpenTelemetry dependencies are optional at the crate level (ggen-core, etc.)
# The root package doesn't directly use OTEL, so these are not included here.
# Enable OTEL via: cargo build --features otel (which forwards to ggen-core/otel)
# Example definitions removed - examples now discovered automatically by Cargo
[dev-dependencies]
assert_cmd = "2.0.17"
predicates = "3.1.3"
serde_json = "1.0"
tempfile = "3.23"
anyhow = "1.0"
ggen-domain = { path = "crates/ggen-domain" }
ggen-yawl = { path = "crates/ggen-yawl", version = "0.1.0" }
oxigraph = { version = "0.5.6", features = ["rdf-12"] }
# BDD testing framework
cucumber = "0.20"
assert_fs = "1.1"
mockito = "1.7"
insta = "1.43"
serial_test = "3.2"
md5 = "0.8"
shell-words = "1.1"
# E2E test dependencies
toml = "0.9"
reqwest = { version = "0.12", features = ["blocking", "json"] }
genai = { workspace = true }
proptest.workspace = true
# chicago-tdd-tools = { workspace = true, features = ["testcontainers"] }
# Note: chicago-tdd-tools commented for cross-platform compatibility
# Cleanroom integration for CLI testing
clnrm = "0.1.0"
testcontainers = "0.25"
testcontainers-modules = "0.13"
rand = "0.8"
mockall = "0.13"
fake = "2.9"
futures.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
chicago-tdd-tools = { version = "1.4.0", features = ["testing-extras", "testcontainers"] }
# Performance benchmarking
criterion = { version = "0.7", features = ["html_reports"] }
once_cell = "1.20"
lazy_static = "1.4"
fastrand = "2.3"
# Process Mining for workflow analytics
process_mining = "0.2"
ggen-process-mining = { path = "crates/ggen-process-mining", version = "0.1.0" }
# Cryptographic hashing for receipt tests
sha2 = "0.10"
# A2A/TPS System Benchmarks
ggen-a2a.workspace = true
regex = "1.12"
validator = "0.19"
ed25519-dalek = "2.1"
[profile.dev]
opt-level = 0
debug = true
rpath = false
lto = false
debug-assertions = true
codegen-units = 256          # More parallel compilation units = faster builds
incremental = true           # Enable incremental compilation
split-debuginfo = "unpacked" # Faster debug builds on macOS
[profile.release]
opt-level = 3
debug = false
rpath = false
lto = "thin"             # Thin LTO for faster builds, still optimized
debug-assertions = false
codegen-units = 16       # Balance between speed and optimization
strip = true             # Strip symbols for smaller binaries
[profile.test]
opt-level = 0           # Faster test compilation
debug = true
rpath = false
lto = false
debug-assertions = true
codegen-units = 256     # More parallel compilation
incremental = true      # Enable incremental for tests
[profile.bench]
opt-level = 3
debug = false
rpath = false
lto = true
debug-assertions = false
codegen-units = 1

# is removed entirely; `tests/integration/test_telco_routing.rs` and `benches/a2a_bench.rs`
# are gated behind this now-permanently-empty feature (their own file headers explain why) --
# their real home is crates/ggen-lsp/tests or crates/ggen-lsp/benches, where ggen-lsp's a2a
# feature is native/local and doesn't need external registry resolution to test.
a2a-integration-tests = []

[package]
name = "ggen"
version = "6.0.1"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
edition = "2021"
repository = "https://github.com/seanchatmangpt/ggen"
readme = "README.md"
license = "MIT"
keywords = ["cli", "code-generation", "rdf", "templates"]
homepage = "https://github.com/seanchatmangpt/ggen"
categories = ["development-tools", "command-line-utilities"]
description = """
ggen is a deterministic, language-agnostic code generation framework that treats software artifacts as projections of knowledge graphs.
"""

[workspace]
members = [
  # Core Pipeline (mu1-mu5)
  "crates/ggen-utils",
  "crates/ggen-cli",
  "crates/ggen-domain",
  "crates/ggen-core",
  "crates/ggen-ai",
  "crates/ggen-dspy",
  "crates/ggen-config",
  "crates/ggen-cli-validation",
  "crates/ggen-config-clap",
  "crates/ggen-test-audit",
  "crates/ggen-test-opt",
  "crates/ggen-testing",
  "crates/ggen-e2e",
  "crates/ggen-node",
  "crates/ggen-macros",
  # Ontology / RDF
  "crates/ggen-ontology-core",
  "crates/ggen-canonical",
  "crates/ggen-receipt",
  "crates/ggen-prompt-mfg",
  "crates/ggen-codegen",
  "crates/ggen-yawl",
  "crates/ggen-craftplan",
  "crates/ggen-process-mining",
  # A2A / MCP Protocol
  "crates/a2a-generated",
  "crates/ggen-a2a",
  "crates/ggen-a2a-mcp",
  "crates/ggen-a2a-registry",
  "crates/ggen-transport",
]
exclude = [
  "examples/rust-cli-lifecycle",
  "examples/a2a-agent-lifecycle",
  "examples/distributed-consensus",
  "examples/e2e-complete-system",
  "examples/marketplace-demo/generated",
  "examples/gcp-erlang-autonomics",
  "examples/api-endpoint",
  "examples/advanced-lifecycle-demo",
  "marketplace/packages/workflow-engine-cli",
  "examples/a2a-groq-agent",
  "examples/a2a-rs-agents",
  # Migrated crates (now separate projects)
  "crates/ggen-workflow",
  "crates/ggen-workflow/native",
]
resolver = "2" # Use new resolver for better dependency resolution

# Workspace-wide dependencies for version consistency
[workspace.dependencies]
tokio = { version = "1.47", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2.0"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "json",
  "ansi",
] }
clap = { version = "4.5", features = ["derive"] }
clap-noun-verb = "5.0.0"
clap-noun-verb-macros = "5.0.0"
once_cell = "1.19"
reqwest = { version = "0.12", features = ["blocking", "json", "rustls-tls"] }
tempfile = "3.23"
futures = "0.3"
futures-util = "0.3"
uuid = { version = "1.18", features = ["v4", "serde"] }
tera = "1.20"
oxigraph = { version = "0.5.6", features = ["rdf-12"] }
toml = "0.9"
serde_yaml = "0.9"
hex = "0.4"
sha2 = "0.10"

rayon = "1.11"
regex = "1.12"
log = "0.4"
notify = "7.0"
testcontainers = "0.25"
testcontainers-modules = "0.13"
notify-debouncer-full = "0.4"
assert_cmd = "2.0"
predicates = "3.1"
rig-core = "0.15.1"

# Workspace-local crates (use workspace = true pattern in workspace members)
# NOTE: v0.2.0 unified release
ggen-utils = { path = "crates/ggen-utils", version = "0.2.0" }
ggen-core = { path = "crates/ggen-core", version = "0.2.0" }
ggen-config = { path = "crates/ggen-config", version = "0.2.0" }
ggen-cli-validation = { path = "crates/ggen-cli-validation", version = "0.2.0" }
ggen-config-clap = { path = "crates/ggen-config-clap", version = "0.2.0" }
ggen-domain = { path = "crates/ggen-domain", version = "0.2.0" }
ggen-cli-lib = { path = "crates/ggen-cli", version = "0.2.0" }
ggen-node = { path = "crates/ggen-node", version = "0.2.0" }
ggen-macros = { path = "crates/ggen-macros", version = "0.2.0" }
ggen-test-audit = { path = "crates/ggen-test-audit", version = "0.2.0" }
ggen-test-opt = { path = "crates/ggen-test-opt", version = "0.2.0" }
ggen-testing = { path = "crates/ggen-testing", version = "0.2.0" }
ggen-e2e = { path = "crates/ggen-e2e", version = "0.2.0" }
ggen-ai = { path = "crates/ggen-ai", version = "0.2.0" }
ggen-ontology-core = { path = "crates/ggen-ontology-core", version = "0.2.0" }
ggen-canonical = { path = "crates/ggen-canonical", version = "0.2.0" }
ggen-receipt = { path = "crates/ggen-receipt", version = "0.2.0" }
ggen-a2a = { path = "crates/ggen-a2a", version = "6.0.1" }
ggen-prompt-mfg = { path = "crates/ggen-prompt-mfg", version = "0.2.0" }

# KNHK Systems (ETL + KGC-4D + Workflow Engine Integration)
# A2A Protocol Integration (Agent-to-Agent protocol) - using local a2a-generated
# The vendor a2a-rs is for reference only - we use our generated types
a2a-generated = { path = "crates/a2a-generated", version = "0.1.0" }

# A2A-MCP Integration for ggen
ggen-a2a-mcp = { path = "crates/ggen-a2a-mcp", version = "0.1.0" }

# A2A Registry: Multi-agent orchestration registry
ggen-a2a-registry = { path = "crates/ggen-a2a-registry", version = "0.1.0" }

ggen-transport = { path = "crates/ggen-transport", version = "6.0.1" }

# TAI Testing: Production hardening & resilience testing framework
# TPS (Toyota Production System) Kaizen implementation (continuous improvement)
# ggen-craftplan: RDF-driven Elixir code generation
ggen-craftplan = { path = "crates/ggen-craftplan", version = "0.1.0" }

# ggen-codegen: Generic code generation framework (trait-based, zero-cost abstractions)
ggen-codegen = { path = "crates/ggen-codegen", version = "0.1.0" }

# ggen-yawl: YAWL workflow generation from industry ontologies
ggen-yawl = { path = "crates/ggen-yawl", version = "0.1.0" }

# ggen-process-mining: Process mining integration with rust4pm (Alpha++, XES/OCEL)
ggen-process-mining = { path = "crates/ggen-process-mining", version = "0.1.0" }

# TAI Cache: Advanced caching with multi-tier strategies
# TAI gRPC: Service-to-service communication with advanced resilience patterns
# TAI Security: Vault, KMS, mTLS, secret rotation, encryption
# TAI Observability: Cloud Profiler, Trace, Monitoring
# TAI Kubernetes: Deployment, KEDA autoscaling, Istio traffic management
# OpenTelemetry dependencies (make optional at crate level, not workspace level)
opentelemetry = { version = "0.31" }
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic"] }
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }
tracing-opentelemetry = { version = "0.32" }

# CLI Enhancement libraries
indicatif = "0.18"
console = "0.16"

# Testing libraries
proptest = "1.8"
chicago-tdd-tools = "1.4.0"
fake = "2.9"

# AI integration
genai = "0.5"

# Force base64 version to resolve duplicate dependency issue
# config -> ron -> base64 0.21.7 conflicts with reqwest -> base64 0.22.1
base64 = "0.22"

# ===================================================================
# DEPENDENCY DEDUPLICATION (Phase 1 - Critical)
# Added 2026-01-24 to fix 160 duplicate versions
# Target: Reduce build time from >600s to <400s (33% improvement)
# Reference: examples/factory-paas/DEPENDENCY_DEDUPLICATION_PLAN.md
# ===================================================================

# Web frameworks (Critical - highest transitive impact)
# axum: 3 versions → 1 (reduces ~50-80 transitive dependencies)
# tonic: 2 versions → 1 (reduces ~30-50 transitive dependencies)
axum = "0.8"
axum-core = "0.5"
tonic = "0.14"

# Proc-macros (High impact - compilation time reduction)
# derive_more: 3 versions → 1 (v0.99, v1.0, v2.1 consolidated)
# darling ecosystem: 2 versions → 1 (v0.20, v0.21 consolidated)
derive_more = "1.0"
darling = "0.21"
darling_core = "0.21"
darling_macro = "0.21"

# Utilities (Moderate impact - direct dependencies)
# dashmap: 2 versions → 1 (v5.5, v6.1 consolidated)
# bitflags: 3 versions → 1 (consolidated)
# config: 2 versions → 1 (consolidated, default-features=false to allow customization)
# convert_case: 2 versions → 1 (consolidated)
dashmap = "6.1"
bitflags = "2.10"
config = { version = "0.15", default-features = false }
convert_case = "0.10"

# SQLite version patch - resolve conflict between a2a-rs (0.8) and ggen-api (0.7)
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls", "chrono", "uuid"] }

# Maximized linting configuration (Rust 1.78+)
# **Poka-Yoke Design**: Warnings are treated as errors to prevent defects at compile time.
# Type-first thinking: Compiler enforces correctness. If it compiles, invariants are enforced.
# Prevention is better than detection - catch issues at compile time, not runtime.
# Note: Individual lint configuration is done via attributes in code
# This section sets global lint levels
[workspace.lints.rust]
warnings = "deny"  # Poka-Yoke: Prevent warnings at compile time
unsafe_code = "deny"
missing_docs = "warn"  # Documentation warnings are less critical than code quality
dead_code = "allow"
unused_variables = "allow"

[workspace.lints.clippy]
# **Poka-Yoke Design**: Deny warnings to prevent defects at compile time.
# Type-first thinking: Use compiler as design tool to enforce correctness.
# Prevention is better than detection - catch issues at compile time, not runtime.
# Set lint groups to deny level for poka-yoke error prevention
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }
cargo = { level = "deny", priority = -1 }

# Deny critical lints for Poka-Yoke (error prevention)
# These have higher priority (0) and will override the groups
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"

# Allow multiple crate versions due to complex dependency tree
multiple_crate_versions = "allow"

# Allow cargo metadata lints for internal workspace crates
# Internal crates don't need full publish-ready metadata
cargo_common_metadata = "allow"

# Allow redundant feature names (e.g., "use-a2a-rs" prefix is intentional)
redundant_feature_names = "allow"

# Allow noisy pedantic lints that generate hundreds of false positives
# These are useful ideals but impractical to enforce across 30+ crates
must_use_candidate = "allow"
missing_const_for_fn = "allow"
module_name_repetitions = "allow"
struct_field_names = "allow"
similar_names = "allow"
too_many_lines = "allow"
type_repetition_in_bounds = "allow"

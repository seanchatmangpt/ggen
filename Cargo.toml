# `a2a-integration-tests` empty placeholder (2026-07-16, publish-safety fix, revised): a
# previous version of this comment forwarded `ggen-lsp/a2a` here, off-by-default, on the
# theory that an optional/inactive feature-forward wouldn't block publish. Empirically wrong,
# verified via `cargo publish --dry-run -p ggen`: it failed identically with the forward
# present but disabled -- Cargo's publish resolver checks every possible feature/dependency
# combination the manifest COULD produce, not just the active defaults, so ANY mention of
# `ggen-lsp/a2a` anywhere in this manifest blocks publish for as long as the published
# ggen-lsp lacks that feature. There is no Cargo.toml-only way to keep this reachable from

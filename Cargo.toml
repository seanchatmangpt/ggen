[workspace.package]
version = "26.7.44"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
edition = "2021"
repository = "https://github.com/seanchatmangpt/ggen"
license = "MIT"

[package]
name = "ggen"
version.workspace = true
authors.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
readme = "README.md"
keywords = ["cli", "code-generation", "rdf", "templates"]
homepage = "https://github.com/seanchatmangpt/ggen"
categories = ["development-tools", "command-line-utilities"]
description = """
ggen is a deterministic, language-agnostic code generation framework that treats software artifacts as projections of knowledge graphs.
"""
include = [
    "/Cargo.toml",
    "src/**/*",
    "templates/**/*",
    "build.rs",
    "/LICENSE",
    "/README.md",
    "/CHANGELOG.md",
    "scripts/generate_registry_hashes.rs",
]
# autobins = false (2026-07-16, v26.7.16 CLI-routing flip): this package's own `[[bin]]
# name = "ggen"` (formerly here, now removed) was a byte-identical duplicate of
# ggen-cli-lib's `[[bin]] name = "ggen"` -- both `main.rs` files just delegated to
# `ggen_cli_lib::cli_match()`. That duplicate was a real, pre-existing bin-name collision
# within this workspace (harmless for local `cargo build`, but meant the two packages raced
# for `target/debug/ggen`). It also meant this package's OWN publish required resolving
# `ggen-cli-lib` from the registry -- and ggen-cli-lib is now correctly `publish = false`
# (it has a real, functional dependency on ggen-engine, which can never be published; see
# ggen-cli-lib's own Cargo.toml comment and task #35 in the migration session tracker), so
# a real bin target here made `cargo publish --dry-run -p ggen` unresolvable forever.
# `src/main.rs` stays on disk (fix-forward doctrine, not deleted) but is no longer built from
# this package -- the canonical "ggen" binary is now built solely from ggen-cli-lib
# (`cargo build -p ggen-cli-lib --bin ggen`, wired into the `GGEN` justfile variable). This
# package (`ggen` on crates.io) is now a pure library crate: `cargo add ggen` continues to
# work; `cargo install ggen` no longer builds a CLI binary from this specific package.
autobins = false

# CI-portable replacement for the stale, macOS-arm64-only Mach-O binary that used to be
# committed directly at scripts/generate_registry_hashes (ENOEXEC on Linux CI runners --
# see tests/e2e_marketplace.rs::test_hash_generation, the only consumer). The real logic
# always lived in scripts/generate_registry_hashes.rs; it just was never wired as a real
# Cargo binary target, so nothing rebuilt it for the host running the test.
[[bin]]
name = "generate_registry_hashes"
path = "scripts/generate_registry_hashes.rs"
test = false
doc = false

[workspace]
members = [
  "crates/ggen-config",
  "crates/ggen-marketplace",
  "crates/ggen-cli",
  "crates/ggen-graph",
  "crates/ggen-lsp",
  # ggen-core replacement engine (docs/jira/v26.7.16/): vendored, renamed copy
  # of ~/praxis/crates/ggen (see 01-PUBLISH-SAFETY-AND-CRATE-RENAME.md) plus
  # its two direct dependencies, also vendored so migration-specific edits
  # (e.g. ReceiptRecord.signature_hex) land here, not upstream in ~/praxis.
  # Landed inert in this pass -- no consumer references them yet.
  "crates/ggen-engine",
  "crates/praxis-core",
  "crates/praxis-graphlaw",
  "crates/powl2-decompose",
  "crates/chicago-tdd-tools",
  "crates/bcinr-pddl",
  "crates/bcinr-mfw-ir",
  # Genesis kernel crates (pure Rust, IO-free)
  "crates/genesis-types-v2",
  "crates/genesis-core-v2",
  "crates/cpmp",
  "crates/ggen-cheat-scanner",
  # ARCHIVED out of the v26.5.29 build boundary (SETTLEMENT-CHECK-1): this example
  # drifted from its own types in a prior release (ValidationAgent missing the
  # `agent_type` field; async fns misusing `?`) and does not compile under
  # --all-targets. Nothing depends on it. A broken member is a small Oracle Gap
  # ("in the build" but not buildable), so it leaves the boundary. Code preserved
  # on disk (non-deletion doctrine); re-add after repair.
  # "examples/7-agent-validation",
  ]
# `crates/ggen-core` (2026-07-17, ggen-core removal, docs/jira/v26.7.16/14-GGEN-CORE-REMOVAL-PROPOSAL.md):
# fully deleted, not merely disconnected. It spent from 2026-07-16 to 2026-07-17 in `exclude`
# below (disconnected but kept on disk); that interim state is now closed out per the
# migration ticket set's own Phase 6/7. Git history retains the code if it's ever needed.
exclude = ["examples/7-agent-validation"]
resolver = "2" # Use new resolver for better dependency resolution

# Workspace-wide dependencies for version consistency
[workspace.dependencies]
serial_test = "3.2"
lsp-max = "26.6.9"
lsp-max-protocol = "26.6.9"
lsp-max-macros = "26.6.9"
lsp-max-client = "26.6.9"
tokio = { version = "1.47", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2.0"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "json",
  "ansi",
] }
clap = { version = "4.5", features = ["derive"] }
clap-noun-verb = "=26.7.4"
clap-noun-verb-macros = "=26.7.4"
once_cell = "1.19"
# default-features = false + explicit charset/http2/system-proxy (2026-07-22):
# reqwest 0.12's own `default = ["default-tls", "charset", "http2",
# "system-proxy"]` was staying enabled ADDITIONALLY alongside the
# already-explicit "rustls-tls" below (Cargo features are additive, not a
# replacement, unless default-features is disabled) -- meaning every
# workspace member using this shared spec compiled BOTH TLS backends,
# pulling in native-tls -> openssl-sys on Linux even though rustls-tls was
# the only one anyone actually asked for. This broke cross-compiling the
# release binary for aarch64-unknown-linux-gnu (missing target-arch OpenSSL
# dev headers on the runner; found via a real release.yml run,
# 29915682895) -- confirmed root cause by reading reqwest 0.12.28's own
# Cargo.toml locally. Re-adding charset/http2/system-proxy explicitly so
# nothing else default provided is lost, dropping only default-tls.
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls", "charset", "http2", "system-proxy"] }
tempfile = "3.23"
futures = "0.3"
futures-util = "0.3"
uuid = { version = "1.18", features = ["v4", "serde"] }
indexmap = { version = "2.7", features = ["serde"] }
tera = "1.20"
oxigraph = { version = "0.5.8", features = ["rdf-12"] }
toml = "1.1.0"
serde_yaml = "0.9"
hex = "0.4"
sha2 = "0.10"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
blake3 = "1.5"
hashbrown = "0.15"
smallvec = "1.13"
rustc-hash = "2.0"
itertools = "0.13"
bcinr = "26.4.22"
urlencoding = "2.1"
wasm4pm-compat = "26.6"
cargo-cicd = { git = "https://github.com/seanchatmangpt/cargo-cicd", branch = "main" }

rayon = "1.11"
regex = "1.12"
log = "0.4"
notify = "7.0"
testcontainers = "0.27"
testcontainers-modules = "0.15"
notify-debouncer-full = "0.4"
assert_cmd = "2.0"
predicates = "3.1"
rig-core = "0.15.1"

# Workspace-local crates (use workspace = true pattern in workspace members)
# NOTE: v26.5.29 unified release
# ggen-core (2026-07-16, ggen-core disconnect, T054-T058): removed. ggen-core
# is no longer a workspace member (see [workspace] exclude above) and no
# remaining workspace member has a real dependency edge on it -- every real
# consumer was ported or gated behind the `ggen-core-retired` feature (see
# cmds/mod.rs and crates/ggen-cli/Cargo.toml). crates/ggen-core/ itself is
# untouched on disk, per this project's fix-forward / non-deletion doctrine.
ggen-cli-lib = { path = "crates/ggen-cli", version = "26.7.2" }
ggen-graph = { path = "crates/ggen-graph", version = "26.7.2" }
# ggen-core replacement engine dependencies (specs/014-ggen-core-replacement,
# docs/jira/v26.7.16/10-ROOT-PACKAGE-TEST-MIGRATION.md, T051-T053): root
# package/tests/examples/benches re-point away from ggen_core:: onto these,
# file by file, as each file's specific symbols land a real port destination.
ggen-config = { path = "crates/ggen-config", version = "26.7.2" }
ggen-marketplace = { path = "crates/ggen-marketplace", version = "26.7.2" }
ggen-engine = { path = "crates/ggen-engine", version = "26.7.13" }

# Genesis kernel crates (pure Rust, IO-free — A = μ(O) foundation)
genesis-types = { path = "crates/genesis-types-v2", version = "26.7.2" }
genesis-core-v2 = { path = "crates/genesis-core-v2", version = "26.7.2" }


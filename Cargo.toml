# `cli-proof` deliberately dropped from this shared feature set (2026-07-16, discovered via
# `cargo publish --dry-run -p ggen`): the published chicago-tdd-tools 26.7.1 doesn't have that
# feature yet. Root package is the ONLY consumer of this shared `{ workspace = true }`
# definition (confirmed via grep) and has zero cli_proof/CliHarness usage in its own tests/ --
# every real cli-proof consumer (ggen-engine, ggen-cli, praxis-graphlaw) declares its own
# separate chicago-tdd-tools dependency directly, not through this shared entry. Keeping
# `cli-proof` here served no one and blocked `cargo publish --dry-run -p ggen` on a feature
# root never uses.
#
# 2026-07-17: switched from the published registry version to the vendored local copy at
# crates/chicago-tdd-tools (copied from /Users/sac/chicago-tdd-tools's library source only --
# not its tests/examples/benches/docs -- as part of removing every absolute machine-local
# Cargo path dependency from this workspace, PR #255). This crate is `publish = false`, so it
# never risks the real chicago-tdd-tools' crates.io identity. Once cli-proof is published
# upstream, this can point back at a plain `version = "..."` and the vendored copy can be
# dropped -- tracked in tasks.md.
chicago-tdd-tools = { path = "crates/chicago-tdd-tools", version = "26.7.1", features = ["testing-extras", "testcontainers"] }

name: Semantic Release (Conventional Commits → SemVer)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  # Required by the post-tag `gh workflow run release.yml` dispatch step:
  # the workflow_dispatch API needs actions:write even under the GITHUB_TOKEN
  # exception (commissioning finding, 2026-07-21: HTTP 403 without it).
  actions: write

# Release workflow commits a version bump and creates a tag/release; never
# cancel a run mid-publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # STAGE 1: Analyze Commits and Determine Version Bump
  # ============================================================================
  analyze-commits:
    name: Analyze Commits (Conventional Commits → SemVer)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.semver.outputs.version }}
      next-version: ${{ steps.semver.outputs.next_version }}
      release-type: ${{ steps.semver.outputs.release_type }}
      should-release: ${{ steps.semver.outputs.should_release }}
      changelog: ${{ steps.semver.outputs.changelog }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Get current version from Cargo.toml
        id: current-version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Analyze commits (Conventional Commits)
        id: semver
        run: |
          # Get all commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline)
          fi

          echo "=== Commits since last release ==="
          echo "$COMMITS"
          echo ""

          # Analyze commit types
          HAS_BREAKING=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ (feat|fix|refactor)(\(.+\))?!:" | wc -l)
          HAS_FEATURE=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ feat(\(.+\))?:" | wc -l)
          HAS_BUGFIX=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ fix(\(.+\))?:" | wc -l)

          # Determine release type
          if [ $HAS_BREAKING -gt 0 ]; then
            RELEASE_TYPE="major"
          elif [ $HAS_FEATURE -gt 0 ]; then
            RELEASE_TYPE="minor"
          elif [ $HAS_BUGFIX -gt 0 ]; then
            RELEASE_TYPE="patch"
          else
            RELEASE_TYPE="none"
          fi

          echo "Release type: $RELEASE_TYPE"
          echo "Breaking changes: $HAS_BREAKING"
          echo "Features: $HAS_FEATURE"
          echo "Bugfixes: $HAS_BUGFIX"

          # Calculate next version — CalVer ONLY: YY.M.patch (year.month.patch,
          # e.g. 26.7.21 = 2026, July, patch 21). THIS REPO DOES NOT USE SEMVER.
          # The previous SemVer arithmetic here minted impossible versions
          # (26.9.x through 26.15.0 — there is no month 15); fixed 2026-07-21.
          # RELEASE_TYPE still gates WHETHER a release happens (none = skip)
          # and drives the changelog; it never influences the version number.
          CURRENT_VERSION="${{ steps.current-version.outputs.version }}"
          YY=$(date -u +%y)
          M=$(date -u +%-m)
          if [ "$RELEASE_TYPE" = "none" ]; then
            NEXT_VERSION="$CURRENT_VERSION"
          elif [[ "$CURRENT_VERSION" =~ ^${YY}\.${M}\.([0-9]+)$ ]]; then
            # Same calendar month: increment patch.
            NEXT_VERSION="${YY}.${M}.$(( ${BASH_REMATCH[1]} + 1 ))"
          else
            # New month (or recovering from an unlawful non-CalVer version):
            # continue from the highest existing vYY.M.* tag, else patch 0.
            git fetch --tags --quiet origin || true
            MAX_PATCH=$(git tag -l "v${YY}.${M}.*" | sed "s/^v${YY}\.${M}\.//" | sort -n | tail -1)
            if [ -n "$MAX_PATCH" ]; then
              NEXT_VERSION="${YY}.${M}.$(( MAX_PATCH + 1 ))"
            else
              NEXT_VERSION="${YY}.${M}.0"
            fi
          fi
          # CalVer sanity gate: refuse to emit a version whose month is not 1-12.
          NM=$(echo "$NEXT_VERSION" | cut -d. -f2)
          if [ "$NM" -lt 1 ] || [ "$NM" -gt 12 ]; then
            echo "ANDON RED: computed non-CalVer version ${NEXT_VERSION} — refusing"
            exit 1
          fi

          # Generate changelog from commits
          CHANGELOG=$(cat << 'EOF'
          ## Changelog

          ### Breaking Changes
          EOF
          )

          if [ $HAS_BREAKING -gt 0 ]; then
            echo "$COMMITS" | grep -E "^[a-f0-9]+ (feat|fix|refactor)(\(.+\))?!:" | while read commit; do
              MSG=$(echo "$commit" | cut -d' ' -f2-)
              echo "- $MSG" >> changelog.tmp
            done
            CHANGELOG="$CHANGELOG
          $(cat changelog.tmp 2>/dev/null || echo "None")"
          fi

          CHANGELOG="$CHANGELOG

          ### Features
          "
          if [ $HAS_FEATURE -gt 0 ]; then
            echo "$COMMITS" | grep -E "^[a-f0-9]+ feat(\(.+\))?:" | while read commit; do
              MSG=$(echo "$commit" | cut -d' ' -f2-)
              echo "- $MSG" >> changelog-feat.tmp
            done
            CHANGELOG="$CHANGELOG
          $(cat changelog-feat.tmp 2>/dev/null || echo "None")"
          fi

          CHANGELOG="$CHANGELOG

          ### Bugfixes
          "
          if [ $HAS_BUGFIX -gt 0 ]; then
            echo "$COMMITS" | grep -E "^[a-f0-9]+ fix(\(.+\))?:" | while read commit; do
              MSG=$(echo "$commit" | cut -d' ' -f2-)
              echo "- $MSG" >> changelog-fix.tmp
            done
            CHANGELOG="$CHANGELOG
          $(cat changelog-fix.tmp 2>/dev/null || echo "None")"
          fi

          # Output results
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "should_release=$([[ $RELEASE_TYPE != 'none' ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Cleanup
          rm -f changelog*.tmp

      - name: Output semver analysis
        run: |
          echo "## Semantic Version Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Current Version | ${{ steps.current-version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Next Version | ${{ steps.semver.outputs.next_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Type | ${{ steps.semver.outputs.release_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Should Release | ${{ steps.semver.outputs.should_release }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # STAGE 2: Create Release & Update Versions
  # ============================================================================
  create-release:
    name: Create GitHub Release & Tag
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: analyze-commits
    if: needs.analyze-commits.outputs.should-release == 'true'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Update version in Cargo.toml
        run: |
          NEW_VERSION="${{ needs.analyze-commits.outputs.next-version }}"
          sed -i "0,/^version = \".*\"/s//version = \"$NEW_VERSION\"/" Cargo.toml
          cat Cargo.toml | head -5

      # This workspace also carries the version in three other places, guarded
      # by crates/ggen-engine/tests/version_consistency_e2e.rs. Before this step
      # existed, three consecutive auto-bumps (#280, #282, #284) drifted these
      # out of sync with Cargo.toml, requiring a manual fix-forward PR each time
      # (#281/#283/#285). Keep them in lockstep here instead of relying on a
      # human to notice the gate failure after the fact.
      - name: Update version-law files (repo-facts.ttl, ggen.toml, ggen-engine pin)
        run: |
          NEW_VERSION="${{ needs.analyze-commits.outputs.next-version }}"
          sed -i "s/rf:workspaceVersion \"[^\"]*\"/rf:workspaceVersion \"$NEW_VERSION\"/" .specify/repo-facts.ttl
          sed -i "0,/^version = \".*\"/s//version = \"$NEW_VERSION\"/" ggen.toml
          sed -i "0,/^version = \".*\"/s//version = \"$NEW_VERSION\"/" crates/ggen-engine/Cargo.toml
          grep -n "$NEW_VERSION" .specify/repo-facts.ttl ggen.toml crates/ggen-engine/Cargo.toml

      - name: Update Helm chart version
        run: |
          NEW_VERSION="${{ needs.analyze-commits.outputs.next-version }}"
          if [ -f helm/tai-chart/Chart.yaml ]; then
            sed -i "s/^version: .*/version: $NEW_VERSION/" helm/tai-chart/Chart.yaml
            sed -i "s/^appVersion: .*/appVersion: $NEW_VERSION/" helm/tai-chart/Chart.yaml
          fi

      # Bumping the version-law source files above doesn't by itself propagate
      # the new version into generated docs (README.md's merge region,
      # generated_commands.rs, Cargo.lock's workspace-member versions, ...).
      # Discovered live: the Publish Candidate workflow's docs-sync drift gate
      # correctly refused a real bump (#290's 26.9.4) because README.md still
      # said 26.9.3 -- this step closes that gap the way the version law
      # itself defines it: edit the source fields, then run `ggen sync run` to
      # propagate, in the SAME commit.
      - name: Setup ggen build
        uses: ./.github/actions/setup-ggen-build

      - name: Build ggen CLI
        run: cargo build -p ggen-cli-lib --bin ggen

      - name: Propagate version into generated docs (ggen sync run)
        run: ./target/debug/ggen sync run

      - name: Commit version bump via PR
        # main has a repository ruleset ("Changes must be made through a pull
        # request") — a direct `git push` here is rejected with GH013
        # regardless of token permissions. required_approving_review_count is
        # 0, so open+merge-immediately satisfies the rule without needing a
        # human reviewer or an admin bypass.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW_VERSION="${{ needs.analyze-commits.outputs.next-version }}"
          BRANCH="release/bump-$NEW_VERSION"
          git checkout -b "$BRANCH"
          # Cargo.toml is always present and must stage cleanly. Helm charts are
          # optional (this repo currently has none) — an unmatched glob for them
          # must not abort the whole `git add` before Cargo.toml is even staged
          # (that's exactly what `git add Cargo.toml helm/*/Chart.yaml || true`
          # did: the pathspec error made git add fail atomically for BOTH
          # arguments, and `|| true` silently swallowed it).
          git add Cargo.toml .specify/repo-facts.ttl ggen.toml crates/ggen-engine/Cargo.toml
          # This job runs from a fresh checkout every time (fetch-depth: 0,
          # nothing else touches the tree beforehand), so the only diffs
          # present at this point are exactly what the version-law sed edits
          # and `ggen sync run` above produced -- `git add -A` is safe here
          # (not a general-purpose "stage everything", which would be unsafe
          # in a normal dev checkout with unrelated local changes).
          git add -A
          shopt -s nullglob
          helm_charts=(helm/*/Chart.yaml)
          if [ ${#helm_charts[@]} -gt 0 ]; then
            git add "${helm_charts[@]}"
          fi
          git commit -m "chore(release): bump version to $NEW_VERSION" \
            -m "This commit was automatically generated by the semantic release workflow."
          # The bump branch is bot-owned and ephemeral, regenerated from a
          # fresh checkout of main on every run. A previous run can leave a
          # stale remote branch behind (observed live 2026-07-20: run
          # 29781748212 pushed release/bump-26.15.0 + opened PR #319, then
          # `gh pr merge --squash` failed because main advanced during the
          # run — "the merge commit cannot be cleanly created" — and every
          # later run then died at this push with non-fast-forward, wedging
          # the release chain permanently). Force-push is correct here: it
          # replaces the stale, conflicting bump commit with one built on
          # the CURRENT main, which is exactly the state that can merge.
          git push -u --force origin "$BRANCH"
          # A stale run may also have left the PR open (PR #319 above).
          # Reuse it instead of failing on duplicate creation.
          EXISTING_PR="$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          if [ -z "$EXISTING_PR" ]; then
            gh pr create --title "chore(release): bump version to $NEW_VERSION" \
              --body "Automated version bump for the v$NEW_VERSION release." \
              --base main --head "$BRANCH"
          fi
          # If main advanced during this run the squash merge can still
          # conflict — that failure stays loud (no || true), but it is now
          # transient: the next run force-pushes a fresh bump and retries.
          gh pr merge "$BRANCH" --squash --delete-branch
          git checkout main
          git pull origin main

      # actions/create-release is ARCHIVED/unmaintained; replaced with the
      # maintained softprops/action-gh-release (creates the tag + release).
      - name: Create GitHub release
        uses: softprops/action-gh-release@62c96d0c4e8a889135c1f3a25910db8dbe0e85f7 # v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.analyze-commits.outputs.next-version }}
          name: v${{ needs.analyze-commits.outputs.next-version }}
          body: ${{ needs.analyze-commits.outputs.changelog }}
          draft: false
          prerelease: false

      # The tag created above is pushed with the default GITHUB_TOKEN, and
      # GitHub suppresses `on: push` workflow runs for events created with
      # GITHUB_TOKEN — so release.yml's tag trigger NEVER fires from this
      # workflow (verified: zero release assets exist at any tag).
      # workflow_dispatch triggered via the API is the documented exception:
      # it DOES run even when invoked with GITHUB_TOKEN. Dispatch release.yml
      # explicitly for the tag we just created. This step only executes when a
      # release/tag was actually created (job-level should-release gate plus
      # default success() on the tag-creation step above).
      - name: Trigger release.yml for the new tag (workflow_dispatch exception)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.analyze-commits.outputs.next-version }}"
          # Fail loudly if the tag does not actually exist on the remote —
          # dispatching release.yml for a nonexistent tag would fail at checkout.
          if ! gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "ANDON: tag ${TAG} not found on remote — refusing to dispatch release.yml"
            exit 1
          fi
          gh workflow run release.yml -f tag="${TAG}"
          echo "Dispatched release.yml for ${TAG}"

      - name: Update release notes
        run: |
          echo "## Release v${{ needs.analyze-commits.outputs.next-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Type**: ${{ needs.analyze-commits.outputs.release-type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.analyze-commits.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY

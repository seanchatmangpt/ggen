name: TCPS Generated Validation

on:
  pull_request:
    paths:
      - "examples/tcps-generated/**"
      - "crates/chicago-tdd-tools/**"
      - ".github/workflows/tcps-generated-validation.yml"
  push:
    branches: [main]
    paths:
      - "examples/tcps-generated/**"
      - "crates/chicago-tdd-tools/**"
      - ".github/workflows/tcps-generated-validation.yml"
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: product evidence + Auto Select 8^4
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/tcps-generated-validation
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Provision pinned Rust and cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: tcps-generated-validation

      - name: Run product-evidence and 8^4 behavioral suites
        shell: bash
        run: |
          set +e
          cargo test \
            --manifest-path examples/tcps-generated/Cargo.toml \
            --test tcps_chicago_tdd_1000x \
            --test tcps_chicago_tdd_8pow4 \
            -- --nocapture > tcps-generated-validation.log 2>&1
          status=$?
          cat tcps-generated-validation.log
          exit "$status"

      - name: Preserve validation log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tcps-generated-validation-log
          path: tcps-generated-validation.log
          if-no-files-found: error
          retention-days: 7

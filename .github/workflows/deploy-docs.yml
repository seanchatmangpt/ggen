name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "crates/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# Least privilege: peaceiris/actions-gh-pages pushes to the gh-pages branch,
# which requires write access to repository contents.
permissions:
  contents: write

# Deploy job: do not cancel an in-progress publish mid-write.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # NOTE: actions-rs/toolchain is UNMAINTAINED (archived since 2023).
      # Recommend migrating to dtolnay/rust-toolchain. Pinned to v1 ref SHA for now.
      - name: Setup Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7 (UNMAINTAINED)
        with:
          toolchain: stable
          components: rust-docs

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: "0.4.40"

      - name: Build API documentation
        run: |
          set -euo pipefail
          cargo doc --no-deps
          echo "✅ API documentation built successfully"

      - name: Build mdBook
        run: |
          set -euo pipefail
          cd docs
          mdbook build
          echo "✅ mdBook built successfully"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: |
            target/doc
            docs/book
          publish_branch: gh-pages
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy documentation to GitHub Pages"

      - name: Deployment Summary
        run: |
          set -euo pipefail
          echo "📚 Documentation deployed successfully!"
          echo ""
          echo "📍 API Docs: https://seanchatmangpt.github.io/ggen/target/doc/"
          echo "📍 Guides: https://seanchatmangpt.github.io/ggen/docs/book/"
          echo ""
          echo "✅ Deployment complete!"

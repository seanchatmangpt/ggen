name: MFW Crown Independent Lean

on:
  push:
    branches:
      - agent/mfw-crown-independent-verifier
    paths:
      - "examples/mfw-crown-independent-verify/**"
      - ".github/workflows/mfw-crown-independent-lean.yml"

concurrency:
  group: mfw-crown-independent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Mark verifier pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context=mfw-crown-independent-lean \
            -f description='Lean kernel verification is running'
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: examples/mfw-crown-independent-verify
          build-args: "--wfail"
          nanoda: true
          nanoda-allow-sorry: false
          use-mathlib-cache: true
      - name: Execute theorem inventory
        working-directory: examples/mfw-crown-independent-verify
        run: lake exe crown_verify_check
      - name: Mark verifier success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context=mfw-crown-independent-lean \
            -f description='Lean build, theorem inventory, and nanoda passed'
      - name: Mark verifier failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context=mfw-crown-independent-lean \
            -f description='Lean verification failed'

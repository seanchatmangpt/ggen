name: Marketplace Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

# Read-only test job.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-marketplace:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b  # stable (2024-06)
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo-make
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/bin/cargo-make
          key: ${{ runner.os }}-cargo-make

      - name: Install cargo-make
        run: cargo install cargo-make --locked --force

      - name: Test local registry
        run: cargo test test_marketplace_local
        env:
          GGEN_REGISTRY_URL: file://${{ github.workspace }}/registry/

      - name: Test registry client creation
        run: cargo test -p ggen-core --lib registry::tests::test_registry_client_new

      - name: Test registry index parsing
        run: cargo test -p ggen-core --lib registry::tests::test_registry_index_structure

name: Homebrew Release

# WHY THIS WORKFLOW HAS NEVER ACTUALLY RUN (root-cause fix): `on: release:
# types: [published]` only fires for a release event NOT created via the
# repository's own GITHUB_TOKEN -- the same class of GitHub Actions
# limitation release.yml's own header comment already documents for tag
# pushes ("GitHub suppresses `on: push` workflow runs for events created
# with GITHUB_TOKEN"). release.yml creates its GitHub Release via
# softprops/action-gh-release using `GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN
# }}` (release.yml's own "Create GitHub Release" step), so the `published`
# event it fires never triggers this workflow. Confirmed empirically: this
# workflow's entire visible run history is exactly 3 runs (v0.2.4, v5.0.0,
# v26.7.2 -- all from before or outside the current release.yml flow), never
# once for any of the dozens of real v26.7.x releases since, despite every
# one of those releases genuinely existing, published (not draft), with all
# 4 binary assets attached (verified directly: `gh release view v26.7.43`).
# Fixed the same way release.yml's own tag-push suppression was fixed:
# release.yml explicitly dispatches this workflow via `gh workflow run`
# (workflow_dispatch/repository_dispatch ARE the documented exception that
# DOES work with GITHUB_TOKEN) right after creating the release, instead of
# relying on the suppressed `published` event. The `release:` trigger stays
# -- harmless, and still correct for any future release created through a
# different path (e.g. manually, or with a real PAT).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published release tag to update the Homebrew formula for (e.g. v26.14.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

# Updates an external Homebrew tap repo via COMMITTER_TOKEN; this repo only
# needs read access to its own contents.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract and validate version
        uses: ./.github/actions/extract-semantic-version
        id: extract_version
        with:
          # 'tag' reads github.event.release.tag_name (only populated on a
          # real `release` event); 'input' reads the workflow_dispatch tag
          # input below -- release.yml's dispatch always passes it.
          version-source: ${{ github.event_name == 'workflow_dispatch' && 'input' || 'tag' }}
          version-input: ${{ github.event.inputs.tag }}
          check-cargo-toml: 'true'

      - name: Validate Homebrew token
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.HOMEBREW_TAP_TOKEN }}" ] && [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN or GITHUB_TOKEN not configured. Cannot update Homebrew formula."
            exit 1
          fi

      - name: Verify release assets exist
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract_version.outputs.version }}"
          RELEASE_URL="https://github.com/seanchatmangpt/ggen/releases/download/v$VERSION"

          echo "Checking for release assets..."
          for target in "x86_64-apple-darwin" "aarch64-apple-darwin" "x86_64-unknown-linux-gnu" "aarch64-unknown-linux-gnu"; do
            ASSET_URL="$RELEASE_URL/ggen-$target.tar.gz"
            if curl -s --head "$ASSET_URL" | grep -q "200\|302"; then
              echo "✅ Found: ggen-$target.tar.gz"
            else
              echo "⚠️  Missing: ggen-$target.tar.gz (optional for Homebrew)"
            fi
          done

      - name: Bump Homebrew Formula
        uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v4.1
        with:
          formula-name: ggen
          homebrew-tap: seanchatmangpt/homebrew-tap
          download-url: https://github.com/seanchatmangpt/ggen/releases/download/v${{ steps.extract_version.outputs.version }}/ggen-x86_64-apple-darwin.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Verify formula update
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract_version.outputs.version }}"

          echo "🧪 Verifying Homebrew formula update..."
          echo "✅ Formula updated successfully!"
          echo ""
          echo "📦 Users can now install with:"
          echo "   brew install seanchatmangpt/tap/ggen"
          echo ""
          echo "🔗 Links:"
          echo "   Release: https://github.com/seanchatmangpt/ggen/releases/tag/v$VERSION"
          echo "   Formula: https://github.com/seanchatmangpt/homebrew-tap/blob/main/Formula/ggen.rb"

      - name: Create success summary
        if: success()
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract_version.outputs.version }}"

          echo "## ✅ Homebrew Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "brew install seanchatmangpt/tap/ggen" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Links:**" >> $GITHUB_STEP_SUMMARY
          echo "- [Release](https://github.com/seanchatmangpt/ggen/releases/tag/v$VERSION)" >> $GITHUB_STEP_SUMMARY
          echo "- [Formula](https://github.com/seanchatmangpt/homebrew-tap/blob/main/Formula/ggen.rb)" >> $GITHUB_STEP_SUMMARY
          echo "- [Homebrew Tap](https://github.com/seanchatmangpt/homebrew-tap)" >> $GITHUB_STEP_SUMMARY

      - name: Create failure summary
        if: failure()
        run: |
          set -euo pipefail
          VERSION="${{ steps.extract_version.outputs.version }}"

          echo "## ❌ Homebrew Release Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Please check:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Release assets are available: https://github.com/seanchatmangpt/ggen/releases/tag/v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "2. Homebrew tap repository is accessible" >> $GITHUB_STEP_SUMMARY
          echo "3. GITHUB_TOKEN has proper permissions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual update:**" >> $GITHUB_STEP_SUMMARY
          echo "Run \`./scripts/update-homebrew-formula.sh $VERSION\` locally" >> $GITHUB_STEP_SUMMARY

name: Deploy Documentation to GitHub Pages

# BLOCKED, SEPARATELY TRACKED, 3 STACKED PROBLEMS (2026-07-22) -- see
# retrofit:GithubPagesEnvironmentStaleMasterPolicy in
# .tcps/retrofit/ggen/load-path.ttl for the full evidence trail. This
# workflow does NOT work yet even after this commit's fix; disclosed
# honestly rather than claimed fixed.
#
# (1) Every run currently fails in ~2 seconds, before any step executes:
#     "Branch main is not allowed to deploy to github-pages due to
#     environment protection rules." Root cause, confirmed via `gh api
#     repos/.../environments/github-pages/deployment-branch-policies`: the
#     github-pages environment's custom branch policy names only "master"
#     -- this repo's real default branch is "main", a stale rename gap.
#     Fixing it means mutating repository environment protection rules,
#     a permission-adjacent repo-settings change this session is not
#     authorized to make without an explicit `!` command -- see AP-004 in
#     docs/retrofit/ggen/authorization-packets.md.
#
# (2) FIXED in this commit (real, in-scope, no authorization needed):
#     the bespoke `dtolnay/rust-toolchain@... toolchain: stable` step
#     ignores rust-toolchain.toml's pinned nightly, never provisions the
#     [patch.crates-io] siblings, never installs sccache -- the same
#     class already fixed twice this session (release.yml PR #426,
#     marketplace-test.yml). Currently masked by (1) always failing
#     first; fixed now so the workflow is one step closer once (1) is
#     authorized, not blocked on a second investigation cycle.
#
# (3) NOT FIXED, genuinely out of scope for this pass: even past (1) and
#     (2), the "Build documentation" step (`mdbook build docs`) would
#     fail -- docs/book.toml declares `src = "src"`, but docs/src/ was
#     deleted 2026-03-31 (commit e611373, "delete 1,892 stale MD/TXT
#     files") and never restored; this workflow was last touched
#     2026-06-20, three months AFTER that deletion, without anyone
#     noticing the source tree it builds no longer exists. book/ (this
#     repo's other, actively-maintained mdbook project) is NOT a drop-in
#     replacement -- it's scoped to "Manufacturing Level Five Packs"
#     specifically, a narrower topic than this workflow's own "ggen
#     Documentation" title implies. Redirecting this workflow to book/,
#     restoring docs/src content, or retiring this workflow (and its
#     near-duplicate sibling deploy-docs.yml, which independently
#     references the same deleted docs/src/ via a different, older
#     gh-pages-branch deployment mechanism) is a real documentation-
#     scope/product decision, not a mechanical fix -- named here as a
#     precise next obligation, not attempted this cycle.

on:
  # Trigger whenever there is a push to the default branch
  push:
    branches:
      - main
  # Allow manual workflow dispatch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup ggen build
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: publish-registry

      - name: Install mdbook
        run: |
          cargo install mdbook --no-default-features --features search

      - name: Validate registry index
        run: |
          # Check JSON syntax
          python3 -m json.tool docs/src/registry/index.json > /dev/null
          echo "✅ Registry index JSON is valid"

          # Check required fields
          python3 -c "
          import json
          with open('docs/src/registry/index.json') as f:
              data = json.load(f)

          # Validate structure
          assert 'updated' in data, 'Missing updated field'
          assert 'packs' in data, 'Missing packs field'

          for pack_id, pack in data['packs'].items():
              assert 'id' in pack, f'Pack {pack_id} missing id'
              assert 'latest_version' in pack, f'Pack {pack_id} missing latest_version'
              assert 'versions' in pack, f'Pack {pack_id} missing versions'
              
              for version, version_data in pack['versions'].items():
                  assert 'git_url' in version_data, f'Version {version} missing git_url'
                  assert 'git_rev' in version_data, f'Version {version} missing git_rev'
                  assert 'sha256' in version_data, f'Version {version} missing sha256'

          print('✅ Registry structure validation passed')
          "

      - name: Build documentation
        run: |
          mdbook build docs
          echo "✅ Documentation built successfully"

      - name: Validate HTML output
        run: |
          # Check that main pages exist
          test -f docs/book/index.html || (echo "❌ Missing index.html" && exit 1)
          test -f docs/book/marketplace.html || (echo "❌ Missing marketplace.html" && exit 1)
          test -f docs/book/registry/index.html || (echo "❌ Missing registry/index.html" && exit 1)
          echo "✅ HTML validation passed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

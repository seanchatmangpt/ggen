name: Part Passport Format Once

on:
  push:
    branches: [agent/ggen-part-passport]
    paths:
      - ".github/workflows/part-passport-format-once.yml"
      - "crates/ggen-marketplace/src/marketplace/part_passport.rs"
      - "crates/ggen-marketplace/src/marketplace/mod.rs"
      - "crates/ggen-marketplace/src/lib.rs"
      - "crates/ggen-marketplace/tests/part_passport_fixture.rs"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: agent/ggen-part-passport
          fetch-depth: 0

      - uses: ./.github/actions/setup-ggen-build
        with:
          components: rustfmt
          cache-key-suffix: part-passport-format-once

      - name: Apply pinned rustfmt
        run: cargo fmt --all

      - name: Commit mechanical formatter delta
        run: |
          if git diff --quiet; then
            echo "No formatter delta."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            crates/ggen-marketplace/src/marketplace/part_passport.rs \
            crates/ggen-marketplace/src/marketplace/mod.rs \
            crates/ggen-marketplace/src/lib.rs \
            crates/ggen-marketplace/tests/part_passport_fixture.rs
          git commit -m "style(passport): apply pinned rustfmt"
          git push origin HEAD:agent/ggen-part-passport

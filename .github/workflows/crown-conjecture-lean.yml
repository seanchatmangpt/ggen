name: Crown Conjecture Lean

on:
  pull_request:
    paths:
      - "examples/crown-conjecture-verify/formal/**"
      - ".github/workflows/crown-conjecture-lean.yml"
  push:
    branches: [main]
    paths:
      - "examples/crown-conjecture-verify/formal/**"
      - ".github/workflows/crown-conjecture-lean.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refuse incomplete or trust-expanding source
        working-directory: examples/crown-conjecture-verify/formal
        run: python3 scripts/audit.py
      - name: Install pinned Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: examples/crown-conjecture-verify/formal
          auto-config: false
          build: false
          test: false
          lint: false
          nanoda: false
      - name: Build formalization
        id: crown-build
        working-directory: examples/crown-conjecture-verify/formal
        shell: bash
        run: |
          set -o pipefail
          {
            lake update
            lake exe cache get
            lake build
          } 2>&1 | tee crown-build.log
      - name: Upload build receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crown-build-receipt
          path: examples/crown-conjecture-verify/formal/crown-build.log
          if-no-files-found: error
      - name: Independent checker
        if: steps.crown-build.outcome == 'success'
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: examples/crown-conjecture-verify/formal
          auto-config: false
          build: false
          test: false
          lint: false
          nanoda: true
          nanoda-allow-sorry: false

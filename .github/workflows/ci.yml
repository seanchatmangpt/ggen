# Core PR-gating CI — minimal, honest, fast.
#
# This file replaces the previous ci.yml, whose design was root-cause broken
# (see .github/CI_REFACTOR_CONTRACT.md §0):
#   - INVERTED MATRIX: it ran a [stable, beta, nightly] toolchain matrix, but
#     rust-toolchain.toml pins `nightly-2026-04-15`, which overrides every matrix
#     entry. Stable/beta could never compile this workspace; the matrix was a lie.
#   - continue-on-error MASKING: `continue-on-error: ${{ matrix.rust == 'nightly' }}`
#     hid the ONLY toolchain that can actually build, so genuine failures went green.
#   - NO SIBLINGS: the root Cargo.toml `[patch.crates-io]` points lsp-max /
#     lsp-types-max / wasm4pm / wasm4pm-compat at `../<repo>`. CI only checked out
#     `ggen`, so every cargo invocation died at workspace load
#     (`failed to read /home/runner/work/ggen/lsp-max/Cargo.toml`).
#
# Fix: build ONLY on the pinned nightly (nightly-2026-04-15), provision the four
# sibling repos via the DRY composite action `./.github/actions/setup-ggen-build`,
# and drive every job through the real `just` recipes (the project entry point).
# No matrix, no continue-on-error. One required aggregate check: `ci-status`.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: check
      # CI calls cargo directly rather than the `just` recipes: those wrap
      # commands in short timeouts tuned for the LOCAL warm-cache dev loop
      # (e.g. `test-lib` = `timeout 30s`, `lint` = `timeout 90s`), which fire
      # mid-compile during a CI COLD build (observed: exit 124). The job-level
      # `timeout-minutes` is the correct CI guardrail. Commands mirror the recipes.
      - name: cargo check
        run: cargo check --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: build
      - name: cargo build
        run: cargo build --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: test
      - name: cargo test (lib)
        run: cargo test --workspace --lib

  doctest:
    name: Doctest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: doctest
      - name: cargo test (doc)
        run: cargo test --doc --workspace --exclude ggen-core

  # Single required aggregate check. Fails if ANY gating job did not succeed,
  # including skipped/cancelled (no honest job can be 'skipped' here).
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check, build, test, doctest]
    if: always()
    steps:
      - name: Assert all gating jobs succeeded
        run: |
          set -euo pipefail
          echo "check=${{ needs.check.result }}"
          echo "build=${{ needs.build.result }}"
          echo "test=${{ needs.test.result }}"
          echo "doctest=${{ needs.doctest.result }}"
          if [ "${{ needs.check.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.doctest.result }}" != "success" ]; then
            echo "::error::One or more CI gating jobs failed."
            exit 1
          fi
          echo "All CI gating jobs succeeded."

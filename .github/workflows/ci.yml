# Core PR-gating CI — minimal, honest, fast.
#
# This file replaces the previous ci.yml, whose design was root-cause broken
# (see .github/CI_ARCHITECTURE.md):
#   - INVERTED MATRIX: it ran a [stable, beta, nightly] toolchain matrix, but
#     rust-toolchain.toml pins `nightly-2026-04-15`, which overrides every matrix
#     entry. Stable/beta could never compile this workspace; the matrix was a lie.
#   - continue-on-error MASKING: `continue-on-error: ${{ matrix.rust == 'nightly' }}`
#     hid the ONLY toolchain that can actually build, so genuine failures went green.
#   - NO SIBLINGS: the root Cargo.toml `[patch.crates-io]` points lsp-max /
#     lsp-types-max / wasm4pm / wasm4pm-compat at `../<repo>`. CI only checked out
#     `ggen`, so every cargo invocation died at workspace load
#     (`failed to read /home/runner/work/ggen/lsp-max/Cargo.toml`).
#
# Fix: build ONLY on the pinned nightly (nightly-2026-04-15), provision the four
# sibling repos via the DRY composite action `./.github/actions/setup-ggen-build`,
# and drive every job through the real `just` recipes (the project entry point).
# No matrix, no continue-on-error. One required aggregate check: `ci-status`.
#
# SCOPING DECISION (2026-06-20, crate names updated 2026-07-02 after the LSP
# consolidation pass folded ggen-lsp-mcp/ggen-a2a-mcp/ggen-lsp-a2a into
# ggen-lsp's `mcp`/`a2a` features — see CRATE_CONSOLIDATION_ANALYSIS_2026-07-01.md):
# the required gate builds the SHIPPABLE DELIVERABLE = the workspace EXCLUDING
# ggen-lsp. Rationale:
#   - ggen-lsp is a LEAF crate: nothing in the workspace depends on it by
#     default. `ggen-cli` pulls it in ONLY behind the optional `lsp`/`experimental`
#     features (crates/ggen-cli/Cargo.toml), which are OFF by default. The
#     default shippable product never touches it.
#   - It has a history of falling out of sync with the EXTERNAL sibling
#     `lsp-max` (an untagged WIP repo cloned at floating HEAD). Gating the
#     ENTIRE product on a floating external target is the anti-pattern: it
#     makes the required PR gate hostage to a moving upstream nobody controls.
#   - Therefore ggen-lsp is surfaced HONESTLY in a separate, NON-REQUIRED
#     advisory job (`lsp-crates`) that shows its TRUE status. It is NEVER
#     masked with continue-on-error, and it is NOT in any required `needs:` path.
#     Promote it to a required `needs:` of `ci-status` once ggen-lsp reliably
#     tracks a pinned lsp-max.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cargo-cicd:
    name: cargo-cicd workspace health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: cicd

      - name: Install cargo-cicd, affi, and wpm
        id: install-tools
        uses: ./.github/actions/install-cargo-tools
        with:
          tools: cicd,affi,wpm
          cache-tools: 'true'

      - name: Pre-flight — verify affi on PATH (ANDON if missing); wpm is best-effort
        run: |
          set -euo pipefail
          if ! command -v affi >/dev/null 2>&1; then
            echo "ANDON: affi not found after install step — pull the cord"
            exit 1
          fi
          echo "affi: $(affi --version 2>/dev/null || which affi)"

          if [ "${{ steps.install-tools.outputs.wpm-available }}" = "false" ]; then
            echo "::warning::ANDON-SKIP: wpm unavailable — upstream github.com/seanchatmangpt/wasm4pm@main does not compile (out of scope for this repo). The wpm-oracle process-conformance gate will be skipped below; this is loudly logged, not silent."
          elif ! command -v wpm >/dev/null 2>&1; then
            echo "ANDON: install-tools reported wpm-available=true but wpm not found on PATH — pull the cord"
            exit 1
          else
            echo "wpm:  $(wpm --version 2>/dev/null || which wpm)"
          fi

      - name: Validate pipeline preconditions
        run: cargo cicd pipeline validate

      - name: Run full manufacturing pipeline
        run: cargo cicd pipeline run

      - name: Seal evidence receipt (BLAKE3 provenance chain)
        run: cargo cicd affidavit seal

      - name: Verify sealed receipt
        run: cargo cicd affidavit verify

      - name: Process conformance gate (wpm oracle)
        if: steps.install-tools.outputs.wpm-available != 'false'
        run: cargo cicd status audit

      - name: Process conformance gate SKIPPED (wpm oracle unavailable)
        if: steps.install-tools.outputs.wpm-available == 'false'
        run: |
          echo "::warning::SKIPPED cargo cicd status audit — wpm (github.com/seanchatmangpt/wasm4pm) failed to install because its main branch does not currently compile upstream. This gate is skipped, not passed; fix is tracked against the external wasm4pm repo, not ggen."
          exit 0

      - name: Show evidence summary
        if: always()
        run: cargo cicd evidence show

  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: check
      # CI calls cargo directly rather than the `just` recipes: those wrap
      # commands in short timeouts tuned for the LOCAL warm-cache dev loop
      # (e.g. `test-lib` = `timeout 30s`, `lint` = `timeout 90s`), which fire
      # mid-compile during a CI COLD build (observed: exit 124). The job-level
      # `timeout-minutes` is the correct CI guardrail. Commands mirror the recipes.
      # Scoped to the shippable deliverable: the lsp trio is excluded (leaf crates,
      # optional in cli, failing against floating-HEAD lsp-max WIP — see top comment).
      - name: cargo check
        run: cargo check --workspace --exclude ggen-lsp

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: build
      - name: cargo build
        run: cargo build --workspace --exclude ggen-lsp

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: test
      - name: cargo test (lib)
        run: cargo test --workspace --lib --exclude ggen-lsp

  doctest:
    name: Doctest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: doctest
      - name: cargo test (doc)
        run: cargo test --doc --workspace --exclude ggen-core --exclude ggen-lsp

  # Phase 2: Inverse sync + coherence gate validation
  phase2:
    name: Phase 2 (Inverse Sync + Coherence)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: phase2
      - name: Build ggen binary
        run: cargo build --bin ggen
      - name: Coherence validation
        run: |
          set -euo pipefail
          ontology=".specify/specs/post-chatman/post_chatman.ttl"
          shapes=".specify/specs/post-chatman/post_chatman_shapes.ttl"
          echo "Validating ontology: $ontology"
          ./target/debug/ggen validate "$ontology"
          echo "Validating shapes: $shapes"
          ./target/debug/ggen validate "$shapes"
          echo "✅ Coherence check passed"
      - name: Phase 2 test suite
        run: |
          set -euo pipefail
          echo "Running Phase 2 test suite..."
          cargo test -p ggen-core --test ast_extractor_70pct_test || exit 1
          cargo test -p ggen-core --test inverse_receipt_chain_test || exit 1
          cargo test -p ggen-core --test provenance_envelope_test || exit 1
          cargo test -p ggen-graph --test coherence_hash_expectations_test || exit 1
          cargo test -p ggen-graph --test post_chatman_coherence_integration || exit 1
          echo "✅ Phase 2 test suite complete"
      - name: OTEL validation (coherence spans)
        run: |
          set -euo pipefail
          echo "Verifying OTEL spans for coherence checking..."
          RUST_LOG=trace,ggen_core=trace cargo test -p ggen-core --test provenance_envelope_test -- --nocapture 2>&1 | tee /tmp/otel_output.txt
          echo "Checking for required spans..."
          if grep -q "coherence" /tmp/otel_output.txt || grep -q "envelope" /tmp/otel_output.txt || grep -q "receipt" /tmp/otel_output.txt; then
            echo "✅ OTEL spans verified"
          else
            echo "⚠️  No OTEL spans found (check may be optional for this phase)"
          fi

  # ADVISORY, NON-BLOCKING. ggen-lsp (which since the 2026-07 consolidation pass
  # also carries the absorbed mcp/a2a modules behind features — see
  # CRATE_CONSOLIDATION_ANALYSIS_2026-07-01.md) is a LEAF crate that nothing
  # depends on by default — ggen-cli reaches it only behind the optional
  # `lsp`/`experimental` features (OFF by default). It has a history of API
  # drift against the EXTERNAL sibling `lsp-max`, an untagged WIP repo cloned at
  # floating HEAD (no compiling commit to pin). Gating the whole product on a
  # moving external target is the anti-pattern, so this job is advisory: it runs to
  # surface the TRUE status WITHOUT continue-on-error masking, and it is
  # deliberately ABSENT from `ci-status.needs`, so its failure cannot block a
  # PR or the merge queue. Promote it to a required `needs:` of `ci-status` once
  # ggen-lsp reliably tracks a pinned lsp-max.
  lsp-crates:
    name: lsp crates (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Provision siblings + pinned nightly + cache
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: lsp
      - name: cargo check (ggen-lsp, all features)
        run: cargo check -p ggen-lsp --all-features

  # Single required aggregate check. Fails if ANY gating job did not succeed,
  # including skipped/cancelled (no honest job can be 'skipped' here).
  # NOTE: `lsp-crates` is intentionally NOT a dependency here — it is advisory.
  # Phase 2 is now a required dependency (inverse-sync + coherence gate validation).
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check, build, test, doctest, phase2, cargo-cicd]
    if: always()
    steps:
      - name: Assert all gating jobs succeeded
        run: |
          set -euo pipefail
          echo "check=${{ needs.check.result }}"
          echo "build=${{ needs.build.result }}"
          echo "test=${{ needs.test.result }}"
          echo "doctest=${{ needs.doctest.result }}"
          echo "phase2=${{ needs.phase2.result }}"
          echo "cargo-cicd=${{ needs.cargo-cicd.result }}"
          if [ "${{ needs.check.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.doctest.result }}" != "success" ] || \
             [ "${{ needs.phase2.result }}" != "success" ] || \
             [ "${{ needs.cargo-cicd.result }}" != "success" ]; then
            echo "::error::One or more CI gating jobs failed."
            exit 1
          fi
          echo "All CI gating jobs succeeded (including Phase 2: Inverse Sync + Coherence)."

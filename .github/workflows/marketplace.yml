name: Deploy Marketplace to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "marketplace/**"
      - ".github/workflows/marketplace.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "marketplace-pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-cached

      - name: Build ggen
        run: |
          cargo build --release --bin ggen

      - name: Validate marketplace
        run: |
          set -euo pipefail
          echo "Validating marketplace packages..."

          # Emit validation receipts
          ./target/release/ggen marketplace emit_receipts --marketplace_root .

          # Generate validation report
          ./target/release/ggen marketplace report --marketplace_root .

          echo "✅ Marketplace validation passed"

      - name: Generate marketplace artifacts
        run: |
          set -euo pipefail
          echo "Generating marketplace artifacts..."

          # Generate registry index and PACKAGES.md
          ./target/release/ggen marketplace generate_artifacts --marketplace_root .

          echo "✅ Artifacts generated"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "marketplace"

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "🎉 Marketplace deployed successfully!"
          echo "📍 URL: https://seanchatmangpt.github.io/ggen/marketplace/"
          echo "📦 Registry: https://seanchatmangpt.github.io/ggen/registry/index.json"
          echo "📚 Packages: https://seanchatmangpt.github.io/ggen/PACKAGES.md"

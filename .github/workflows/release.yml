name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

# Release workflow uploads release assets via softprops/action-gh-release.
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-health:
    name: Release Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust and cache
        uses: ./.github/actions/setup-rust-cached
        with:
          toolchain: stable
          cache-key-suffix: cicd-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-cicd and wpm oracle
        uses: ./.github/actions/install-cargo-tools
        with:
          tools: cicd,wpm
          cache-tools: 'true'

      - name: Pre-flight — verify wpm on PATH (ANDON if missing)
        run: |
          set -euo pipefail
          if ! command -v wpm >/dev/null 2>&1; then
            echo "ANDON: wpm not found after install step — pull the cord"
            exit 1
          fi
          echo "wpm: $(wpm --version 2>/dev/null || which wpm)"

      - name: Workspace doctor
        run: cargo cicd workspace doctor

      - name: Process conformance gate (wpm oracle)
        run: cargo cicd status audit

  build-release:
    name: Build Release
    needs: [release-health]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b  # stable (2024-06)
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p ggen-cli-lib --bin ggen
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/ggen release/
          tar -czf ggen-${{ matrix.target }}.tar.gz -C release ggen
          sha256sum ggen-${{ matrix.target }}.tar.gz > ggen-${{ matrix.target }}.tar.gz.sha256

      - name: Upload Release Assets
        uses: softprops/action-gh-release@62c96d0c4e8a889135c1f3a25910db8dbe0e85f7 # v2.3.4
        with:
          files: |
            ggen-${{ matrix.target }}.tar.gz
            ggen-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Cross-host reproducibility gate (L5 condition 20) ───────────────────────
  # build-release above never builds the SAME target triple twice, so nothing
  # in that matrix can be diffed for byte-identical reproducibility. The two
  # jobs below build x86_64-unknown-linux-gnu (cheapest/fastest of the 4 real
  # targets) TWICE, as two independent GitHub Actions jobs. Two matrix/job
  # legs that share a runner label (both "ubuntu-latest") are still two
  # separate, independently-provisioned ephemeral VMs — never the same
  # machine — so comparing their sha256 output is a genuine cross-host
  # reproducibility test, distinct from the same-host test already recorded
  # in .specify/generations.ttl's gen:ReproducibleBuildTest (two CARGO_TARGET_DIRs
  # on ONE machine). Deliberately no `actions/cache` step in either replica job:
  # the GitHub Actions cache backend is shared across jobs in this repo, and
  # restoring replica B from a cache replica A populated would silently turn
  # this into a cache-hit comparison instead of two genuinely independent cold
  # builds — the one failure mode that would make this gate lie.
  build-release-repro-a:
    name: Cross-Host Repro — Replica A (x86_64-unknown-linux-gnu)
    needs: [release-health]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
      host: ${{ steps.hash.outputs.host }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b  # stable (2024-06)
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Build release (replica A, cold — no cache)
        run: cargo build --release --target x86_64-unknown-linux-gnu -p ggen-cli-lib --bin ggen --locked

      - name: Hash replica A binary
        id: hash
        run: |
          set -euo pipefail
          SHA=$(sha256sum target/x86_64-unknown-linux-gnu/release/ggen | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "host=$(hostname)" >> "$GITHUB_OUTPUT"
          echo "Replica A host: $(hostname)"
          echo "Replica A sha256: ${SHA}"

      - name: Archive replica A binary for audit
        run: |
          mkdir -p release-repro-a
          cp target/x86_64-unknown-linux-gnu/release/ggen release-repro-a/ggen-x86_64-unknown-linux-gnu-repro-a

      - name: Upload replica A artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: repro-build-a
          path: release-repro-a/ggen-x86_64-unknown-linux-gnu-repro-a
          retention-days: 7

  build-release-repro-b:
    name: Cross-Host Repro — Replica B (x86_64-unknown-linux-gnu)
    needs: [release-health]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
      host: ${{ steps.hash.outputs.host }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b  # stable (2024-06)
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Build release (replica B, cold — no cache)
        run: cargo build --release --target x86_64-unknown-linux-gnu -p ggen-cli-lib --bin ggen --locked

      - name: Hash replica B binary
        id: hash
        run: |
          set -euo pipefail
          SHA=$(sha256sum target/x86_64-unknown-linux-gnu/release/ggen | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "host=$(hostname)" >> "$GITHUB_OUTPUT"
          echo "Replica B host: $(hostname)"
          echo "Replica B sha256: ${SHA}"

      - name: Archive replica B binary for audit
        run: |
          mkdir -p release-repro-b
          cp target/x86_64-unknown-linux-gnu/release/ggen release-repro-b/ggen-x86_64-unknown-linux-gnu-repro-b

      - name: Upload replica B artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: repro-build-b
          path: release-repro-b/ggen-x86_64-unknown-linux-gnu-repro-b
          retention-days: 7

  verify-cross-host-reproducibility:
    name: Verify Cross-Host Reproducibility (x86_64-unknown-linux-gnu)
    needs: [build-release-repro-a, build-release-repro-b]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compare replica sha256 hashes (fail loudly on divergence)
        run: |
          set -euo pipefail
          HASH_A="${{ needs.build-release-repro-a.outputs.sha256 }}"
          HASH_B="${{ needs.build-release-repro-b.outputs.sha256 }}"
          HOST_A="${{ needs.build-release-repro-a.outputs.host }}"
          HOST_B="${{ needs.build-release-repro-b.outputs.host }}"
          echo "Replica A — host: ${HOST_A}, sha256: ${HASH_A}"
          echo "Replica B — host: ${HOST_B}, sha256: ${HASH_B}"

          if [ -z "${HASH_A}" ] || [ -z "${HASH_B}" ]; then
            echo "ANDON: one or both replica hashes are empty — cannot verify cross-host reproducibility"
            exit 1
          fi

          if [ "${HASH_A}" = "${HASH_B}" ]; then
            echo "Cross-host reproducibility CONFIRMED for x86_64-unknown-linux-gnu:"
            echo "  two independently-provisioned runners (${HOST_A} != ${HOST_B} expected) produced"
            echo "  BIT-IDENTICAL ggen binaries — sha256 ${HASH_A}"
          else
            echo "ANDON: cross-host reproducibility FAILED for x86_64-unknown-linux-gnu"
            echo "  replica A (${HOST_A}): ${HASH_A}"
            echo "  replica B (${HOST_B}): ${HASH_B}"
            echo "  same commit/toolchain/Cargo.lock produced DIFFERENT binaries on two separate hosts"
            exit 1
          fi

  # Note: Homebrew formula update is done manually
  # SHA256 checksums are available in release assets as *.sha256 files

name: Build and Release Debian Package

# WHY workflow_dispatch WAS ADDED (root-cause fix, retrofit:PartialPublishRollbackUnknown
# follow-on): the native `push: tags` trigger below never actually fired for
# any real release -- tags are created by semantic-release.yml using the
# default GITHUB_TOKEN, and GitHub suppresses `on: push` workflow runs for
# events created with GITHUB_TOKEN (the exact same suppression class
# release.yml's own header comment already documented and worked around;
# confirmed here too: 15 total runs ever, all failure, none since
# 2026-07-02, despite dozens of real tags pushed since). Fixed the same
# proven way: release.yml now explicitly `gh workflow run`s this workflow
# --ref <tag> right after build-release completes (workflow_dispatch IS the
# documented GITHUB_TOKEN exception). No separate `tag` input is needed --
# dispatching with --ref <tag> checks the runner out at that ref, so
# GITHUB_REF_NAME (which scripts/build-debian-package.sh reads to derive
# the real package version) is already the tag name, exactly as it would be
# for a native tag-push trigger. The native `push: tags` trigger stays --
# harmless, and still correct if this workflow is ever reached a different
# way (e.g. a real PAT-based tag push).
on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v26.5.19, etc.
  workflow_dispatch:

permissions:
  contents: write  # Required for creating releases

# Release workflow: never cancel an in-progress publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # BUG FIXED (2026-07-22): the bespoke `dtolnay/rust-toolchain@...
      # toolchain: stable` + ad-hoc actions/cache steps below is the same
      # class already root-caused and fixed twice this session (release.yml
      # PR #426, marketplace-test.yml, publish-registry.yml -- see
      # retrofit:BespokeToolchainSetupBypassesSccache). It never installs
      # sccache, which .cargo/config.toml requires unconditionally
      # (`rustc-wrapper = "sccache"`) -- confirmed real and live: 2 actual
      # workflow_dispatch runs today (triggered by release.yml's own
      # dispatch-release-debian job) both failed identically: `error: could
      # not execute process 'sccache ... rustc -vV' (never executed) ...
      # No such file or directory`. `targets: x86_64-unknown-linux-gnu` is
      # dropped as redundant, not lost functionality -- ubuntu-latest
      # runners are already x86_64, matching rustup's default target with
      # no cross-compilation involved.
      - name: Setup ggen build
        uses: ./.github/actions/setup-ggen-build
        with:
          cache-key-suffix: release-debian

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper

      - name: Build Debian package
        run: |
          bash scripts/build-debian-package.sh
        shell: bash

      # debuild/dpkg-buildpackage conventionally places its output ONE
      # directory above the source package (scripts/build-debian-package.sh's
      # own "Gate 10"/"Gate 11" steps read from "../ggen_*.deb*", confirming
      # this). Both actions/upload-artifact and softprops/action-gh-release
      # reject any path containing "../" (real, reproducing CI failure:
      # "Invalid pattern '../ggen_*.deb*'. Relative pathing '.' and '..' is
      # not allowed." -- confirmed on every run in this workflow's visible
      # history). Copy the real build outputs into the workspace root so the
      # later upload/release steps can reference them without traversal.
      - name: Stage build artifacts into the workspace
        run: |
          cp ../ggen_*.deb ../ggen_*.deb.sha256 .
          echo "✓ Staged $(ls ggen_*.deb ggen_*.deb.sha256)"

      - name: Verify build artifacts
        run: |
          ls -lh ggen_*.deb* || (echo "Error: .deb not found" && exit 1)
          ls -lh ggen.sha256 || (echo "Error: checksum not found" && exit 1)
          echo "✓ All artifacts present"

      - name: Test installation script
        run: |
          # Verify the install script exists and is executable
          test -f scripts/install-ggen.sh || (echo "Error: install script not found" && exit 1)
          chmod +x scripts/install-ggen.sh
          echo "✓ Install script verified"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@62c96d0c4e8a889135c1f3a25910db8dbe0e85f7 # v2.3.4
        with:
          files: |
            ggen_*.deb
            ggen_*.deb.sha256
            ggen.sha256
            scripts/install-ggen.sh
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## ggen v${{ github.ref_name }}

            ### Installation

            #### Method 1: Direct apt install (Simplest)

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ggen_*.deb
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ggen_*.deb.sha256
            sha256sum -c ggen_*.deb.sha256
            sudo apt install ./ggen_*.deb
            ggen --help
            ```

            #### Method 2: Using install script (Recommended for CI/CD)

            ```bash
            bash install-ggen.sh "" ./ggen_*.deb
            # Or from URL:
            bash install-ggen.sh https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ggen_*.deb
            ```

            #### Method 3: From source

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd ggen
            git checkout ${{ github.ref_name }}
            cargo build --release -p ggen-cli-lib --bin ggen
            sudo install target/release/ggen /usr/local/bin/
            ```

            ### Verification

            ```bash
            # Verify installation
            which ggen
            ggen --help
            ggen sync --help

            # Verify checksum (important!)
            sha256sum -c ggen_*.deb.sha256
            ```

            ### Troubleshooting

            If installation fails, check:
            - Are you on Debian/Ubuntu? (`uname -s` should print "Linux")
            - Is `dpkg` installed? (`which dpkg`)
            - Do you have sudo access?
            - Check the [release workflow documentation](https://github.com/${{ github.repository }}/blob/main/GITHUB_RELEASE_WORKFLOW.md) for detailed troubleshooting

            ### Build Information

            - **Build timestamp**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.event.head_commit.id }}
            - **Artifacts**: ggen_*.deb (Debian package), ggen_*.deb.sha256 (package checksum), ggen.sha256 (binary checksum)
            - **Build system**: Ubuntu Latest (GitHub Actions)

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to artifact storage (for debugging)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: debian-artifacts
          path: |
            ggen_*.deb*
            ggen.sha256
            /tmp/debuild.log
          retention-days: 30
          if-no-files-found: warn

      - name: Post-release notification
        if: success()
        run: |
          echo "✅ Release ${{ github.ref_name }} published successfully!"
          echo "🔗 Download: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

      - name: Error notification
        if: failure()
        run: |
          echo "❌ Release build failed for ${{ github.ref_name }}"
          echo "⚠️  Check the workflow log for details"
          exit 1

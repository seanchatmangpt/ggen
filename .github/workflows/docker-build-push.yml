name: Docker Build & Push (Multi-Registry)

# `now()` (in the build-args expression, "STAGE 1" job below) is NOT a valid
# GitHub Actions expression function -- GitHub Actions has no such builtin.
# Every reference to it makes the ENTIRE workflow file fail GitHub's own
# expression-schema validation at parse time, before any job is scheduled --
# confirmed real: every run in this workflow's visible history shows zero
# jobs and "This run likely failed because of a workflow file issue.",
# regardless of trigger (push to any branch, not just tags). Fixed by using
# `github.run_started_at`, a real built-in context property (the workflow
# run's own start timestamp), preserving the original fallback intent
# (build date = commit timestamp if available, else "now").
#
# GCP ARTIFACT REGISTRY PUBLISHING REMOVED (2026-07-22,
# retrofit:PartialPublishRollbackUnknown follow-on -- title kept as
# "Multi-Registry" as a historical marker, not a live claim; see this
# note). This was never functional, not a regression: `REGISTRY_GCP:
# artifacts.example.com` is an IANA documentation domain, not a real
# registry (confirmed via dig/nslookup -- no A record), and
# `GCP_ARTIFACT_REGISTRY_KEY` has never existed as a repo secret
# (`gh api repos/.../actions/secrets` -> zero secrets configured, at
# any point checked). Every reference to REGISTRY_GCP below (build
# jobs' login+tag, scan-images' scan target, sign-and-sbom's SBOM/sign
# target) was pointed at an image that could never actually exist.
# Removed rather than left in place failing: continuing to publish
# real GHCR images while a dead GCP branch fails downstream jobs (scan,
# sign, SBOM) that were themselves scanning/signing the WRONG
# (never-pushed) image reference is strictly worse than removing the
# dead path outright. GHCR publishing (secrets.GITHUB_TOKEN, already
# real and working) is untouched. Re-adding real GCP Artifact Registry
# publishing is a distinct, future, externally-gated obligation --
# needs an actual GCP project/registry and a real service-account key
# provisioned as a repo secret, neither of which this session is
# authorized to create.

on:
  push:
    # Only build/push Docker images on version tags — not on every main push.
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME_CONTROLLER: catalog-controller
  IMAGE_NAME_CLI: ggen-cli
  DOCKER_BUILDKIT: 1

permissions:
  contents: read
  packages: write

# Publishing job: do not cancel an in-progress image push mid-publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # STAGE 1: Build and push controller image
  # ============================================================================
  build-controller:
    name: Build Controller Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CONTROLLER }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Controller image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./controller/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_started_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Image build summary
        run: |
          echo "## Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Digest | ${{ steps.build.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # STAGE 2: Build and push CLI image
  # ============================================================================
  build-cli:
    name: Build CLI Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CLI }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-

      - name: Build Rust CLI binary (ggen)
        run: |
          cargo build --release --locked
          mkdir -p dist
          cp target/release/ggen dist/

      - name: Build and push CLI image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ============================================================================
  # STAGE 3: Scan images for vulnerabilities
  # ============================================================================
  scan-images:
    name: Scan Docker Images (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-controller, build-cli]
    if: github.event_name != 'pull_request'

    steps:
      # This job runs on a fresh runner -- build-controller/build-cli's own
      # GHCR login does not carry over (Docker credentials are per-job, not
      # shared across jobs in GitHub Actions). Missing here in every prior
      # version of this file regardless of GCP/GHCR target: images pushed
      # via GITHUB_TOKEN default to private visibility, so pulling one to
      # scan it always needs its own fresh login. This was latent (never
      # actually observed failing) only because the workflow never got this
      # far before; real, necessary for the actual publish path to work now
      # that the earlier GCP-related failures are fixed.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (Controller)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CONTROLLER }}@${{ needs.build-controller.outputs.image-digest }}
          format: sarif
          output: trivy-controller.sarif

      - name: Run Trivy vulnerability scanner (CLI)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CLI }}@${{ needs.build-cli.outputs.image-digest }}
          format: sarif
          output: trivy-cli.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@a8d1ac45b9a34d11fe398d5503176af0d06b303e # v3.30.7
        if: always()
        with:
          sarif_file: |
            trivy-controller.sarif
            trivy-cli.sarif
          category: 'trivy'

  # ============================================================================
  # STAGE 4: Generate SBOM and sign images
  # ============================================================================
  sign-and-sbom:
    name: Sign Images & Generate SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-controller, build-cli]
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.2.0'

      - name: Install syft (SBOM generation)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Log in to registries
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Generate SBOM (Controller)
        run: |
          syft "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CONTROLLER }}@${{ needs.build-controller.outputs.image-digest }}" \
            -o spdx-json > sbom-controller.spdx.json
          syft "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CONTROLLER }}@${{ needs.build-controller.outputs.image-digest }}" \
            -o cyclonedx-json > sbom-controller.cyclonedx.json

      - name: Generate SBOM (CLI)
        run: |
          syft "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CLI }}@${{ needs.build-cli.outputs.image-digest }}" \
            -o spdx-json > sbom-cli.spdx.json
          syft "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CLI }}@${{ needs.build-cli.outputs.image-digest }}" \
            -o cyclonedx-json > sbom-cli.cyclonedx.json

      - name: Sign Controller image (cosign)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CONTROLLER }}@${{ needs.build-controller.outputs.image-digest }}"

      - name: Sign CLI image (cosign)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CLI }}@${{ needs.build-cli.outputs.image-digest }}"

      - name: Attach SBOM to Controller image (cosign)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign attach attestation --attestation sbom-controller.spdx.json \
            "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CONTROLLER }}@${{ needs.build-controller.outputs.image-digest }}"

      - name: Attach SBOM to CLI image (cosign)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign attach attestation --attestation sbom-cli.spdx.json \
            "${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_CLI }}@${{ needs.build-cli.outputs.image-digest }}"

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-reports
          path: |
            sbom-*.spdx.json
            sbom-*.cyclonedx.json
          retention-days: 30

      - name: Artifact provenance summary
        run: |
          echo "## Artifact Provenance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Controller Image Signed | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Image Signed | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOMs Generated | ✅ |" >> $GITHUB_STEP_SUMMARY

name: Install Cargo Tools
description: Install and cache cargo development tools

inputs:
  tools:
    description: 'Comma-separated list of tools to install (make, audit, deny, outdated, tarpaulin, nextest)'
    required: true
  cache-tools:
    description: 'Whether to cache tool binaries'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Compute sanitized tools cache key
      id: tools-key
      run: echo "key=$(echo '${{ inputs.tools }}' | tr ',' '-')" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Cache cargo tools
      if: inputs.cache-tools == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/
        key: ${{ runner.os }}-cargo-tools-${{ steps.tools-key.outputs.key }}

    - name: Install cargo-make
      if: contains(inputs.tools, 'make')
      run: cargo install cargo-make --locked
      shell: bash

    - name: Install cargo-audit
      if: contains(inputs.tools, 'audit')
      run: cargo install cargo-audit --locked
      shell: bash

    - name: Install cargo-deny
      if: contains(inputs.tools, 'deny')
      run: cargo install cargo-deny --locked
      shell: bash

    - name: Install cargo-outdated
      if: contains(inputs.tools, 'outdated')
      run: cargo install cargo-outdated --locked
      shell: bash

    - name: Install cargo-tarpaulin
      if: contains(inputs.tools, 'tarpaulin')
      run: cargo install cargo-tarpaulin --locked
      shell: bash

    - name: Install cargo-nextest
      if: contains(inputs.tools, 'nextest')
      uses: taiki-e/install-action@cargo-nextest

    - name: Install cargo-cicd
      if: contains(inputs.tools, 'cicd')
      run: cargo install --git https://github.com/seanchatmangpt/cargo-cicd cargo-cicd --branch main --features autonomic,affidavit --locked
      shell: bash

    - name: Install affi (affidavit provenance CLI)
      if: contains(inputs.tools, 'affi')
      run: |
        for attempt in 1 2 3; do
          cargo install --git https://github.com/seanchatmangpt/affidavit --branch main --bin affi --locked && break
          echo "affi install attempt $attempt failed (likely crates.io HTTP flake), retrying in $((attempt * 8))s..."
          sleep $((attempt * 8))
        done
      shell: bash

    - name: Install wpm (wasm4pm process oracle)
      if: contains(inputs.tools, 'wpm')
      run: cargo install --git https://github.com/seanchatmangpt/wasm4pm --package wasm4pm-cli --bin wpm --locked
      shell: bash

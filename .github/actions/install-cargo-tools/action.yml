name: Install Cargo Tools
description: Install and cache cargo development tools

inputs:
  tools:
    description: 'Comma-separated list of tools to install (make, audit, deny, outdated, tarpaulin, nextest)'
    required: true
  cache-tools:
    description: 'Whether to cache tool binaries'
    required: false
    default: 'true'

outputs:
  wpm-available:
    description: 'Whether wpm (wasm4pm-cli) installed successfully. "false" means upstream wasm4pm@main is broken and the wpm-dependent gate should be skipped loudly.'
    value: ${{ steps.install-wpm.outputs.available }}

runs:
  using: composite
  steps:
    - name: Compute sanitized tools cache key
      id: tools-key
      run: echo "key=$(echo '${{ inputs.tools }}' | tr ',' '-')" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Cache cargo tools
      if: inputs.cache-tools == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/
        key: ${{ runner.os }}-cargo-tools-${{ steps.tools-key.outputs.key }}

    - name: Install cargo-make
      if: contains(inputs.tools, 'make')
      run: cargo install cargo-make --locked
      shell: bash

    - name: Install cargo-audit
      if: contains(inputs.tools, 'audit')
      run: cargo install cargo-audit --locked
      shell: bash

    - name: Install cargo-deny
      if: contains(inputs.tools, 'deny')
      run: cargo install cargo-deny --locked
      shell: bash

    - name: Install cargo-outdated
      if: contains(inputs.tools, 'outdated')
      run: cargo install cargo-outdated --locked
      shell: bash

    - name: Install cargo-tarpaulin
      if: contains(inputs.tools, 'tarpaulin')
      run: cargo install cargo-tarpaulin --locked
      shell: bash

    - name: Install cargo-nextest
      if: contains(inputs.tools, 'nextest')
      uses: taiki-e/install-action@cargo-nextest

    - name: Install cargo-cicd
      if: contains(inputs.tools, 'cicd')
      run: |
        for attempt in 1 2 3; do
          cargo install --git https://github.com/seanchatmangpt/cargo-cicd cargo-cicd --branch main --features autonomic,affidavit --locked && break
          echo "cargo-cicd install attempt $attempt failed (likely crates.io HTTP flake), retrying in $((attempt * 8))s..."
          sleep $((attempt * 8))
        done
      shell: bash

    - name: Install affi (affidavit provenance CLI)
      if: contains(inputs.tools, 'affi')
      run: |
        for attempt in 1 2 3; do
          cargo install --git https://github.com/seanchatmangpt/affidavit --branch main --package affidavit --bin affi --locked && break
          echo "affi install attempt $attempt failed (likely crates.io HTTP flake), retrying in $((attempt * 8))s..."
          sleep $((attempt * 8))
        done
      shell: bash

    - name: Install wpm (wasm4pm process oracle)
      id: install-wpm
      if: contains(inputs.tools, 'wpm')
      run: |
        installed=false
        for attempt in 1 2 3; do
          if cargo install --git https://github.com/seanchatmangpt/wasm4pm wasm4pm-cli --bin wpm --locked; then
            installed=true
            break
          fi
          echo "wpm install attempt $attempt failed, retrying in $((attempt * 8))s..."
          sleep $((attempt * 8))
        done

        if [ "$installed" = "true" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          # NOTE: as of 2026-07, github.com/seanchatmangpt/wasm4pm@main does not compile
          # (unresolved imports: Ocel20, Xes1849, witness/witnesses module items). This is
          # an upstream defect in a separate repository, out of scope for this repo to fix.
          # We do NOT hard-fail this job on that external breakage; downstream steps must
          # check the `wpm-available` output of this action and skip the wpm-dependent gate
          # LOUDLY (never silently) when it is "false".
          echo "::warning::wpm install failed after 3 attempts — upstream https://github.com/seanchatmangpt/wasm4pm@main is currently broken (unresolved imports). Skipping wpm-dependent process-conformance gate; this is a known external issue, not a regression in this repo."
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

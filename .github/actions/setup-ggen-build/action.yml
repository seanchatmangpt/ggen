# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
#
# setup-ggen-build — the DRY foundation for ggen's PR-gating CI.
#
# WHY THIS ACTION EXISTS (root-cause fix):
# ggen's workspace root Cargo.toml carries a `[patch.crates-io]` table that
# redirects the lsp-max / wasm4pm families to SIBLING checkouts one level above
# the repo root (e.g. `lsp-max = { path = "../lsp-max" }`,
# `wasm4pm = { path = "../wasm4pm/wasm4pm" }`). A fresh CI checkout contains only
# `ggen`, so cargo cannot even LOAD the workspace — every cargo invocation dies at
# workspace resolution with `failed to read /home/runner/work/ggen/lsp-max/Cargo.toml`.
# This action provisions those siblings BEFORE any cargo step runs, installs the
# single pinned-nightly toolchain the workspace actually compiles on, and warms the
# cargo cache. Consumers reference it as `./.github/actions/setup-ggen-build`.
name: Setup ggen build
description: >-
  Provision the sibling repos required by the workspace [patch.crates-io] path
  dependencies, install the pinned nightly toolchain from rust-toolchain.toml, and
  enable cargo registry/target caching. Idempotent and non-interactive.

inputs:
  components:
    description: 'Rust components to add (comma-separated), e.g. "rustfmt,clippy".'
    required: false
    default: 'rustfmt,clippy'
  cache-key-suffix:
    description: 'Extra suffix mixed into the rust-cache key to segment caches per job.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    # STEP 1 — Provision sibling dependency repos (THE root-cause fix).
    #
    # The workspace `[patch.crates-io]` in the root Cargo.toml points at:
    #   lsp-max          -> ../lsp-max                 (+ its lsp-max-protocol/-macros/-client subcrates)
    #   wasm4pm-compat   -> ../wasm4pm-compat
    #   wasm4pm          -> ../wasm4pm/wasm4pm
    # and lsp-max itself path-depends on lsp-types-max (../lsp-types-max). So the
    # four top-level sibling repos that MUST exist next to the checkout are:
    #   lsp-max  lsp-types-max  wasm4pm  wasm4pm-compat
    # Without them cargo fails at workspace load before any build/test/lint runs.
    #
    # Clone target is the PARENT of the checkout: "$GITHUB_WORKSPACE/.." resolves
    # `../lsp-max` to /home/runner/work/ggen/lsp-max — NEVER inside the checkout.
    # The `[ -d .../.git ]` guard makes it idempotent so re-runs (or cached
    # workspaces) don't re-fetch. This is the exact recipe that reproduced a green
    # local `cargo build` + `ggen sync`
    # (see examples/tpot2-wasm4pm-autoconfig/BUILD_PROVISIONING.md).
    #
    # WHY PIN TO EXACT COMMIT SHAs (reproducibility fix):
    # These siblings are UNTAGGED, WIP branches whose default HEAD moves. A plain
    # `git clone --depth 1` grabs whatever floating HEAD happens to be current,
    # so the same CI workflow could compile against different sibling source on two
    # runs minutes apart — non-deterministic, non-reproducible builds. We instead
    # `fetch --depth 1` an EXACT commit SHA per sibling and check out FETCH_HEAD.
    # CI now compiles against a frozen, known-good sibling set; upgrading a sibling
    # becomes a DELIBERATE, reviewable bump of the SHA in the table below.
    - name: Provision sibling dependency repos
      shell: bash
      run: |
        set -euo pipefail
        org="https://github.com/seanchatmangpt"
        parent="$GITHUB_WORKSPACE/.."
        # Pinned sibling commit SHAs (bump deliberately; floating HEAD is forbidden).
        declare -A shas=(
          [lsp-max]=7bcc1e16dec71ef5fb2cedea2dfd6cb5cde37f59
          [lsp-types-max]=6773e6017ca83c565785d0ec39d75304f62c3237
          [wasm4pm]=0bb134b29245517ac4969a9f1916f5432931c5d0
          [wasm4pm-compat]=e46155e209a750fda0218532d96ae17a9e10903e
        )
        for repo in lsp-max lsp-types-max wasm4pm wasm4pm-compat; do
          dest="$parent/$repo"; sha="${shas[$repo]}"
          if [ -d "$dest/.git" ]; then
            echo "sibling already present: $repo"
          else
            echo "fetching sibling $repo @ $sha"
            git init -q "$dest"
            git -C "$dest" remote add origin "$org/$repo"
            git -C "$dest" fetch -q --depth 1 origin "$sha"
            git -C "$dest" checkout -q FETCH_HEAD
          fi
        done

    # STEP 2 — Install the pinned nightly toolchain.
    #
    # rust-toolchain.toml pins `channel = "nightly-2026-06-22"`. This is the ONLY
    # channel that compiles the workspace; a stable/beta matrix cannot. We pin the
    # toolchain explicitly (matching rust-toolchain.toml) so the installed components
    # land on the right channel, and add the requested components. dtolnay/rust-toolchain
    # is SHA-pinned for supply-chain safety (it publishes mutable channel tags, not
    # immutable release tags).
    #
    # Correction (2026-07-17, PR #255, verified live): this was drifted to
    # nightly-2026-04-15, stale against rust-toolchain.toml's real, current pin --
    # exactly the lockstep failure this comment warns against. Harmless in practice
    # (cargo always honors the nearest rust-toolchain.toml regardless of this input,
    # so builds were correct) but wasteful: rustup silently fetched a second,
    # unused nightly on every run. Re-synced.
    - name: Install pinned nightly toolchain
      # dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b == tag "stable" (2024-06)
      uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b
      with:
        # Channel mirrors rust-toolchain.toml exactly (nightly-2026-06-22). If that
        # file's channel changes, update this line in lockstep.
        toolchain: nightly-2026-06-22
        components: ${{ inputs.components }}

    # STEP 2a — Install sccache, required by .cargo/config.toml's unconditional
    # `[build] rustc-wrapper = "sccache"`. Without it every cargo invocation in CI
    # fails immediately: `error: could not execute process 'sccache ... rustc -vV'
    # (never executed) ... No such file or directory` (found 2026-07-17, PR #255 --
    # this branch's very first real CI run, since it had never been pushed before).
    # taiki-e/install-action fetches a prebuilt binary (no compile), matching the
    # `just`/`cargo-audit` install pattern already used elsewhere in this file/repo.
    - name: Install sccache
      uses: taiki-e/install-action@81ecf985428d5c2ea81dbf079bceca32bc9604ab  # v2.62.43
      with:
        tool: sccache

    # STEP 2b — Install `just`, the project's task runner and CI entry point.
    # Every CI job invokes `just <recipe>` (check/build/test/lint/...), but `just`
    # is NOT preinstalled on GitHub runners (jobs failed with `just: command not
    # found`, exit 127). taiki-e/install-action fetches a prebuilt binary (no compile).
    - name: Install just
      # SHA-pinned for supply-chain safety / reproducibility (mutable @v2 tag).
      uses: taiki-e/install-action@81ecf985428d5c2ea81dbf079bceca32bc9604ab  # v2.62.43
      with:
        tool: just

    # STEP 3 — Cache cargo registry + build artifacts.
    #
    # Swatinem/rust-cache keys on Cargo.lock + rustc version and caches the registry
    # index/cache and target/ dir. The `cache-key-suffix` input is folded into both
    # `key` and `shared-key` so distinct jobs (check / build / test / lint) can keep
    # segmented caches instead of clobbering one another.
    - name: Cache cargo build artifacts
      # SHA-pinned for supply-chain safety / reproducibility (mutable @v2 tag).
      uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1  # v2.8.1
      with:
        key: ${{ inputs.cache-key-suffix }}
        shared-key: ggen-${{ inputs.cache-key-suffix }}

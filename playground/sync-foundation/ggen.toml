# SYNC-ACTUATOR-1 — the smallest capable O* that lets `ggen sync` actuate once.
#
# Proves A = μ(O*) with μ ≜ ggen sync: a public-ontology-aligned boundary
# (ontology + CONSTRUCT inference + SELECT query + Tera template) from which
# ggen sync manufactures ONE Gall foundation test artifact and ONE receipt.
#
# Run from this directory:  ggen sync --manifest ggen.toml

[project]
name = "gall-sync-foundation"
version = "0.1.0"
description = "SYNC-ACTUATOR-1: smallest capable O* for ggen sync to actuate one Gall test + receipt"

[ontology]
# Public-ontology footing: PROV-O + DCTERMS + SKOS (no private meaning, no gall:).
source = "ontology/command-foundation.ttl"

[generation]
output_dir = "."

# Inference rules are required for the DMAIC Measure quality gate (the actuator
# refuses to manufacture without a capable measurement system). Standard
# normalization keeps every triple, so the SELECT below sees the seed facts.
[inference]
rules = [
    { name = "normalize", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o }" }
]

# One generation rule → one emitted artifact (SYNC-ACTUATOR-1 manufactures exactly one).
[[generation.rules]]
name = "gall-command-foundation"
query = { inline = """
PREFIX prov:    <http://www.w3.org/ns/prov#>
PREFIX dcterms: <http://purl.org/dc/terms/>
PREFIX skos:    <http://www.w3.org/2004/02/skos/core#>
SELECT ?test_name ?fixture ?diagnostic ?route_id ?surfaces WHERE {
  # The emitted artifact is a prov:Entity generated by the actuation run.
  ?pier a prov:Entity ;
        prov:wasGeneratedBy ?run ;
        dcterms:title ?test_name ;
        dcterms:coverage ?surfaces ;
        dcterms:source ?fix ;
        dcterms:references ?diag_concept ;
        dcterms:conformsTo ?route_concept .
  # The run is a prov:Activity that used the fixture entity.
  ?run a prov:Activity ;
       prov:used ?fix .
  ?fix dcterms:identifier ?fixture .
  # Controlled-vocabulary concepts carry their identity via skos:notation.
  ?diag_concept  skos:notation ?diagnostic .
  ?route_concept skos:notation ?route_id .
}
""" }
template = { file = "templates/gall_command_foundation.rs.tera" }
output_file = "generated/gall_command_foundation.rs"
mode = "Overwrite"

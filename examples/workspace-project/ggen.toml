# =============================================================================
# ggen v5 Workspace Project Manifest
# Multi-crate Rust workspace — ontology-driven Cargo.toml + README generation
# =============================================================================

[project]
name = "workspace-project"
version = "1.0.0"
description = "Multi-crate workspace demonstrating ggen ontology-driven generation"

[ontology]
source = "ontology/workspace.ttl"
base_iri = "https://ggen.io/examples/workspace/"

[ontology.prefixes]
ws = "https://ggen.io/examples/workspace#"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "."

# =============================================================================
# RULE 1: Workspace README
# Generates the top-level README with workspace overview and crate table
# =============================================================================
[[generation.rules]]
name = "workspace-readme"
query = { inline = """
PREFIX ws: <https://ggen.io/examples/workspace#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?name ?version ?description ?crateName ?path ?crateType ?crateDescription
WHERE {
  ?workspace a ws:Workspace ;
             ws:name ?name ;
             ws:version ?version ;
             ws:description ?description ;
             ws:hasCrate ?crate .
  ?crate ws:name ?crateName ;
         ws:path ?path ;
         ws:crateType ?crateType ;
         ws:description ?crateDescription .
}
ORDER BY ?crateName
""" }
template = { file = "templates/workspace-readme.tera" }
output_file = "README.md"
mode = "Overwrite"

# =============================================================================
# RULE 2: Crate Manifest Summary
# Generates a summary of all crate manifests
# =============================================================================
[[generation.rules]]
name = "crate-manifest"
query = { inline = """
PREFIX ws: <https://ggen.io/examples/workspace#>

SELECT ?crateName ?crateDescription ?crateType
WHERE {
  ?workspace a ws:Workspace ;
             ws:hasCrate ?crate .
  ?crate ws:name ?crateName ;
         ws:crateType ?crateType ;
         ws:description ?crateDescription .
}
ORDER BY ?crateName
LIMIT 1
""" }
template = { file = "templates/crate-manifest.tera" }
output_file = "CRATES.toml"
mode = "Overwrite"

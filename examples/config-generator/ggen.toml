# =============================================================================
# ggen Config Generator Example
# Generates TOML configuration files and documentation from an ontology
# Demonstrates: config modeling, section grouping, typed values
# =============================================================================

[project]
name = "config-generator"
version = "1.0.0"
description = "Generate TOML configs and documentation from a configuration ontology"

[ontology]
source = "ontology/configs.ttl"
base_iri = "https://ggen.io/examples/config#"

[ontology.prefixes]
cfg = "https://ggen.io/examples/config#"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[generation]
output_dir = "generated"

# =============================================================================
# RULE 1: Generate app_config.toml
# Produces a complete TOML config grouped by section
# =============================================================================
[[generation.rules]]
name = "app-config-toml"
query = { inline = """
PREFIX cfg: <https://ggen.io/examples/config#>

SELECT ?sectionName ?key ?value ?valueType ?entryDescription ?entryOrder
WHERE {
  ?section a cfg:Section ;
           cfg:sectionName ?sectionName .
  ?entry a cfg:Entry ;
         cfg:entryOf ?section ;
         cfg:key ?key ;
         cfg:value ?value ;
         cfg:valueType ?valueType .
  OPTIONAL { ?entry cfg:description ?entryDescription }
  OPTIONAL { ?entry cfg:entryOrder ?entryOrder }
}
ORDER BY ?sectionName ?entryOrder ?key
""" }
template = { file = "templates/app-config.tera" }
output_file = "app_config.toml"
mode = "Overwrite"

# =============================================================================
# RULE 2: Generate configuration reference documentation
# Produces a Markdown reference doc with all sections and their entries
# =============================================================================
[[generation.rules]]
name = "config-docs"
query = { inline = """
PREFIX cfg: <https://ggen.io/examples/config#>

SELECT ?sectionName ?sectionDescription ?sectionComment ?key ?value ?valueType ?required ?entryDescription ?entryOrder
WHERE {
  ?section a cfg:Section ;
           cfg:sectionName ?sectionName ;
           cfg:description ?sectionDescription .
  OPTIONAL { ?section cfg:comment ?sectionComment }
  ?entry a cfg:Entry ;
         cfg:entryOf ?section ;
         cfg:key ?key ;
         cfg:value ?value ;
         cfg:valueType ?valueType .
  OPTIONAL { ?entry cfg:required ?required }
  OPTIONAL { ?entry cfg:description ?entryDescription }
  OPTIONAL { ?entry cfg:entryOrder ?entryOrder }
}
ORDER BY ?sectionName ?entryOrder ?key
""" }
template = { file = "templates/section-docs.tera" }
output_file = "CONFIG_REFERENCE.md"
mode = "Overwrite"

[package]
name = "tcps-production"
version = "26.7.23"
edition = "2021"
rust-version = "1.86"
license = "MIT OR Apache-2.0"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
blake3 = "1"
ed25519-dalek = "2"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
tempfile = "3"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }

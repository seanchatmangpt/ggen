# Simple Project Example
# A minimal ggen.toml configuration demonstrating basic code generation

[project]
name = "simple-project"
version = "0.1.0"
description = "A simple project demonstrating ggen.toml basics"

[ontology]
source = "ontology/projects.ttl"
base_iri = "https://ggen.io/ontology/projects#"

[ontology.prefixes]
proj = "https://ggen.io/ontology/projects#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[generation]
output_dir = "generated"

[[generation.rules]]
name = "cargo-toml"
description = "Generate Cargo.toml manifest from project spec"
query = { inline = """
PREFIX proj: <https://ggen.io/ontology/projects#>
SELECT ?project_name ?version ?description
WHERE {
  ?project a proj:RustProject ;
           proj:name ?project_name ;
           proj:version ?version .
  OPTIONAL { ?project proj:description ?description }
}
LIMIT 1
""" }
template = { file = "templates/cargo-toml.tera" }
output_file = "Cargo.toml"
mode = "Overwrite"


[workspace]
[package]
name = "mcp-tool-example"
version = "0.1.0"
edition = "2021"

[dependencies]
rmcp = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
toml = "1.1.0"
oxigraph = { version = "0.5.8", features = ["rdf-12"] }

[[bin]]
name = "mcp_tool_example"
path = "src/main.rs"

[workspace]

[package]
name = "frontmatter-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
toml = "1.1.0"
oxigraph = { version = "0.5.8", features = ["rdf-12"] }
clap = { version = "4.5", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
serde = { version = "1.0", features = ["derive"] }


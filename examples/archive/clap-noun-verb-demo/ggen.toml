[project]
name = "clap-noun-verb"
version = "3.2.0"
description = "CLI noun-verb generator"

[ontology]
source = "sample-cli.ttl"

[inference]
[[inference.rules]]
name = "link-noun-verbs"
construct = """
PREFIX api: <https://ggen.io/ontology/api#>
CONSTRUCT {
  ?noun api:hasVerb ?verb .
} WHERE {
  ?noun a api:Noun ; api:hasVerb ?verb .
}
"""

[generation]
output_dir = "generated"

[[generation.rules]]
name = "cli-code-gen"
query = { inline = "SELECT * WHERE { ?s ?p ?o }" }
template = { file = "cli-template.yaml" }
output_file = "generated/project.rs"
mode = "Overwrite"

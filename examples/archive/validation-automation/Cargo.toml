[workspace]
members = ["."]

[package]
name = "validation-automation"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.34", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
indicatif = "0.17"
console = "0.15"
colored = "2.0"
tracing = "0.1"
tracing-subscriber = "0.3"
tracing-appender = "0.2"
async-trait = "0.1"
clap = { version = "4.4", features = ["derive"] }
toml = "1.1.0"
oxigraph = { version = "0.5.8", features = ["rdf-12"] }

[dev-dependencies]
tokio-test = "0.4"

# ggen Configuration: GCP Erlang Autonomics C4 Diagrams
# Manifest for code generation pipeline with deterministic C4 architecture diagrams
# Version: 0.1.0

[project]
name = "gcp-erlang-autonomics"
version = "0.1.0"
description = "C4 architecture diagrams + Erlang autonomic governors on GCP infrastructure"

[ontology]
source = "ontology/gcp-erlang.ttl"
base_iri = "http://ggen.io/c4#"

[ontology.prefixes]
c4 = "http://ggen.io/c4#"
gcp = "http://ggen.io/gcp#"
sku = "http://ggen.io/sku#"
autonomic = "http://ggen.io/autonomic#"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "."
require_audit_trail = true

# =============================================================================
# RULE 1: C4 Level 1 - System Context Diagram
# =============================================================================
[[generation.rules]]
name = "c4-level1"
query = { inline = """
PREFIX c4: <http://ggen.io/c4#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?actor_label ?system_label ?rel_type ?target_system
WHERE {
  ?actor a c4:Actor ;
         rdfs:label ?actor_label ;
         c4:interactsWith ?system .
  ?system rdfs:label ?system_label .
  OPTIONAL { ?actor c4:relationshipType ?rel_type }
  OPTIONAL {
    ?system c4:hasContainer ?target .
    ?target rdfs:label ?target_system .
  }
}
ORDER BY ?actor_label ?system_label
""" }
template = { file = "templates/c4-level1.tera" }
output_file = "c4-level1-context.mmd"
mode = "Overwrite"

# =============================================================================
# RULE 2: C4 Level 2 - Container Diagram
# =============================================================================
[[generation.rules]]
name = "c4-level2"
query = { inline = """
PREFIX c4: <http://ggen.io/c4#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?system_label ?container_label ?container_type ?dataflow_label ?target_container
WHERE {
  ?system a c4:System ;
          rdfs:label ?system_label ;
          c4:hasContainer ?container .
  ?container rdfs:label ?container_label ;
             a ?container_type .
  OPTIONAL {
    ?container c4:dataFlowTo ?target .
    ?container c4:flowLabel ?dataflow_label .
    ?target rdfs:label ?target_container .
  }
}
ORDER BY ?system_label ?container_label
""" }
template = { file = "templates/c4-level2.tera" }
output_file = "c4-level2-containers.mmd"
mode = "Overwrite"

# =============================================================================
# RULE 3: C4 Level 3 - Component Diagram (FSM)
# =============================================================================
[[generation.rules]]
name = "c4-level3"
query = { inline = """
PREFIX c4: <http://ggen.io/c4#>
PREFIX autonomic: <http://ggen.io/autonomic#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?container_label ?component_label ?component_type ?state_from ?state_to ?transition_label
WHERE {
  ?container c4:hasComponent ?component ;
             rdfs:label ?container_label .
  ?component rdfs:label ?component_label ;
             a ?component_type .
  OPTIONAL {
    ?component autonomic:hasState ?state .
    ?state autonomic:transitionTo ?next_state ;
           rdfs:label ?state_from .
    ?next_state rdfs:label ?state_to .
    OPTIONAL { ?state autonomic:transitionLabel ?transition_label }
  }
}
ORDER BY ?container_label ?component_label
""" }
template = { file = "templates/c4-level3.tera" }
output_file = "c4-level3-components.mmd"
mode = "Overwrite"

# =============================================================================
# RULE 4: C4 Level 4 - Infrastructure Deployment
# =============================================================================
[[generation.rules]]
name = "c4-level4"
query = { inline = """
PREFIX gcp: <http://ggen.io/gcp#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?region_label ?service_label ?service_type ?protocol ?port
WHERE {
  ?zone gcp:inRegion ?region .
  ?region rdfs:label ?region_label .
  ?service gcp:deployedIn ?zone ;
           rdfs:label ?service_label ;
           a ?service_type .
  OPTIONAL { ?service gcp:exposesPort ?port }
  OPTIONAL { ?service gcp:protocol ?protocol }
}
ORDER BY ?region_label ?service_label
""" }
template = { file = "templates/c4-level4.tera" }
output_file = "c4-level4-deployment.mmd"
mode = "Overwrite"

# =============================================================================
# RULE 5: SKU Catalog
# =============================================================================
[[generation.rules]]
name = "sku-catalog"
query = { inline = """
PREFIX sku: <http://ggen.io/sku#>
PREFIX autonomic: <http://ggen.io/autonomic#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?sku_name ?sku_tier ?signal_type ?action_type ?max_instances ?cost_per_hour
WHERE {
  ?s a sku:SKU ;
     rdfs:label ?sku_name ;
     sku:tier ?sku_tier ;
     autonomic:triggeredBy ?signal ;
     autonomic:executes ?action .
  ?signal a ?signal_type .
  ?action a ?action_type .
  OPTIONAL { ?s sku:maxInstances ?max_instances }
  OPTIONAL { ?s sku:costPerHour ?cost_per_hour }
}
ORDER BY ?sku_tier ?sku_name
""" }
template = { file = "templates/sku-catalog.tera" }
output_file = "sku-catalog.md"
mode = "Overwrite"

# =============================================================================
# RULE 6: Kubernetes Deployment Manifest
# =============================================================================
[[generation.rules]]
name = "k8s-deployment"
query = { inline = """
PREFIX gcp: <http://ggen.io/gcp#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?service_label ?protocol ?port
WHERE {
  ?service a gcp:CloudRunService ;
           rdfs:label ?service_label .
  OPTIONAL { ?service gcp:protocol ?protocol }
  OPTIONAL { ?service gcp:exposesPort ?port }
}
LIMIT 1
""" }
template = { file = "templates/deployment-gke.tera" }
output_file = "deployment-gke.yaml"
mode = "Overwrite"

[workspace]

[package]
name = "mcp_query_example"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# ggen-a2a-mcp = { path = "../../crates/ggen-a2a-mcp" }  # crate removed (absorbed into ggen-lsp's mcp/a2a features)
rmcp = { version = "1.3.0", features = ["client", "server"] }
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
toml = "1.1.0"
oxigraph = { version = "0.5.8", features = ["rdf-12"] }

[[bin]]
name = "mcp_query_example"
path = "src/main.rs"

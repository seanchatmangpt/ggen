[package]
name = "mcp-a2a-self-hosting"
version = "0.1.0"
edition = "2021"
description = "Complete MCP/A2A self-hosting example"
publish = false

[dependencies]
# A2A agent framework (AgentBuilder API)
a2a-agents = { path = "../../vendors/a2a-rs/a2a-agents", default-features = false }

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# MCP server (rmcp 1.3.0)
rmcp = "1.3"

# ggen core (for schema parsing)
ggen-core = { path = "../../crates/ggen-core" }

[workspace]

[dev-dependencies]
tokio-test = "0.4"

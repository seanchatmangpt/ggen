[project]
name = "mcp-a2a-self-hosting"
version = "0.1.0"
description = "Complete MCP/A2A self-hosting example with LLM generation and quality gates"

[ontology]
source = "ontology/"
format = "turtle"

[generation]
output_dir = "src"
templates_dir = "templates/"

[generation.rules]
# SPARQL queries for A2A agent extraction
"ontology/agent.ttl" = [
    { query = "queries/extract-agent.rq", template = "agent.rs.tera", output = "agent.rs" },
    { query = "queries/extract-skills.rq", template = "skills.tera", output = "skills.rs" },
    { query = "queries/extract-agent-card.rq", template = "agent-card.json.tera", output = "agent_card.json" },
]

[llm]
# Enable LLM-powered code generation
enabled = true
provider = "openai"  # or "anthropic"
model = "gpt-4"
temperature = 0.7
max_tokens = 2000

[quality]
# Enable quality gates
gates = ["specification", "compilation", "tests"]
slo_timeout_ms = 5000
require_closure = true

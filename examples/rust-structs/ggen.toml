# =============================================================================
# ggen Rust Struct Generation Example
# Generates strongly-typed Rust structs from an entity ontology
# Demonstrates: entity modeling, field optionality, serde derives
# =============================================================================

[project]
name = "rust-structs"
version = "1.0.0"
description = "Generate Rust structs with serde derives from an entity ontology"

[ontology]
source = "ontology/structs.ttl"
base_iri = "https://ggen.io/examples/rust-structs#"

[ontology.prefixes]
rs = "https://ggen.io/examples/rust-structs#"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[generation]
output_dir = "generated"

# =============================================================================
# RULE: Generate all Rust structs
# Joins entity definitions with their fields, orders by struct name and field order
# =============================================================================
[[generation.rules]]
name = "rust-structs"
query = { inline = """
PREFIX rs: <https://ggen.io/examples/rust-structs#>

SELECT ?structName ?description ?fieldName ?fieldType ?optional ?fieldOrder
WHERE {
  ?entity a rs:Entity ;
          rs:name ?structName ;
          rs:description ?description .
  OPTIONAL {
    ?field a rs:Field ;
           rs:fieldOf ?entity ;
           rs:fieldName ?fieldName ;
           rs:fieldType ?fieldType .
    OPTIONAL { ?field rs:optional ?optional }
    OPTIONAL { ?field rs:fieldOrder ?fieldOrder }
  }
}
ORDER BY ?structName ?fieldOrder ?fieldName
""" }
template = { file = "templates/rust-structs.tera" }
output_file = "structs.rs"
mode = "Overwrite"

[project]
name = "mcp-a2a-self-hosting"
version = "0.1.0"
description = "Complete MCP/A2A self-hosting example with LLM generation and quality gates"

[ontology]
source = "ontology/"

[generation]
output_dir = "src"
rules = [
    { name = "agent-rs", query = { file = "queries/extract-agent.rq" }, template = { file = "agent.rs.tera" }, output_file = "agent.rs" },
    { name = "skills-rs", query = { file = "queries/extract-skills.rq" }, template = { file = "skills.tera" }, output_file = "skills.rs" },
    { name = "agent-card-json", query = { file = "queries/extract-agent-card.rq" }, template = { file = "agent-card.json.tera" }, output_file = "agent_card.json" },
]

[validation]
validate_syntax = true
no_unsafe = true

[[validation.rules]]
name = "check-agent-name"
description = "Agent must have a non-empty name"
ask = "ASK { ?s a agent:Agent ; agent:agentName ?name . FILTER(STRLEN(?name) > 0) }"
severity = "Error"

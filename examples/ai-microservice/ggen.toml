# =============================================================================
# ggen v5 AI Microservice Manifest
# Ontology-driven README and Dockerfile generation for an AI microservice
# =============================================================================

[project]
name = "ai-microservice"
version = "0.1.0"
description = "AI-powered microservice with LLM integration and REST API"

[ontology]
source = "ontology/microservice.ttl"
base_iri = "https://ggen.io/examples/microservice/"

[ontology.prefixes]
svc = "https://ggen.io/examples/microservice#"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "."

# =============================================================================
# RULE 1: README with API Route Table
# Generates README from service metadata and routes
# =============================================================================
[[generation.rules]]
name = "readme"
query = { inline = """
PREFIX svc: <https://ggen.io/examples/microservice#>

SELECT ?name ?version ?description ?port ?baseImage ?path ?method ?routeDescription
WHERE {
  ?service a svc:Service ;
           svc:name ?name ;
           svc:version ?version ;
           svc:description ?description ;
           svc:port ?port ;
           svc:baseImage ?baseImage ;
           svc:hasRoute ?route .
  ?route svc:path ?path ;
         svc:method ?method ;
         svc:description ?routeDescription .
}
ORDER BY ?path ?method
""" }
template = { file = "templates/readme.tera" }
output_file = "README.md"
mode = "Overwrite"

# =============================================================================
# RULE 2: Dockerfile
# Generates Dockerfile from service metadata
# =============================================================================
[[generation.rules]]
name = "dockerfile"
query = { inline = """
PREFIX svc: <https://ggen.io/examples/microservice#>

SELECT ?name ?version ?port ?baseImage
WHERE {
  ?service a svc:Service ;
           svc:name ?name ;
           svc:version ?version ;
           svc:port ?port ;
           svc:baseImage ?baseImage .
}
LIMIT 1
""" }
template = { file = "templates/dockerfile.tera" }
output_file = "Dockerfile"
mode = "Overwrite"

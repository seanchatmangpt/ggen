# Example ggen.toml with LLM Generation Enabled
# This demonstrates how to enable LLM-based skill implementation generation

[project]
name = "llm-skill-generation-example"
version = "0.1.0"
description = "Example project demonstrating LLM-powered skill generation"

[ontology]
source = "skills.ttl"
imports = []
base_iri = "http://example.org/skills#"

[generation]
output_dir = "generated"
enable_llm = true
llm_provider = "groq"
llm_model = "llama-3.3-70b-versatile"

[[generation.rules]]
name = "generate-rust-skills"
query = "extract-rust-skills.rq"
template = "rust-skill.tera"
output_file = "skills/{{ skill_name | snake_case }}.rs"
skip_empty = true
mode = "overwrite"

[[generation.rules]]
name = "generate-elixir-skills"
query = "extract-elixir-skills.rq"
template = "elixir-skill.tera"
output_file = "skills/{{ skill_name | snake_case }}.ex"
skip_empty = true
mode = "overwrite"

[validation]
require_shacl = false
require_inference = false

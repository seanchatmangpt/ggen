[workspace]

[package]
name = "ai-templates"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.47", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
regex = "1.10"
anyhow = "1.0"
tera = "1.20"
oxigraph = { version = "0.5.6", features = ["rdf-12"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1.47", features = ["full"] }
proptest = "1.8"
insta = "1.43"
tempfile = "3.23"

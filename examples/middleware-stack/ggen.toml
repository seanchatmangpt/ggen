[project]
name = "middleware-stack"
version = "1.0.0"
description = "Express.js middleware pipeline generated from RDF ontology"

[ontology]
source = "ontology/middleware-stack.ttl"
base_iri = "https://ggen.io/examples/middleware#"

[ontology.prefixes]
mw   = "https://ggen.io/examples/middleware#"
rdf  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd  = "http://www.w3.org/2001/XMLSchema#"

[generation]
output_dir = "."

# ── Rule 1: middleware.js ─────────────────────────────────────────────────────
[[generation.rules]]
name = "middleware-js"
query = { inline = """
PREFIX mw:  <https://ggen.io/examples/middleware#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?stackName ?environment ?name ?description ?order ?enabled ?packageName ?config
WHERE {
  ?stack a mw:Stack ;
         mw:stackName ?stackName ;
         mw:environment ?environment .
  ?mw a mw:Middleware ;
      mw:name ?name ;
      mw:description ?description ;
      mw:order ?order ;
      mw:enabled ?enabled .
  OPTIONAL { ?mw mw:packageName ?packageName }
  OPTIONAL { ?mw mw:config ?config }
}
ORDER BY ?order
""" }
template    = { file = "templates/middleware.tera" }
output_file = "middleware.js"
mode        = "Overwrite"

# ── Rule 2: middleware.config.json ────────────────────────────────────────────
[[generation.rules]]
name = "middleware-config"
query = { inline = """
PREFIX mw:  <https://ggen.io/examples/middleware#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?stackName ?environment ?name ?description ?order ?enabled
WHERE {
  ?stack a mw:Stack ;
         mw:stackName ?stackName ;
         mw:environment ?environment .
  ?mw a mw:Middleware ;
      mw:name ?name ;
      mw:description ?description ;
      mw:order ?order ;
      mw:enabled ?enabled .
}
ORDER BY ?order
""" }
template    = { file = "templates/config.tera" }
output_file = "middleware.config.json"
mode        = "Overwrite"

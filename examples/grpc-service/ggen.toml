[project]
name = "grpc-service"
version = "1.0.0"
description = "Protocol buffer definitions generated from RDF service ontology"

[ontology]
source = "ontology/grpc-service.ttl"
base_iri = "https://ggen.io/examples/grpc#"

[ontology.prefixes]
grpc = "https://ggen.io/examples/grpc#"
rdf  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd  = "http://www.w3.org/2001/XMLSchema#"

[generation]
output_dir = "."

# ── Rule 1: Message definitions ───────────────────────────────────────────────
[[generation.rules]]
name = "proto-messages"
query = { inline = """
PREFIX grpc: <https://ggen.io/examples/grpc#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?messageName ?messageComment ?fieldName ?fieldType ?fieldNumber ?package
WHERE {
  ?msg a grpc:Message ;
       grpc:messageName ?messageName .
  OPTIONAL { ?msg rdfs:comment ?messageComment }
  ?field a grpc:Field ;
         grpc:messageOf ?msg ;
         grpc:fieldName ?fieldName ;
         grpc:fieldType ?fieldType ;
         grpc:fieldNumber ?fieldNumber .
  ?svc a grpc:Service ; grpc:package ?package .
}
ORDER BY ?messageName ?fieldNumber
""" }
template    = { file = "templates/proto.tera" }
output_file = "generated/messages.proto"
mode        = "Overwrite"

# ── Rule 2: Service definitions ───────────────────────────────────────────────
[[generation.rules]]
name = "proto-services"
query = { inline = """
PREFIX grpc: <https://ggen.io/examples/grpc#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?serviceName ?serviceComment ?package ?methodName ?methodComment ?requestType ?responseType
WHERE {
  ?svc a grpc:Service ;
       grpc:serviceName ?serviceName ;
       grpc:package ?package .
  OPTIONAL { ?svc rdfs:comment ?serviceComment }
  ?method a grpc:Method ;
          grpc:methodOf ?svc ;
          grpc:methodName ?methodName ;
          grpc:requestType ?requestType ;
          grpc:responseType ?responseType .
  OPTIONAL { ?method rdfs:comment ?methodComment }
}
ORDER BY ?serviceName ?methodName
""" }
template    = { file = "templates/services.tera" }
output_file = "generated/services.proto"
mode        = "Overwrite"

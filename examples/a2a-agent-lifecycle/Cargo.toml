[package]
name = "a2a-agent-lifecycle"
version = "0.1.0"
edition = "2021"
authors = ["GGEN Team"]
license = "MIT"
description = "Wave 4 example: Agent lifecycle state machine with task management, message routing, and MCP bridging"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
futures = "0.3"
dashmap = "5.5"

# A2A dependencies
a2a-generated = { path = "../../crates/a2a-generated" }
# ggen-a2a-mcp temporarily disabled due to async trait object compilation issues
# ggen-a2a-mcp = { path = "../../crates/ggen-a2a-mcp" }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
proptest = "1.0"
insta = "1.34"

[[test]]
name = "state_machine_tests"
path = "tests/state_machine_tests.rs"

[[test]]
name = "messaging_tests"
path = "tests/messaging_tests.rs"

[[test]]
name = "task_tests"
path = "tests/task_tests.rs"

[[test]]
name = "supervisor_tests"
path = "tests/supervisor_tests.rs"

[[test]]
name = "lifecycle_tests"
path = "tests/lifecycle_tests.rs"

[[test]]
name = "groq_integration_tests"
path = "tests/groq_integration_tests.rs"

[[test]]
name = "groq_schema_agent_integration"
path = "tests/groq_schema_agent_integration.rs"

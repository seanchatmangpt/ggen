# =============================================================================
# ggen v5 GraphQL Schema Code Generation Manifest
# Generates GraphQL SDL schema files from RDF ontology
# Single source of truth → object types + input types + full schema
# =============================================================================

[project]
name = "graphql-schema-example"
version = "1.0.0"
description = "Ontology-driven GraphQL SDL generation with ggen sync"

[ontology]
source = "ontology/graphql-schema.ttl"
base_iri = "https://ggen.io/examples/social/"
schema = "ontology/graphql-vocabulary.ttl"

[ontology.prefixes]
gql = "https://ggen.io/examples/social#"
g = "https://ggen.io/ontology/graphql#"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "output"
require_audit_trail = true

# =============================================================================
# RULE 1: Object type definitions
# Generates type Foo { ... } blocks for all ObjectTypes
# =============================================================================
[[generation.rules]]
name = "object-types"
query = { inline = """
PREFIX g: <https://ggen.io/ontology/graphql#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?typeName ?typeComment ?fieldName ?fieldType ?nonNull ?isList ?fieldComment
WHERE {
  ?type a g:ObjectType ;
        g:typeName ?typeName ;
        g:hasField ?field .
  OPTIONAL { ?type rdfs:comment ?typeComment }

  ?field g:fieldName ?fieldName ;
         g:fieldType ?fieldType .
  OPTIONAL { ?field g:nonNull ?nonNull }
  OPTIONAL { ?field g:isList ?isList }
  OPTIONAL { ?field rdfs:comment ?fieldComment }
}
ORDER BY ?typeName ?fieldName
""" }
template = { file = "templates/object-types.tera" }
output_file = "types.graphql"
mode = "Overwrite"

# =============================================================================
# RULE 2: Input type definitions
# Generates input FooInput { ... } blocks for all InputTypes
# =============================================================================
[[generation.rules]]
name = "input-types"
query = { inline = """
PREFIX g: <https://ggen.io/ontology/graphql#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?typeName ?typeComment ?fieldName ?fieldType ?nonNull ?isList
WHERE {
  ?type a g:InputType ;
        g:typeName ?typeName ;
        g:hasField ?field .
  OPTIONAL { ?type rdfs:comment ?typeComment }

  ?field g:fieldName ?fieldName ;
         g:fieldType ?fieldType .
  OPTIONAL { ?field g:nonNull ?nonNull }
  OPTIONAL { ?field g:isList ?isList }
}
ORDER BY ?typeName ?fieldName
""" }
template = { file = "templates/input-types.tera" }
output_file = "inputs.graphql"
mode = "Overwrite"

# =============================================================================
# RULE 3: Schema root
# Generates schema { query: Query mutation: Mutation } block
# =============================================================================
[[generation.rules]]
name = "schema-root"
query = { inline = """
PREFIX g: <https://ggen.io/ontology/graphql#>

SELECT ?name ?version
WHERE {
  ?s a g:Schema ;
     g:name ?name .
  OPTIONAL { ?s g:version ?version }
}
LIMIT 1
""" }
template = { file = "templates/schema-root.tera" }
output_file = "schema.graphql"
mode = "Overwrite"

# =============================================================================
# RULE 4: Full schema index
# Generates a summary listing all types
# =============================================================================
[[generation.rules]]
name = "full-schema"
query = { inline = """
PREFIX g: <https://ggen.io/ontology/graphql#>

SELECT ?typeName
WHERE {
  { ?type a g:ObjectType ; g:typeName ?typeName }
  UNION
  { ?type a g:InputType ; g:typeName ?typeName }
}
ORDER BY ?typeName
""" }
template = { file = "templates/full-schema.tera" }
output_file = "index.graphql"
mode = "Overwrite"

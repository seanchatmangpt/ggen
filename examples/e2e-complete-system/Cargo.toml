[package]
name = "e2e-complete-system"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
clap = { version = "4", features = ["derive"] }
typenum = "1"
generic-array = "0.14"
sha2 = "0.10"
ed25519-dalek = { version = "2", features = ["batch"] }
rand = "0.8"
parking_lot = "0.12"
arc-swap = "1"
crossbeam = "0.8"
dashmap = "5"
futures = "0.3"
async-trait = "0.1"
once_cell = "1.19"
itertools = "0.12"

# Project dependencies (optional - for real integration)
# osiris-domains = { path = "../../crates/osiris-domains", optional = true }
# ggen-receipt = { path = "../../crates/ggen-receipt", optional = true }
# ggen-consensus = { path = "../../crates/ggen-consensus", optional = true }
# ggen-a2a-mcp = { path = "../../crates/ggen-a2a-mcp", optional = true }
# ggen-transport = { path = "../../crates/ggen-transport", optional = true }
# ggen-metrics-tps = { path = "../../crates/ggen-metrics-tps", optional = true }

[dev-dependencies]
proptest = "1"
criterion = { version = "0.5", features = ["async_tokio"] }
insta = { version = "1", features = ["json"] }

[lib]
path = "src/lib.rs"

[[bin]]
name = "e2e-complete"
path = "src/main.rs"

[package]
name = "a2a-tool-use-integration"
version = "0.1.0"
edition = "2021"
authors = ["ggen team"]
description = "Wave 4 example: Agents autonomously discovering MCP tools and using them to accomplish goals"
license = "MIT"

[workspace]

[dependencies]
# Core async runtime
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
uuid = { version = "1.0", features = ["serde", "v4"] }
chrono = { version = "0.4", features = ["serde"] }
regex = "1.0"

# ggen integration (when building from monorepo)
# ggen-core = { path = "../../crates/ggen-core", optional = true }
# ggen-a2a-mcp = { path = "../../crates/ggen-a2a-mcp", optional = true }

# RDF/ontology support
oxigraph = { version = "0.5", optional = true }

[dev-dependencies]
# Testing
proptest = "1.0"
mockall = "0.12"
tempfile = "3.0"
assert_fs = "1.0"
insta = "1.0"

[features]
default = []
rdf = ["oxigraph"]

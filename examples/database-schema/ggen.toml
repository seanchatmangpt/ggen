# =============================================================================
# ggen v5 Database Schema Code Generation Manifest
# Generates SQL DDL, indexes, migrations, and schema docs from RDF ontology
# Single source of truth → CREATE TABLE + CREATE INDEX + migration + docs
# =============================================================================

[project]
name = "database-schema-example"
version = "1.0.0"
description = "Ontology-driven SQL schema generation with ggen sync"

[ontology]
source = "ontology/db-schema.ttl"
base_iri = "https://ggen.io/examples/db/"
schema = "ontology/db-vocabulary.ttl"

[ontology.prefixes]
db = "https://ggen.io/examples/db#"
schema = "https://ggen.io/ontology/db#"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "output"
require_audit_trail = true

# =============================================================================
# RULE 1: CREATE TABLE statements
# Generates DDL for all tables with columns, types, constraints
# =============================================================================
[[generation.rules]]
name = "create-tables"
query = { inline = """
PREFIX schema: <https://ggen.io/ontology/db#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?tableName ?tableComment ?colName ?dataType ?length ?precision ?scale
       ?nullable ?primaryKey ?uniqueCol ?defaultVal ?foreignKey ?refsTable ?refsColumn
WHERE {
  ?table a schema:Table ;
         schema:tableName ?tableName ;
         schema:hasColumn ?col .
  OPTIONAL { ?table rdfs:comment ?tableComment }

  ?col schema:columnName ?colName ;
       schema:dataType ?dataType .
  OPTIONAL { ?col schema:length ?length }
  OPTIONAL { ?col schema:precision ?precision }
  OPTIONAL { ?col schema:scale ?scale }
  OPTIONAL { ?col schema:nullable ?nullable }
  OPTIONAL { ?col schema:primaryKey ?primaryKey }
  OPTIONAL { ?col schema:unique ?uniqueCol }
  OPTIONAL { ?col schema:defaultValue ?defaultVal }
  OPTIONAL { ?col schema:foreignKey ?foreignKey }
  OPTIONAL { ?col schema:referencesTable ?refsTable }
  OPTIONAL { ?col schema:referencesColumn ?refsColumn }
}
ORDER BY ?tableName ?colName
""" }
template = { file = "templates/create-tables.tera" }
output_file = "create-tables.sql"
mode = "Overwrite"

# =============================================================================
# RULE 2: CREATE INDEX statements
# Generates all index definitions separately for controlled rollout
# =============================================================================
[[generation.rules]]
name = "create-indexes"
query = { inline = """
PREFIX schema: <https://ggen.io/ontology/db#>

SELECT ?tableName ?indexName ?indexColumn ?unique
WHERE {
  ?table a schema:Table ;
         schema:tableName ?tableName ;
         schema:hasIndex ?idx .
  ?idx schema:indexName ?indexName ;
       schema:indexColumn ?indexColumn .
  OPTIONAL { ?idx schema:unique ?unique }
}
ORDER BY ?tableName ?indexName
""" }
template = { file = "templates/create-indexes.tera" }
output_file = "create-indexes.sql"
mode = "Overwrite"

# =============================================================================
# RULE 3: Migration file
# Generates versioned migration wrapper
# =============================================================================
[[generation.rules]]
name = "migration"
query = { inline = """
PREFIX schema: <https://ggen.io/ontology/db#>

SELECT ?tableName
WHERE {
  ?table a schema:Table ;
         schema:tableName ?tableName .
}
ORDER BY ?tableName
""" }
template = { file = "templates/migration.tera" }
output_file = "migrations/001_initial_schema.sql"
mode = "Overwrite"

# =============================================================================
# RULE 4: Schema documentation
# Generates human-readable Markdown docs for all tables
# =============================================================================
[[generation.rules]]
name = "schema-docs"
query = { inline = """
PREFIX schema: <https://ggen.io/ontology/db#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?tableName ?tableComment ?colName ?dataType ?length ?nullable ?primaryKey ?colComment
WHERE {
  ?table a schema:Table ;
         schema:tableName ?tableName ;
         schema:hasColumn ?col .
  OPTIONAL { ?table rdfs:comment ?tableComment }

  ?col schema:columnName ?colName ;
       schema:dataType ?dataType .
  OPTIONAL { ?col schema:length ?length }
  OPTIONAL { ?col schema:nullable ?nullable }
  OPTIONAL { ?col schema:primaryKey ?primaryKey }
  OPTIONAL { ?col rdfs:comment ?colComment }
}
ORDER BY ?tableName ?colName
""" }
template = { file = "templates/schema-docs.tera" }
output_file = "SCHEMA.md"
mode = "Overwrite"

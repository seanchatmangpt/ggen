[package]
name = "distributed-consensus"
version = "0.1.0"
edition = "2021"
authors = ["GGEN Team"]
license = "MIT"
description = "Wave 4 example: Byzantine fault-tolerant consensus with PBFT, voting, and cryptographic receipts"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
futures = "0.3"
dashmap = "5.5"
sha2 = "0.10"
ed25519-dalek = "2.1"
hex = "0.4"
rand = "0.8"

# A2A dependencies
a2a-generated = { path = "../../crates/a2a-generated" }
ggen-a2a-mcp = { path = "../../crates/ggen-a2a-mcp" }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
proptest = "1.0"
insta = "1.34"

[[test]]
name = "consensus_tests"
path = "tests/consensus_tests.rs"

[[test]]
name = "byzantine_tests"
path = "tests/byzantine_tests.rs"

[[test]]
name = "receipt_tests"
path = "tests/receipt_tests.rs"

[[test]]
name = "fault_tolerance_tests"
path = "tests/fault_tolerance_tests.rs"

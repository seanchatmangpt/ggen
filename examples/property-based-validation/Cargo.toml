[package]
name = "property-based-validation"
version = "0.1.0"
edition = "2021"
description = "7-agent property-based validation for ggen (complementary invariants, not consensus voting)"

[dependencies]
tokio = { version = "1.42", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = { version = "0.4", features = ["serde"] }
proptest = "1.5" # Property-based testing framework
regex = "1.11"
sha3 = "0.10"
blake3 = "1.5"
uuid = { version = "1.11", features = ["v4"] }
anyhow = "1.0"

[dev-dependencies]
tokio-test = "0.4"

# =============================================================================
# ggen v5 Microservices Architecture Code Generation Manifest
# Generates service scaffolds and SPARQL query files from an RDF ontology.
# =============================================================================

[project]
name = "microservices-architecture"
version = "1.0.0"
description = "E-commerce microservices with Rust — generated from RDF ontology"

[ontology]
source = "ontology/microservices.ttl"
base_iri = "https://example.com/microservices#"

[ontology.prefixes]
ex   = "https://example.com/microservices#"
rdf  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd  = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "."
require_audit_trail = true

# =============================================================================
# RULE 1: API Gateway scaffold
# =============================================================================
[[generation.rules]]
name = "api-gateway"
query = { inline = """
PREFIX ex: <https://example.com/microservices#>

SELECT ?serviceName ?port ?framework ?description
WHERE {
  ?service a ex:Service ;
           ex:serviceName  ?serviceName ;
           ex:port         ?port ;
           ex:framework    ?framework ;
           ex:description  ?description .
}
ORDER BY ?port
""" }
template    = { file = "templates/api-gateway.tera" }
output_file = "services/api-gateway/src/main.rs"
mode        = "Overwrite"

# =============================================================================
# RULE 2: User service scaffold
# =============================================================================
[[generation.rules]]
name = "user-service"
query = { inline = """
PREFIX ex: <https://example.com/microservices#>

SELECT ?serviceName ?port ?framework ?description
WHERE {
  ?service a ex:Service ;
           ex:serviceName  ?serviceName ;
           ex:port         ?port ;
           ex:framework    ?framework ;
           ex:description  ?description .
}
ORDER BY ?serviceName
""" }
template    = { file = "templates/user-service.tera" }
output_file = "services/user-service/src/main.rs"
mode        = "Overwrite"

# =============================================================================
# RULE 3: SPARQL queries file
# =============================================================================
[[generation.rules]]
name = "sparql-queries"
query = { inline = """
PREFIX ex: <https://example.com/microservices#>

SELECT ?serviceName ?dependsOn
WHERE {
  ?service a ex:Service ;
           ex:serviceName ?serviceName ;
           ex:dependsOn   ?dep .
  ?dep ex:serviceName ?dependsOn .
}
ORDER BY ?serviceName
""" }
template    = { file = "templates/sparql-queries.tera" }
output_file = "data/queries.sparql"
mode        = "Overwrite"

template = { file = "templates/deployment.tera" }
output_file = "DEPLOYMENT.md"
mode = "Overwrite"

[[generation.rules]]
name = "generate-docker-compose"
query = { inline = """
PREFIX ws: <https://ggen.io/ontology/workspace#>
SELECT ?workspaceName ?services
WHERE {
  ?ws a ws:Workspace ;

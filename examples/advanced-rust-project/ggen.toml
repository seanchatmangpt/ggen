# =============================================================================
# ggen v5 Advanced Rust Project Code Generation Manifest
# Generates Rust services, API endpoints, database schema, and documentation
# from an RDF ontology.
# =============================================================================

[project]
name = "advanced-rust-project"
version = "1.0.0"
description = "Advanced Rust project demonstrating ggen code generation"

[ontology]
source = "ontology/domain.ttl"
base_iri = "http://example.org/advanced-rust-project#"

[ontology.prefixes]
ex   = "http://example.org/advanced-rust-project#"
rdf  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd  = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "generated"
require_audit_trail = true

# =============================================================================
# RULE 1: Rust Service Scaffold
# =============================================================================
[[generation.rules]]
name = "rust-service"
query = { inline = """
PREFIX ex: <http://example.org/advanced-rust-project#>

SELECT ?name ?description ?version ?author
WHERE {
  ?service a ex:Service ;
           ex:name        ?name ;
           ex:description ?description ;
           ex:version     ?version ;
           ex:author      ?author .
}
ORDER BY ?name
""" }
template    = { file = "templates/rust-service.tera" }
output_file = "src/services/services.rs"
mode        = "Overwrite"

# =============================================================================
# RULE 2: API Endpoints
# =============================================================================
[[generation.rules]]
name = "api-endpoint"
query = { inline = """
PREFIX ex: <http://example.org/advanced-rust-project#>

SELECT ?name ?method ?path ?description
WHERE {
  ?endpoint a ex:Endpoint ;
            ex:name        ?name ;
            ex:method      ?method ;
            ex:path        ?path ;
            ex:description ?description .
}
ORDER BY ?name
""" }
template    = { file = "templates/api-endpoint.tera" }
output_file = "src/api/endpoints.rs"
mode        = "Overwrite"

# =============================================================================
# RULE 3: Database Schema
# =============================================================================
[[generation.rules]]
name = "database-schema"
query = { inline = """
PREFIX ex: <http://example.org/advanced-rust-project#>

SELECT ?name ?description
WHERE {
  ?entity a ex:Entity ;
          ex:name        ?name ;
          ex:description ?description .
}
ORDER BY ?name
""" }
template    = { file = "templates/database-schema.tera" }
output_file = "src/database/schema.sql"
mode        = "Overwrite"

# =============================================================================
# RULE 4: Documentation
# =============================================================================
[[generation.rules]]
name = "documentation"
query = { inline = """
PREFIX ex: <http://example.org/advanced-rust-project#>

SELECT ?name ?description ?version ?author
WHERE {
  ?service a ex:Service ;
           ex:name        ?name ;
           ex:description ?description ;
           ex:version     ?version ;
           ex:author      ?author .
}
ORDER BY ?name
""" }
template    = { file = "templates/documentation.tera" }
output_file = "docs/services.md"
mode        = "Overwrite"

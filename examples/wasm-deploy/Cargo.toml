[workspace]

[package]
name = "wasm-app"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
toml = "1.1.0"
oxigraph = { version = "0.5.8", features = ["rdf-12"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[package]
name = "mcp_sync_example"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# ggen-a2a-mcp = { path = "../../crates/ggen-a2a-mcp" }
rmcp = { version = "0.1.3", features = ["client", "transport-io"] }
serde_json = "1.0"
tokio = { version = "1.42", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"

[[bin]]
name = "mcp_sync_example"
path = "src/main.rs"

# ggen Self-Play Demo Configuration

[project]
name = "self-play-demo"
version = "26.5.4"
description = "A demo project where ggen manages its own development lifecycle"

[ontology]
source = "ontology.ttl"

[generation]
output_dir = "src"
rules = [
    { name = "self-boot", query = { file = "queries/boot.rq" }, template = { file = "templates/boot.tera" }, output_file = "boot.rs" }
]

[validation]
validate_syntax = true

[workspace]

[package]
name = "receiptctl"
version = "0.1.0"
edition = "2021"
publish = false
description = "Canonical multi-pack ggen example: combines clap-noun-verb-pack, chicago-tdd-tools-pack, and the wasm4pm-*-pack family into one end-to-end CLI."

[dependencies]
clap-noun-verb = "=26.7.4"
clap-noun-verb-macros = "=26.7.4"
linkme = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
wasm4pm-compat = "=26.6.29"

[dev-dependencies]
# path, not the published crate: the published chicago-tdd-tools doesn't yet
# include the `cli_proof` module (`cli-proof` feature isn't published to
# crates.io yet) -- same real gap ggen's own workspace vendors this crate to
# work around (see .claude/rules/architecture.md's Testing infrastructure
# section). Defensible here since this example lives inside the ggen repo.
chicago-tdd-tools = { path = "../../crates/chicago-tdd-tools", features = ["cli-proof"] }

[[bin]]
name = "receiptctl"
path = "src/main.rs"

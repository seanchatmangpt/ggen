# =============================================================================
# ggen v5 Comprehensive Rust Showcase Manifest
# Ontology-driven generation of README and entity documentation
# =============================================================================

[project]
name = "comprehensive-rust-showcase"
version = "1.0.0"
description = "Comprehensive Rust project showcasing ggen code generation features"

[ontology]
source = "ontology/showcase.ttl"
base_iri = "http://example.org/comprehensive-rust-showcase/"

[ontology.prefixes]
ex = "http://example.org/comprehensive-rust-showcase/"
rdf = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
xsd = "http://www.w3.org/2001/XMLSchema#"

[inference]
rules = []

[generation]
output_dir = "generated"

# =============================================================================
# RULE 1: Project README
# Generates README with project overview and entity table
# =============================================================================
[[generation.rules]]
name = "readme"
query = { inline = """
PREFIX ex: <http://example.org/comprehensive-rust-showcase/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?projectName ?projectDescription ?version ?label ?tableName ?comment
WHERE {
  ?project a ex:Project ;
           ex:name ?projectName ;
           ex:description ?projectDescription ;
           ex:version ?version ;
           ex:hasEntity ?entity .
  ?entity a ex:Entity ;
          rdfs:label ?label ;
          ex:tableName ?tableName ;
          rdfs:comment ?comment .
}
ORDER BY ?label
""" }
template = { file = "templates/readme.tera" }
output_file = "README.md"
mode = "Overwrite"

# =============================================================================
# RULE 2: Entity Summary
# Generates a detailed entity reference document
# =============================================================================
[[generation.rules]]
name = "entity-summary"
query = { inline = """
PREFIX ex: <http://example.org/comprehensive-rust-showcase/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

SELECT ?label ?tableName ?primaryKey ?comment
WHERE {
  ?entity a ex:Entity ;
          rdfs:label ?label ;
          ex:tableName ?tableName ;
          ex:primaryKey ?primaryKey ;
          rdfs:comment ?comment .
}
ORDER BY ?label
""" }
template = { file = "templates/entity-summary.tera" }
output_file = "ENTITIES.md"
mode = "Overwrite"

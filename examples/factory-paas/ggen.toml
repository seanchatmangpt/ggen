# ggen Configuration - Rust Attribution Context
# TCPS Reference Implementation
# NO output_directory - explicit paths only

[project]
name = "rust-attribution-context"
version = "1.0.0"
description = "TCPS reference implementation: DDD attribution system"

# Ontology sources (truth layer)
[ontology]
source = "ontology/attribution.ttl"
imports = [
  "ontology/entities.ttl",
  "ontology/commands.ttl",
  "ontology/events.ttl",
  "ontology/policies.ttl",
  "ontology/infra.ttl",
  "ontology/saas.ttl",
  "ontology/saas_commands.ttl",
  "ontology/saas_events.ttl",
  "ontology/saas_aggregates.ttl",
  "ontology/routing.ttl",
]

[generation]
output_dir = "world"

# ============================================================================
# RUST DOMAIN MODEL GENERATION
# ============================================================================

[[generation.rules]]
name = "rust_entities"
description = "Generate Rust entity structs"
query = { file = "queries/entities.sparql" }
template = { file = "templates/rust_entities.rs.tera" }
output_file = "world/src/entities.rs"

[[generation.rules]]
name = "rust_commands"
description = "Generate Rust command enums"
query = { file = "queries/commands.sparql" }
template = { file = "templates/rust_commands.rs.tera" }
output_file = "world/src/commands.rs"

[[generation.rules]]
name = "rust_events"
description = "Generate Rust event enums"

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  platform-release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust
        shell: bash
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy --component rust-src
          rustup default 1.97.1
      - name: Host release
        run: python tools/lifecycle.py release --scope host
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/
            receipts/

  aggregate:
    needs: platform-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: collected
          merge-multiple: false
      - name: Aggregate platform artifacts
        run: |
          mkdir -p dist
          find collected -type f -path '*/dist/*' -exec cp -n {} dist/ \;
          python tools/lifecycle.py sbom
          python tools/lifecycle.py provenance
          python tools/lifecycle.py checksums
          python tools/lifecycle.py verify-release
      - uses: actions/upload-artifact@v4
        with:
          name: complete-release
          path: dist/


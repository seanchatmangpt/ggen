[workspace]
[package]
name = "template-generation-example"
version = "0.1.0"
edition = "2021"

[dependencies]
tera = "1.19"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "1.1.0"
oxigraph = { version = "0.5.8", features = ["rdf-12"] }

[[bin]]
name = "template_example"
path = "src/main.rs"

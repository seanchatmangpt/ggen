# Echo Agent — simplest possible A2A agent

[agent]
name = "Echo Agent"
description = "A simple agent that echoes back messages"

[server]
http_port = 3030

[server.storage]
type = "inmemory"

[[skills]]
id = "echo"
name = "Echo"
description = "Echoes back whatever you send"
keywords = ["echo", "repeat", "test"]
examples = ["Echo this message"]

[features]
streaming = true
push_notifications = false

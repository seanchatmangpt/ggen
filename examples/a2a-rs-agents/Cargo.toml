[package]
name = "a2a-rs-agents"
version = "0.1.0"
edition = "2021"
description = "ggen examples: A2A protocol agents using a2a-rs AgentBuilder API — ported from EmilLindfors/a2a-rs"

[dependencies]
a2a-agents = { path = "../../vendors/a2a-rs/a2a-agents", default-features = false }
a2a-rs = { path = "../../vendors/a2a-rs/a2a-rs", features = ["http-server"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
chrono = "0.4"

[[bin]]
name = "echo-agent"
path = "src/echo_agent.rs"

[[bin]]
name = "auto-storage-agent"
path = "src/auto_storage_agent.rs"

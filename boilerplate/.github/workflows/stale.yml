name: Stale

on:
  schedule:
    - cron: "0 7 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 7 days unless there is new activity."
          stale-pr-message: "This PR has been inactive for 30 days. It will be closed in 7 days unless there is new activity."
          close-issue-message: "Closing due to inactivity. Reopen if still relevant."
          close-pr-message: "Closing due to inactivity. Reopen if still relevant."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned"

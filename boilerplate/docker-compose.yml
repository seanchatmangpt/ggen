version: "3.9"
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - BIND_ADDR=0.0.0.0:8080
      - DATABASE_URL=/data/app.db
      - LOG_LEVEL=info
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  app-data:

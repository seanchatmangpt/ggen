services:
  # Primary ggen node
  ggen-node-1:
    image: ggen-staging:latest
    container_name: ggen-node-1
    hostname: ggen-node-1
    ports:
      - "8080:8080"
    environment:
      - GGEN_NODE_ID=ggen-node-1
      - GGEN_CLUSTER_NAME=staging-cluster
      - GGEN_LOG_LEVEL=info
      - GGEN_METRICS_ENABLED=true
      - GGEN_FIRESTORE_EMULATOR_HOST=firestore-emulator:8081
      - RUST_LOG=ggen=info,ggen_core=debug
    volumes:
      - ./specs:/app/specs:ro
      - ./generated:/app/generated
      - node-1-data:/app/data
    depends_on:
      firestore-emulator:
        condition: service_healthy
    networks:
      - ggen-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Secondary ggen node
  ggen-node-2:
    image: ggen-staging:latest
    container_name: ggen-node-2
    hostname: ggen-node-2
    ports:
      - "8084:8080"
    environment:
      - GGEN_NODE_ID=ggen-node-2
      - GGEN_CLUSTER_NAME=staging-cluster
      - GGEN_LOG_LEVEL=info
      - GGEN_METRICS_ENABLED=true
      - GGEN_FIRESTORE_EMULATOR_HOST=firestore-emulator:8081
      - RUST_LOG=ggen=info,ggen_core=debug
    volumes:
      - ./specs:/app/specs:ro
      - ./generated:/app/generated
      - node-2-data:/app/data
    depends_on:
      firestore-emulator:
        condition: service_healthy
    networks:
      - ggen-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Tertiary ggen node (for resilience testing)
  ggen-node-3:
    image: ggen-staging:latest
    container_name: ggen-node-3
    hostname: ggen-node-3
    ports:
      - "8086:8080"
    environment:
      - GGEN_NODE_ID=ggen-node-3
      - GGEN_CLUSTER_NAME=staging-cluster
      - GGEN_LOG_LEVEL=info
      - GGEN_METRICS_ENABLED=true
      - GGEN_FIRESTORE_EMULATOR_HOST=firestore-emulator:8081
      - RUST_LOG=ggen=info,ggen_core=debug
    volumes:
      - ./specs:/app/specs:ro
      - ./generated:/app/generated
      - node-3-data:/app/data
    depends_on:
      firestore-emulator:
        condition: service_healthy
    networks:
      - ggen-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Firestore Emulator (shared event store)
  firestore-emulator:
    image: google/cloud-sdk:emulators
    container_name: firestore-emulator
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
    entrypoint: ["gcloud", "beta", "emulators", "firestore", "start", "--host-port=0.0.0.0:8081"]
    networks:
      - ggen-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - ggen-staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  node-1-data:
  node-2-data:
  node-3-data:
  prometheus-data:

networks:
  ggen-staging:
    driver: bridge
    ipam:
      driver: default

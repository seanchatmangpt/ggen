global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'staging-cluster'
    environment: 'staging'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ggen-node-1 metrics
  - job_name: 'ggen-node-1'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ggen-node-1:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ggen-node-1'

  # ggen-node-2 metrics
  - job_name: 'ggen-node-2'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ggen-node-2:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ggen-node-2'

  # ggen-node-3 metrics
  - job_name: 'ggen-node-3'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ggen-node-3:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ggen-node-3'

  # Firestore Emulator metrics
  - job_name: 'firestore-emulator'
    scrape_interval: 15s
    static_configs:
      - targets: ['firestore-emulator:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'firestore-emulator'

# Alerting rules (optional - extend as needed)
rule_files:
  # - 'alert_rules.yml'

alerting:
  alertmanagers:

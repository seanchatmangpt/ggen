# Lifecycle Phase Transition Tests with OTEL Validation
# Tests: phase ordering, pipeline execution, hooks, dependencies

[meta]
name = "lifecycle_phase_transitions"
description = "Test lifecycle phase transitions with temporal ordering validation"
version = "1.0.0"

[otel]
exporter = "otlp"
endpoint = "http://localhost:4318"
service_name = "mcpp-lifecycle-phases"
enable_tracing = true
enable_metrics = true

[service.mcpp]
plugin = "generic_container"
image = "rust:latest"
volumes = ["/tmp/mcpp-test:/workspace"]
working_dir = "/workspace"

# Test 1: Full lifecycle pipeline with phase ordering
[[scenario]]
name = "full_lifecycle_pipeline_ordered"
service = "mcpp"
run = """
mkdir -p /workspace/full-pipeline && cd /workspace/full-pipeline && \
cat > make.toml << 'EOF'
[project]
name = "full-pipeline-test"

[lifecycle.init]
command = "echo 'Phase: init'"

[lifecycle.setup]
command = "echo 'Phase: setup'"

[lifecycle.build]
command = "echo 'Phase: build'"

[lifecycle.test]
command = "echo 'Phase: test'"

[lifecycle.deploy]
command = "echo 'Phase: deploy'"
EOF
mcpp lifecycle run init && \
mcpp lifecycle run setup && \
mcpp lifecycle run build && \
mcpp lifecycle run test && \
mcpp lifecycle run deploy
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.init"
must_precede = ["mcpp.lifecycle.setup"]

[[scenario.expect.span]]
name = "mcpp.lifecycle.setup"
must_precede = ["mcpp.lifecycle.build"]
must_follow = ["mcpp.lifecycle.init"]

[[scenario.expect.span]]
name = "mcpp.lifecycle.build"
must_precede = ["mcpp.lifecycle.test"]
must_follow = ["mcpp.lifecycle.setup"]

[[scenario.expect.span]]
name = "mcpp.lifecycle.test"
must_precede = ["mcpp.lifecycle.deploy"]
must_follow = ["mcpp.lifecycle.build"]

[[scenario.expect.span]]
name = "mcpp.lifecycle.deploy"
must_follow = ["mcpp.lifecycle.test"]

[scenario.expect.graph]
must_include = [
  ["mcpp.lifecycle.init", "mcpp.lifecycle.setup"],
  ["mcpp.lifecycle.setup", "mcpp.lifecycle.build"],
  ["mcpp.lifecycle.build", "mcpp.lifecycle.test"],
  ["mcpp.lifecycle.test", "mcpp.lifecycle.deploy"]
]
acyclic = true
dag_validated = true

[scenario.expect.temporal]
strict_ordering = [
  "mcpp.lifecycle.init",
  "mcpp.lifecycle.setup",
  "mcpp.lifecycle.build",
  "mcpp.lifecycle.test",
  "mcpp.lifecycle.deploy"
]

# Test 2: Phase with multiple commands
[[scenario]]
name = "phase_with_multiple_commands"
service = "mcpp"
run = """
mkdir -p /workspace/multi-cmd && cd /workspace/multi-cmd && \
cat > make.toml << 'EOF'
[project]
name = "multi-command-phase"

[lifecycle.setup]
commands = [
    "echo 'Step 1: Install dependencies'",
    "echo 'Step 2: Configure environment'",
    "echo 'Step 3: Verify setup'"
]
EOF
mcpp lifecycle run setup
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.setup"
attributes = { "command_count" = "3" }

[[scenario.expect.span]]
name = "mcpp.lifecycle.command.execute"
parent = "mcpp.lifecycle.setup"
count = 3

[scenario.expect.window]
parent = "mcpp.lifecycle.setup"
must_contain = ["mcpp.lifecycle.command.execute"]
min_child_spans = 3
max_child_spans = 3

[scenario.expect.temporal]
ordering = [
  "mcpp.lifecycle.setup",
  "mcpp.lifecycle.command.execute"
]

# Test 3: Pipeline failure stops execution
[[scenario]]
name = "pipeline_failure_stops_execution"
service = "mcpp"
run = """
mkdir -p /workspace/pipeline-fail && cd /workspace/pipeline-fail && \
cat > make.toml << 'EOF'
[project]
name = "failing-pipeline"

[lifecycle.init]
command = "echo 'Init succeeded'"

[lifecycle.build]
command = "exit 1"

[lifecycle.test]
command = "echo 'This should not run'"
EOF
mcpp lifecycle run init && \
(mcpp lifecycle run build || echo "Build failed as expected") && \
! mcpp lifecycle run test
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.init"
expect_error = false

[[scenario.expect.span]]
name = "mcpp.lifecycle.build"
expect_error = true
must_follow = ["mcpp.lifecycle.init"]

[[scenario.expect.span]]
name = "mcpp.lifecycle.test"
should_not_exist = true

[scenario.expect.graph]
must_include = [
  ["mcpp.lifecycle.init", "mcpp.lifecycle.build"]
]
must_not_include = [
  ["mcpp.lifecycle.build", "mcpp.lifecycle.test"]
]

# Test 4: Before and after hooks execution
[[scenario]]
name = "hooks_execution_order"
service = "mcpp"
run = """
mkdir -p /workspace/hooks-test && cd /workspace/hooks-test && \
cat > make.toml << 'EOF'
[project]
name = "hooks-test"

[lifecycle.validate]
command = "echo 'Validating'"

[lifecycle.build]
command = "echo 'Building'"

[lifecycle.notify]
command = "echo 'Notifying'"

[hooks]
before_build = ["validate"]
after_build = ["notify"]
EOF
mcpp lifecycle run build
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.validate"
must_precede = ["mcpp.lifecycle.build"]
attributes = { "hook.type" = "before", "hook.target" = "build" }

[[scenario.expect.span]]
name = "mcpp.lifecycle.build"
must_precede = ["mcpp.lifecycle.notify"]
must_follow = ["mcpp.lifecycle.validate"]

[[scenario.expect.span]]
name = "mcpp.lifecycle.notify"
must_follow = ["mcpp.lifecycle.build"]
attributes = { "hook.type" = "after", "hook.target" = "build" }

[scenario.expect.temporal]
strict_ordering = [
  "mcpp.lifecycle.validate",
  "mcpp.lifecycle.build",
  "mcpp.lifecycle.notify"
]

[scenario.expect.window]
parent = "mcpp.lifecycle.hooks.orchestrate"
must_contain = ["mcpp.lifecycle.validate", "mcpp.lifecycle.build", "mcpp.lifecycle.notify"]
temporal_order = true

# Test 5: Circular hook detection
[[scenario]]
name = "circular_hook_detection"
service = "mcpp"
run = """
mkdir -p /workspace/circular-hooks && cd /workspace/circular-hooks && \
cat > make.toml << 'EOF'
[project]
name = "circular-hooks"

[lifecycle.a]
command = "echo 'Phase A'"

[lifecycle.b]
command = "echo 'Phase B'"

[hooks]
before_a = ["b"]
before_b = ["a"]
EOF
mcpp lifecycle run a || echo "Circular dependency detected"
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.validation.hooks"
expect_error = true
attributes = { "error.type" = "circular_dependency" }

[[scenario.expect.span]]
name = "mcpp.lifecycle.a"
should_not_exist = true

[scenario.expect.graph]
cycle_detection = true
must_detect_cycle = ["a", "b"]

# Test 6: Phase caching
[[scenario]]
name = "phase_caching_basic"
service = "mcpp"
run = """
mkdir -p /workspace/caching && cd /workspace/caching && \
cat > make.toml << 'EOF'
[project]
name = "caching-test"

[lifecycle.build]
command = "echo 'Expensive build operation'"
cache = true
EOF
mcpp lifecycle run build && \
mcpp lifecycle run build
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.build"
count = 2

[[scenario.expect.span]]
name = "mcpp.cache.key.generate"
parent = "mcpp.lifecycle.build"
count = 2
attributes = { "cache.enabled" = "true" }

[[scenario.expect.span]]
name = "mcpp.cache.hit"
count = 1
must_follow = ["mcpp.lifecycle.build"]

[[scenario.expect.span]]
name = "mcpp.cache.miss"
count = 1
must_precede = ["mcpp.cache.hit"]

# Test 7: State persistence across phases
[[scenario]]
name = "state_persistence_across_phases"
service = "mcpp"
run = """
mkdir -p /workspace/state-persist && cd /workspace/state-persist && \
cat > make.toml << 'EOF'
[project]
name = "state-persistence"

[lifecycle.init]
command = "echo 'Initializing'"

[lifecycle.build]
command = "echo 'Building'"

[lifecycle.test]
command = "echo 'Testing'"
EOF
mcpp lifecycle run init && \
mcpp lifecycle run build && \
mcpp lifecycle run test && \
test -f .mcpp/state.json && \
grep -q '"phase_history"' .mcpp/state.json
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.state.load"
count = 3
attributes_pattern = { "state.file" = ".*state.json" }

[[scenario.expect.span]]
name = "mcpp.lifecycle.state.save"
count = 3
must_follow = ["mcpp.lifecycle.state.load"]

[scenario.expect.temporal]
pattern = [
  ["mcpp.lifecycle.init", "mcpp.lifecycle.state.save"],
  ["mcpp.lifecycle.state.load", "mcpp.lifecycle.build"],
  ["mcpp.lifecycle.build", "mcpp.lifecycle.state.save"],
  ["mcpp.lifecycle.state.load", "mcpp.lifecycle.test"]
]

# Test 8: Parallel workspace builds
[[scenario]]
name = "parallel_workspace_builds"
service = "mcpp"
run = """
mkdir -p /workspace/monorepo && cd /workspace/monorepo && \
cat > make.toml << 'EOF'
[project]
name = "monorepo-parallel"
type = "monorepo"

[workspace.frontend]
path = "frontend"

[workspace.backend]
path = "backend"

[lifecycle.build]
command = "echo 'Building workspace'"
parallel = true
EOF
mkdir -p frontend backend && \
mcpp lifecycle run build
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.build"
attributes = { "parallel" = "true" }

[[scenario.expect.span]]
name = "mcpp.workspace.build"
parent = "mcpp.lifecycle.build"
count = 2
attributes_unique = ["workspace.name"]

[scenario.expect.graph]
must_not_include = [
  ["mcpp.workspace.build[workspace=frontend]", "mcpp.workspace.build[workspace=backend]"]
]
parallel_validated = true

# Test 9: Error handling with detailed context
[[scenario]]
name = "error_handling_with_context"
service = "mcpp"
run = """
mkdir -p /workspace/error-context && cd /workspace/error-context && \
cat > make.toml << 'EOF'
[project]
name = "error-context-test"

[lifecycle.failing-phase]
command = "nonexistent-command"
EOF
mcpp lifecycle run failing-phase || echo "Error handled"
"""

[[scenario.expect.span]]
name = "mcpp.lifecycle.failing-phase"
expect_error = true
attributes = { "error.type" = "command_not_found" }

[[scenario.expect.span]]
name = "mcpp.lifecycle.error.capture"
parent = "mcpp.lifecycle.failing-phase"
attributes_exists = ["error.message", "error.command", "error.exit_code"]

# Test 10: Cache invalidation on command change
[[scenario]]
name = "cache_invalidation_on_change"
service = "mcpp"
run = """
mkdir -p /workspace/cache-invalidate && cd /workspace/cache-invalidate && \
cat > make.toml << 'EOF'
[project]
name = "cache-invalidation"

[lifecycle.build]
command = "echo 'Version 1'"
cache = true
EOF
mcpp lifecycle run build && \
cat > make.toml << 'EOF'
[project]
name = "cache-invalidation"

[lifecycle.build]
command = "echo 'Version 2'"
cache = true
EOF
mcpp lifecycle run build
"""

[[scenario.expect.span]]
name = "mcpp.cache.key.generate"
count = 2
attributes_unique = ["cache.key"]

[[scenario.expect.span]]
name = "mcpp.cache.invalidate"
count = 1
attributes = { "reason" = "command_changed" }

# Summary expectations
[expect.report]
format = "json"
output_path = "/tmp/lifecycle-phases-report.json"
include_metrics = true
include_traces = true

[expect.performance]
max_duration_ms = 10000
max_memory_mb = 512

[expect.determinism]
require_same_traces_on_retry = true
retry_count = 2

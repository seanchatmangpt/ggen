[project]
name = "ggen"
version = "26.11.0"
description = "Specification-driven code generation from RDF ontologies — A = μ(O)"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"
repository = "https://github.com/seanchatmangpt/ggen"

[ontology]
source = ".specify/cli-commands.ttl"
base_iri = "http://ggen.org/cli#"
imports = [
  ".specify/cli-proof-tests.ttl",
  ".specify/repo-facts.ttl",
  ".specify/maturity.ttl",
  ".specify/ggen-product.ttl",
  ".specify/generations.ttl",
  "packs/ggen-constitution-pack/ontology.ttl",
  "packs/ggen-release-pack/ontology.ttl",
]

[ontology.prefixes]
cli     = "http://ggen.org/cli#"
paas    = "http://ggen.org/paas#"
rdf     = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs    = "http://www.w3.org/2000/01/rdf-schema#"
owl     = "http://www.w3.org/2002/07/owl#"
xsd     = "http://www.w3.org/2001/XMLSchema#"
dcterms = "http://purl.org/dc/terms/"
skos    = "http://www.w3.org/2004/02/skos/core#"

[inference]

[[inference.rules]]
name = "command-projection"
construct = """
PREFIX cli:   <http://ggen.org/cli#>
PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
CONSTRUCT {
  ?cmd a cli:Command ;
       rdfs:label ?label ;
       rdfs:comment ?comment .
}
WHERE {
  ?cmd a cli:Command ;
       rdfs:label ?label .
  OPTIONAL { ?cmd rdfs:comment ?comment . }
}
ORDER BY ?label
"""

[generation]
output_dir = "."

[[generation.rules]]
name = "cli-commands-reference"
query = { inline = """
PREFIX cli:  <http://ggen.org/cli#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?cmd ?label ?comment
WHERE {
  ?cmd a cli:Command ;
       rdfs:label ?label .
  OPTIONAL { ?cmd rdfs:comment ?comment . }
}
ORDER BY ?label
""" }
template = { file = ".specify/templates/cli/commands-reference.rs.tera" }
output_file = "crates/ggen-cli/src/generated_commands.rs"
mode = "Overwrite"

[[generation.rules]]
name         = "cli-proof-tests"
query        = { file = ".specify/queries/cli-proof-tests.rq" }
template     = { file = ".specify/templates/cli/cli_proof_test.rs.tera" }
output_file  = "crates/ggen-cli/tests/generated/cli_proof_tests.rs"
skip_empty   = false
mode         = "Overwrite"

# ── Self-generated manuals (2026-07-19): the repo's own docs precipitate from
# .specify/{repo-facts,maturity}.ttl. Each template pulls its tables itself via
# the sparql() Tera function; the rule-level query is a minimal deterministic
# anchor (ORDER BY per E0013 discipline). CLAUDE.md / README.md use mode=Merge:
# only the single <<<<<<< GENERATED … >>>>>>> MANUAL region is replaced, every
# byte outside the markers is preserved (generation_rules.rs `mod merge`).

[[generation.rules]]
name        = "docs-pack-maturity-model"
query       = { inline = """
PREFIX mat: <http://ggen.org/maturity#>
SELECT ?t WHERE { ?x a mat:DocSection ; mat:sid "intro" ; mat:text ?t . } ORDER BY ?t
""" }
template    = { file = ".specify/templates/docs/pack_maturity_model.md.tera" }
output_file = "docs/packs/PACK_MATURITY_MODEL.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-architecture-rules"
query       = { inline = """
PREFIX rf: <http://ggen.org/repo-facts#>
SELECT ?v WHERE { rf:doc rf:workspaceVersion ?v . } ORDER BY ?v
""" }
template    = { file = ".specify/templates/docs/architecture_rules.md.tera" }
output_file = ".claude/rules/architecture.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-tcps-status"
query       = { inline = """
PREFIX mat: <http://ggen.org/maturity#>
SELECT ?t WHERE { ?x a mat:DocSection ; mat:sid "tcps-intro" ; mat:text ?t . } ORDER BY ?t
""" }
template    = { file = ".specify/templates/docs/tcps_status.md.tera" }
output_file = "docs/packs/TCPS-STATUS.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-claude-md-region"
query       = { inline = """
PREFIX rf: <http://ggen.org/repo-facts#>
SELECT ?v WHERE { rf:doc rf:crateCount ?v . } ORDER BY ?v
""" }
template    = { file = ".specify/templates/docs/claude_md_region.md.tera" }
output_file = "CLAUDE.md"
skip_empty  = false
mode        = "Merge"

[[generation.rules]]
name        = "docs-readme-region"
query       = { inline = """
PREFIX rf: <http://ggen.org/repo-facts#>
SELECT ?v WHERE { rf:doc rf:gateCount ?v . } ORDER BY ?v
""" }
template    = { file = ".specify/templates/docs/readme_region.md.tera" }
output_file = "README.md"
skip_empty  = false
mode        = "Merge"

[[generation.rules]]
name        = "docs-constitution-mirror"
query       = { inline = """
PREFIX ccn: <http://seanchatmangpt.github.io/packs/ggen-constitution#>
SELECT ?num WHERE { ?law a ccn:Law ; ccn:principleNumber ?num . } ORDER BY ?num
""" }
template    = { file = "packs/ggen-constitution-pack/templates/constitution.md.tmpl" }
output_file = "CONSTITUTION.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-generations-ledger"
query       = { inline = """
PREFIX gen: <http://ggen.org/generations#>
SELECT ?commit WHERE { gen:G0 a gen:Generation ; gen:commit ?commit . } ORDER BY ?commit
""" }
template    = { file = ".specify/templates/docs/generations_ledger.md.tera" }
output_file = "docs/GENERATIONS.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-product-mirror"
query       = { inline = """
PREFIX prod: <http://ggen.org/product#>
SELECT ?x WHERE { ?x a prod:ProductMirror . } ORDER BY ?x
""" }
template    = { file = ".specify/templates/docs/product.md.tera" }
output_file = "docs/PRODUCT.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "ggen-release-publish-candidate-workflow"
query       = { inline = """
PREFIX grp: <http://seanchatmangpt.github.io/packs/ggen-release#>
SELECT ?body WHERE { grp:PublishCandidateWorkflow grp:workflowBody ?body . } ORDER BY ?body
""" }
template    = { file = ".specify/templates/docs/ggen_publish_candidate_workflow.yml.tera" }
output_file = ".github/workflows/publish-candidate.yml"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "ggen-release-standing-json"
query       = { inline = """
PREFIX grp: <http://seanchatmangpt.github.io/packs/ggen-release#>
SELECT ?body WHERE { grp:ReleaseStandingJsonArtifact grp:artifactBody ?body . } ORDER BY ?body
""" }
template    = { file = ".specify/templates/docs/ggen_release_standing_json.tera" }
output_file = "RELEASE_STANDING.json"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "ggen-release-standing-md"
query       = { inline = """
PREFIX grp: <http://seanchatmangpt.github.io/packs/ggen-release#>
SELECT ?body WHERE { grp:ReleaseStandingMdArtifact grp:artifactBody ?body . } ORDER BY ?body
""" }
template    = { file = ".specify/templates/docs/ggen_release_standing_md.tera" }
output_file = "RELEASE_STANDING.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "ggen-publication-judgment"
query       = { inline = """
PREFIX grp: <http://seanchatmangpt.github.io/packs/ggen-release#>
SELECT ?body WHERE { grp:PublicationJudgmentArtifact grp:artifactBody ?body . } ORDER BY ?body
""" }
template    = { file = ".specify/templates/docs/ggen_publication_judgment.md.tera" }
output_file = "docs/PUBLICATION_JUDGMENT.md"
skip_empty  = false
mode        = "Overwrite"

[sync]
enabled = true
on_change = "manual"
validate_after = true
conflict_mode = "fail"

[rdf]
formats = ["turtle"]
default_format = "turtle"
strict_validation = true

[templates]
enable_caching = true
auto_reload = false

[output]
formatting = "default"
line_length = 100
indent = 4

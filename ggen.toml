[project]
name = "ggen"
version = "26.7.59"
description = "Specification-driven code generation from RDF ontologies — A = μ(O)"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"
repository = "https://github.com/seanchatmangpt/ggen"

[ontology]
source = ".specify/cli-commands.ttl"
base_iri = "http://ggen.org/cli#"
imports = [
  ".specify/cli-proof-tests.ttl",
  ".specify/repo-facts.ttl",
  ".specify/repo-facts-interview-assist.ttl",
  ".specify/maturity.ttl",
  ".specify/pack-l5-promotion.ttl",
  ".specify/ggen-product.ttl",
  ".specify/generations.ttl",
  "packs/ggen-constitution-pack/ontology.ttl",
  "packs/ggen-release-pack/ontology.ttl",
  "packs/ggen-verify-pack/ontology.ttl",
  "evidence/ontology.ttl",
  "evidence/l5-template-derivation.ttl",
  "evidence/producers/docs-manifest.ttl",
  "evidence/producers/receipts-check.ttl",
  "evidence/producers/evidence-check.ttl",
]

[ontology.prefixes]
cli     = "http://ggen.org/cli#"
paas    = "http://ggen.org/paas#"
rdf     = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs    = "http://www.w3.org/2000/01/rdf-schema#"
owl     = "http://www.w3.org/2002/07/owl#"
xsd     = "http://www.w3.org/2001/XMLSchema#"
dcterms = "http://purl.org/dc/terms/"
skos    = "http://www.w3.org/2004/02/skos/core#"

[inference]

[[inference.rules]]
name = "command-projection"
construct = """
PREFIX cli:   <http://ggen.org/cli#>
PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
CONSTRUCT {
  ?cmd a cli:Command ;
       rdfs:label ?label ;
       rdfs:comment ?comment .
}
WHERE {
  ?cmd a cli:Command ;
       rdfs:label ?label .
  OPTIONAL { ?cmd rdfs:comment ?comment . }
}
ORDER BY ?label
"""

[generation]
output_dir = "."

[[generation.rules]]
name = "cli-commands-reference"
query = { inline = """
PREFIX cli:  <http://ggen.org/cli#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?cmd ?label ?comment
WHERE {
  ?cmd a cli:Command ;
       rdfs:label ?label .
  OPTIONAL { ?cmd rdfs:comment ?comment . }
}
ORDER BY ?label
""" }
template = { file = ".specify/templates/cli/commands-reference.rs.tera" }
output_file = "crates/ggen-cli/src/generated_commands.rs"
mode = "Overwrite"

[[generation.rules]]
name         = "cli-proof-tests"
query        = { file = ".specify/queries/cli-proof-tests.rq" }
template     = { file = ".specify/templates/cli/cli_proof_test.rs.tera" }
output_file  = "crates/ggen-cli/tests/generated/cli_proof_tests.rs"
skip_empty   = false
mode         = "Overwrite"

# ── Self-generated manuals (2026-07-19): the repo's own docs precipitate from
# .specify/{repo-facts,maturity}.ttl. Each template pulls its tables itself via
# the sparql() Tera function; the rule-level query is a minimal deterministic
# anchor (ORDER BY per E0013 discipline). CLAUDE.md / README.md use mode=Merge:
# only the single <<<<<<< GENERATED … >>>>>>> MANUAL region is replaced, every
# byte outside the markers is preserved (generation_rules.rs `mod merge`).

[[generation.rules]]
name        = "docs-pack-maturity-model"
query       = { inline = """
PREFIX mat: <http://ggen.org/maturity#>
SELECT ?t WHERE { ?x a mat:DocSection ; mat:sid "intro" ; mat:text ?t . } ORDER BY ?t
""" }
template    = { file = ".specify/templates/docs/pack_maturity_model.md.tera" }
output_file = "docs/packs/PACK_MATURITY_MODEL.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-l5-promotion-program"
query       = { inline = """
PREFIX l5p: <http://ggen.org/l5-promotion#>
SELECT ?t WHERE { ?x a l5p:DocSection ; l5p:sid "intro" ; l5p:text ?t . } ORDER BY ?t
""" }
template    = { file = ".specify/templates/docs/l5_promotion_program.md.tera" }
output_file = "docs/l5-promotion/L5_PROMOTION_PROGRAM.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-architecture-rules"
query       = { inline = """
PREFIX rf: <http://ggen.org/repo-facts#>
SELECT ?v WHERE { rf:doc rf:workspaceVersion ?v . } ORDER BY ?v
""" }
template    = { file = ".specify/templates/docs/architecture_rules.md.tera" }
output_file = ".claude/rules/architecture.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-tcps-status"
query       = { inline = """
PREFIX mat: <http://ggen.org/maturity#>
SELECT ?t WHERE { ?x a mat:DocSection ; mat:sid "tcps-intro" ; mat:text ?t . } ORDER BY ?t
""" }
template    = { file = ".specify/templates/docs/tcps_status.md.tera" }
output_file = "docs/packs/TCPS-STATUS.md"
skip_empty  = false
mode        = "Overwrite"

[[generation.rules]]
name        = "docs-claude-md-region"
query       = { inline = """
PREFIX rf: <http://ggen.org/repo-facts#>
SELECT ?v WHERE { rf:doc rf:crateCount ?v . } ORDER BY ?v
""" }
template    = { file = ".specify/templates/docs/claude_md_region.md.tera" }
output_file = "CLAUDE.md"
skip_empty  = false
mode        = "Merge"

[[generation.rules]]
name        = "docs-readme-region"
query       = { inline = """
PREFIX rf: <http://ggen.org/repo-facts#>
SELECT ?v WHERE { rf:doc rf:gateCount ?v . } ORDER BY ?v
""" }
template    = { file = ".specify/templates/docs/readme_region.md.tera" }
output_file = "README.md"
skip_empty  = false
mode        = "Merge"

[[generation.rules]]
name        = "docs-generations"
query       = { inline = """
PREFIX gen: <http://ggen.org/generations#>
SELECT ?t WHERE { ?x a gen:DocSection ; gen:sid "intro" ; gen:text ?t . } ORDER BY ?t
""" }
template    = { file = ".specify/templates/docs/generations.md.tera" }
output_file = "docs/GENERATIONS.md"
skip_empty  = false
mode        = "Overwrite"

[project]
name = "ggen"
version = "26.6.11"
description = "Specification-driven code generation from RDF ontologies — A = μ(O)"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"
repository = "https://github.com/seanchatmangpt/ggen"

[ontology]
source = ".specify/cli-commands.ttl"
base_iri = "http://ggen.org/cli#"

[ontology.prefixes]
cli     = "http://ggen.org/cli#"
paas    = "http://ggen.org/paas#"
rdf     = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs    = "http://www.w3.org/2000/01/rdf-schema#"
owl     = "http://www.w3.org/2002/07/owl#"
xsd     = "http://www.w3.org/2001/XMLSchema#"
dcterms = "http://purl.org/dc/terms/"
skos    = "http://www.w3.org/2004/02/skos/core#"

[inference]

[[inference.rules]]
name = "command-projection"
construct = """
PREFIX cli:   <http://ggen.org/cli#>
PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
CONSTRUCT {
  ?cmd a cli:Command ;
       rdfs:label ?label ;
       rdfs:comment ?comment .
}
WHERE {
  ?cmd a cli:Command ;
       rdfs:label ?label .
  OPTIONAL { ?cmd rdfs:comment ?comment . }
}
ORDER BY ?label
"""

[generation]
output_dir = "."

[[generation.rules]]
name = "cli-commands-reference"
query = { inline = """
PREFIX cli:  <http://ggen.org/cli#>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
SELECT ?cmd ?label ?comment
WHERE {
  ?cmd a cli:Command ;
       rdfs:label ?label .
  OPTIONAL { ?cmd rdfs:comment ?comment . }
}
ORDER BY ?label
""" }
template = { file = ".specify/templates/cli/help.rs.tera" }
output_file = "crates/ggen-cli/src/generated_commands.rs"
mode = "Overwrite"

[sync]
enabled = true
on_change = "manual"
validate_after = true
conflict_mode = "fail"

[rdf]
formats = ["turtle"]
default_format = "turtle"
strict_validation = true

[templates]
enable_caching = true
auto_reload = false

[output]
formatting = "default"
line_length = 100
indent = 4

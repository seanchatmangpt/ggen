# ggen Documentation Project Configuration

[project]
name = "ggen"
version = "5.0.2"
description = "Deterministic, language-agnostic code generation framework"
authors = ["Sean Chatman <sean@ggen.ai>"]
license = "MIT"
repository = "https://github.com/seanchatmangpt/ggen"

# Ontology configuration (required for ggen sync)
[ontology]
# Path to main ontology file
source = "ontology.ttl"
# Base URI for the ontology
base_uri = "https://ggen.dev/"
# Ontology format (turtle, rdf/xml, jsonld)
format = "turtle"

# AI configuration for documentation generation
[ai]
provider = "anthropic"
model = "claude-3-opus-20240229"
temperature = 0.5
max_tokens = 8000
timeout = 120

# Template configuration
[templates]
directory = "templates"
backup_enabled = true
idempotent = true

# RDF configuration for ontology-driven development
[rdf]
base_uri = "https://ggen.dev/"
default_format = "turtle"
cache_queries = true
store_path = ".ggen/rdf-store"

[rdf.prefixes]
ggen = "https://ggen.dev/"
schema = "https://schema.org/"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
owl = "http://www.w3.org/2002/07/owl#"
xsd = "http://www.w3.org/2001/XMLSchema#"

# SPARQL query configuration
[sparql]
timeout = 60
max_results = 5000
cache_enabled = true
cache_ttl = 7200

# Lifecycle hooks for documentation validation
[lifecycle]
enabled = true
config_file = ".ggen/lifecycle.toml"
cache_directory = ".ggen/cache"
state_file = ".ggen/state.json"

# Pre-generation: validate documentation structure
[lifecycle.phases.pre_generate]
scripts = [
    "scripts/validate-docs/validate-all.sh"
]

# Post-generation: format and validate
[lifecycle.phases.post_generate]
scripts = [
    "scripts/format-docs.sh"
]

# Security configuration
[security]
allowed_domains = [
    "schema.org",
    "w3.org",
    "ggen.dev",
    "github.com"
]
max_file_size = 104857600  # 100MB
validate_ssl = true

# Performance optimization
[performance]
parallel_generation = true
max_workers = 8
cache_templates = true
incremental_build = true

# Logging configuration
[logging]
level = "info"
format = "pretty"
output = "stderr"

# Development environment
[env.development]
"ai.model" = "claude-3-haiku-20240307"  # Faster, cheaper
"ai.temperature" = 0.9  # More creative for exploration
"logging.level" = "debug"
"performance.max_workers" = 4

# CI environment
[env.ci]
"ai.provider" = "ollama"  # Local, no API costs
"ai.model" = "llama2"
"ai.base_url" = "http://localhost:11434"
"logging.level" = "warn"
"logging.format" = "json"

# ============================================================================
# ZAI Environment (Local GenAI Integration)
# Configuration for ZAI MCP server and local AI model integration
# ============================================================================
[env.zai]
# Provider identifier for ZAI integration
"ai.provider" = "zai"

# Default model to use for generation
# Common values: "zai-chat", "zai-code", "zai-vision"
"ai.model" = "zai-chat"

# ZAI API endpoint URL
# Default: http://localhost:8080 (standard ZAI server port)
# For Docker: use container name (e.g., http://zai-server:8080)
"ai.base_url" = "http://localhost:8080"

# Optional API key for authenticated ZAI deployments
# Leave empty for local development (default: no authentication)
# Set via environment variable: export ZAI_API_KEY="your-key-here"
"ai.api_key" = ""  # Optional: set via ZAI_API_KEY env var

# Temperature for model responses (0.0 = deterministic, 1.0 = creative)
"ai.temperature" = 0.7

# Request timeout in seconds
"ai.timeout" = 120

# Logging level for ZAI operations
"logging.level" = "debug"

# Enable request/response caching for faster repeated queries
"zai.cache_enabled" = true

# Cache TTL in seconds (default: 1 hour)
"zai.cache_ttl" = 3600

# Retry configuration for failed requests
"zai.max_retries" = 3
"zai.retry_delay_ms" = 1000

# === Local ZAI Server Setup ===
# To run ZAI locally:
# 1. Clone ZAI repository: git clone https://github.com/zai-mcp/zai-server
# 2. Start server: docker run -p 8080:8080 zai-mcp/server:latest
# 3. Or install via npm: npm install -g @zai-mcp/server && zai-server
# 4. Verify health: curl http://localhost:8080/health

# Production environment
[env.production]
"ai.temperature" = 0.3  # Deterministic
"logging.level" = "warn"
"logging.format" = "json"
"performance.max_workers" = 16
"sparql.cache_ttl" = 86400  # 24 hours

# ============================================================================
# Marketplace Configuration
# Controls behavior when interacting with the ggen marketplace
# ============================================================================
[marketplace]
# Registry URL for package discovery
registry_url = "https://marketplace.ggen.dev"

# Cache downloaded packages locally
cache_packages = true

# Verify package signatures before installation
verify_signatures = true

# ============================================================================
# Generation Configuration (Path Protection & Poka-Yoke)
# Prevents accidental overwrites of domain logic during code generation
# ============================================================================
[generation]
# Enable generation safety checks
enabled = true

# Generation rules - define what to generate
rules = [
    # A2A-RS Pipeline (μ₁-μ₅): Agent-to-Agent code generation from RDF ontology
    # Each rule follows the pattern: query → template → output_file
    { name = "a2a-agents", query = "crates/ggen-core/queries/a2a/construct-agents.rq", template = "crates/ggen-core/templates/a2a/agent.rs.tera", output_file = "crates/a2a-generated/src/agent.rs", mode = "Overwrite" },
    { name = "a2a-messages", query = "crates/ggen-core/queries/a2a/extract-messages.rq", template = "crates/ggen-core/templates/a2a/message.rs.tera", output_file = "crates/a2a-generated/src/message.rs", mode = "Overwrite" },
    { name = "a2a-tasks", query = "crates/ggen-core/queries/a2a/extract-tasks.rq", template = "crates/ggen-core/templates/a2a/task.rs.tera", output_file = "crates/a2a-generated/src/task.rs", mode = "Overwrite" },
    { name = "a2a-transports", query = "crates/ggen-core/queries/a2a/extract-transports.rq", template = "crates/ggen-core/templates/a2a/transport.rs.tera", output_file = "crates/a2a-generated/src/transport.rs", mode = "Overwrite" },
    { name = "a2a-skills", query = "crates/ggen-core/queries/a2a/extract-skills.rq", template = "crates/ggen-core/templates/a2a/skill.rs.tera", output_file = "crates/a2a-generated/src/skill.rs", mode = "Overwrite" },
    { name = "a2a-lib", query = "", template = "crates/ggen-core/templates/a2a/lib.rs.tera", output_file = "crates/a2a-generated/src/lib.rs", mode = "Overwrite" },
    # Domain config generation
    { name = "domain-config", source = ".specify/specs/014-a2a-integration/", output = "crates/ggen-domain/src/domain/", templates = "crates/ggen-core/templates/domain/" }
]

# Protected paths (glob patterns) - NEVER overwrite
# These contain domain logic implemented by developers
protected_paths = [
    "src/domain/**",
    "crates/*/src/domain/**",
    "**/src/main.rs",
]

# Regeneratable paths (glob patterns) - safe to overwrite
# These contain generated scaffolding from templates
regenerate_paths = [
    "src/generated/**",
    "crates/*/src/generated/**",
]

# Header to inject into generated files
generated_header = """
// ============================================================
// DO NOT EDIT THIS FILE
//
// This file is auto-generated by ggen from RDF ontology.
// Any manual changes will be OVERWRITTEN on regeneration.
//
// Regenerate with: ggen generate
// ============================================================
"""

# Require confirmation before overwriting any file
require_confirmation = false

# Create backup before overwriting
backup_before_write = true

# Poka-yoke (error-proofing) controls
[generation.poka_yoke]
# Add warning headers to generated files
warning_headers = true
# Add generated files to .gitignore
gitignore_generated = false
# Add generated files to .gitattributes (linguist-generated)
gitattributes_generated = true
# Validate imports don't cross boundaries
validate_imports = false

# ============================================================================
# CODEOWNERS Configuration
# Aggregates team ownership from distributed OWNERS files
# ============================================================================
[codeowners]
# Enable CODEOWNERS generation
enabled = true

# Source directories to scan for OWNERS files
source_dirs = ["ontology", "ontologies"]

# Base directories to generate entries for
base_dirs = [
    "ontology",
    "ontologies",
    "src/generated",
    "src/domain",
    "crates/*/src/generated",
    "crates/*/src/domain",
]

# Output path (defaults to .github/CODEOWNERS)
output_path = ".github/CODEOWNERS"

# Auto-regenerate on noun changes
auto_regenerate = false
